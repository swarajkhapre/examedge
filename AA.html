"cja-what-is-aep": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Adobe Experience Platform</div>
  <h1>What is Adobe Experience Platform (AEP)?</h1>
  <p class="subtitle">The central data hub that powers CJA and all Adobe Experience Cloud products</p>
</div>
<div class="tag-row"><span class="tag key">Foundation</span><span class="tag exam">Exam Critical</span></div>

<h2>AEP Overview</h2>
<p>Adobe Experience Platform (AEP) is the centralized data foundation for the entire Adobe Experience Cloud ecosystem. It serves as a unified data hub that collects data from ANY source, standardizes it into a common format (XDM), resolves customer identities across channels and devices, and makes this unified data available to downstream applications like Customer Journey Analytics, Adobe Journey Optimizer, Adobe Real-Time CDP, and others. AEP is not a product you interact with directly for analysis — it is the infrastructure layer that makes cross-channel analysis possible. Think of AEP as the foundation of a building: you do not live in the foundation, but the building cannot exist without it.</p>

<p>For the CJA exam, the critical concept is: <strong>CJA REQUIRES AEP and cannot exist without it.</strong> All data that CJA analyzes must first pass through AEP, conform to an XDM schema, and be stored in AEP datasets. CJA then connects to these AEP datasets via Connections (Layer 3 of the architecture). This dependency is fundamental and frequently tested.</p>

<h2>AEP Core Components</h2>
<p><strong>Data Lake:</strong> Central storage for all ingested data. Stores data in its raw form plus processed/standardized form.</p>
<p><strong>Schemas (XDM):</strong> Standardized data format that ensures all sources use common field names and structures.</p>
<p><strong>Datasets:</strong> Containers that hold actual data conforming to a specific schema.</p>
<p><strong>Identity Service:</strong> Resolves different customer IDs (cookies, emails, device IDs, CRM IDs) into unified identity graphs.</p>
<p><strong>Real-Time Customer Profile:</strong> A unified, 360-degree view of each customer combining behavioral, transactional, and attribute data.</p>

<div class="diagram">
  <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px">AEP Data Flow to CJA</div>
  <div class="flow">
    <div class="flow-box layer1">Any Source</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer2">AEP Data Lake</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer3">XDM Dataset</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer4">CJA Connection</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer5">Data View → Analysis</div>
  </div>
</div>
`,

"cja-why-aep": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Adobe Experience Platform</div>
  <h1>Why CJA Needs AEP</h1>
  <p class="subtitle">Understanding the architectural dependency and what AEP provides to CJA</p>
</div>
<div class="tag-row"><span class="tag key">Architecture</span></div>

<h2>The Dependency Chain</h2>
<p>CJA is built ON TOP of AEP — it is not a standalone product. This architectural decision enables CJA's cross-channel capabilities but also means CJA inherits everything from the AEP ecosystem. Without AEP, there is no data standardization (XDM), no cross-channel data collection, no identity stitching, and no unified data storage. Every single piece of data that CJA analyzes must first pass through AEP. This means AEP provides: <strong>Data Standardization</strong> (XDM ensures all data sources use the same field names and structures, making combination possible), <strong>Cross-Channel Collection</strong> (AEP can ingest data from web, mobile, CRM, call center, POS, email, IoT, and any other source), <strong>Identity Management</strong> (AEP's Identity Service builds identity graphs that link different customer IDs as the same person), <strong>Data Storage</strong> (the AEP Data Lake provides scalable, centralized storage for all collected data), and <strong>Profile Enrichment</strong> (combining behavioral data with profile attributes for richer analysis). The exam will test this dependency with questions like "Can CJA work without AEP?" (answer: NO), "Where does CJA data originate?" (answer: AEP datasets), and "What provides identity stitching capability?" (answer: AEP Identity Service).</p>
`,

"cja-xdm": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Adobe Experience Platform</div>
  <h1>XDM — Experience Data Model</h1>
  <p class="subtitle">Adobe's universal data language that standardizes data across all channels</p>
</div>
<div class="tag-row"><span class="tag key">Standardization</span></div>

<h2>The Problem XDM Solves</h2>
<p>Different data sources use different field names for the same concept. A website might call purchase revenue "order_total," a mobile app might call it "purchaseAmount," and a CRM system might call it "transaction_value." Without standardization, combining these sources is a nightmare of field mapping and data transformation. XDM (Experience Data Model) solves this by defining a universal vocabulary for customer experience data. Under XDM, all sources use the same field path: <span class="formula">commerce.order.priceTotal</span>. This standardization makes it possible to combine data from dozens of sources into unified reports without complex ETL processes. XDM is organized into base classes (XDM ExperienceEvent for behavioral/time-series data, XDM Individual Profile for person attributes), field groups (pre-built collections of related fields like Commerce, Web, Device), and custom fields (your organization's specific additions). When you create a schema in AEP, you choose a base class and add field groups and custom fields to define the complete structure for a data source.</p>

<h2>Common XDM Fields</h2>
<div class="code-block">timestamp                          → When event occurred
web.webPageDetails.name            → Page name
commerce.order.priceTotal          → Order revenue
device.type                        → Device category
person.name.firstName              → Customer first name
personalEmail.address              → Email address
_yourcompany.customField           → Custom field</div>
`,

"cja-arch-overview": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> 4-Layer Architecture</div>
  <h1>CJA 4-Layer Architecture Overview</h1>
  <p class="subtitle">The most heavily tested concept on the CJA exam — 30-40% of questions</p>
</div>
<div class="tag-row"><span class="tag exam">30-40% of Exam</span><span class="tag key">Most Important</span></div>

<div class="info-card danger">
  <div class="card-title">🎯 The #1 Exam Concept</div>
  <p>Understanding WHAT is configured WHERE is the single most important concept for the CJA exam. 30-40% of questions directly test: "Where do you configure X?" — and the answer is always one of the four layers. Master this, and you have mastered nearly half the exam.</p>
</div>

<div class="diagram">
  <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:20px">CJA 4-Layer Architecture</div>
  <div class="flow" style="flex-direction:column;gap:12px">
    <div class="flow-box layer1" style="width:80%;padding:14px">Layer 1: SCHEMA (in AEP) — Define data structure • Field names • Types • Blueprint</div>
    <div style="font-size:20px;color:var(--text-muted)">↓</div>
    <div class="flow-box layer2" style="width:80%;padding:14px">Layer 2: DATASET (in AEP) — Store actual data • Conforms to schema • Event/Profile/Lookup types</div>
    <div style="font-size:20px;color:var(--text-muted)">↓</div>
    <div class="flow-box layer3" style="width:80%;padding:14px">Layer 3: CONNECTION (in CJA) — Combine datasets • Person ID • Stitching • Backfill • Retention</div>
    <div style="font-size:20px;color:var(--text-muted)">↓</div>
    <div class="flow-box layer4" style="width:80%;padding:14px">Layer 4: DATA VIEW (in CJA) — Configure reporting • Persistence • Attribution • Labels • Derived Fields</div>
  </div>
  <div style="margin-top:20px;font-size:12px;color:var(--text-muted)">Schema → Dataset → Connection → Data View = Define → Store → Combine → Configure</div>
</div>

<h2>Relationships</h2>
<p>The four layers have specific cardinality relationships that are important for the exam: One Schema can have MANY Datasets (multiple datasets can use the same structure). Many Datasets flow into ONE Connection (a Connection combines multiple datasets). One Connection can have MANY Data Views (different teams can have different reporting configurations from the same data). Understanding these 1:many and many:1 relationships helps answer questions about how changes propagate through the architecture.</p>
`,

"cja-layer1-schema": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> 4-Layer Architecture</div>
  <h1>Layer 1: Schema (XDM)</h1>
  <p class="subtitle">The blueprint layer — defining data structure before collection begins</p>
</div>
<div class="tag-row"><span class="tag key">Blueprint Layer</span><span class="tag new">In AEP</span></div>

<h2>What is a Schema?</h2>
<p>A Schema is the blueprint that defines data structure BEFORE any data is collected. It specifies exactly what fields exist, what data types they use (string, integer, date, boolean, etc.), which fields are required vs optional, and the meaning/description of each field. Schemas are created in Adobe Experience Platform (not in CJA) and are based on the XDM standard. Every dataset must be linked to exactly one schema, ensuring that all data within a dataset conforms to the same structure. Think of a schema as an architectural blueprint for a building — you create the blueprint before construction begins, and it defines exactly what the final structure will contain.</p>

<h2>Schema Components</h2>
<p><strong>Base Class:</strong> The foundation of your schema. The two most common are XDM ExperienceEvent (for behavioral/time-series data like page views, clicks, purchases) and XDM Individual Profile (for person attributes like name, email, loyalty tier). The base class you choose determines the fundamental structure and available field groups.</p>

<p><strong>Field Groups:</strong> Pre-built collections of related fields provided by Adobe. Common field groups include Commerce Details (order, product, cart fields), Web Details (page, referrer, browser fields), Device Details (device type, screen size, OS), Environment Details (IP, geo-location, connection type), and Identity Map (various customer IDs). You add field groups to your schema to inherit all their fields.</p>

<p><strong>Custom Fields:</strong> Your organization-specific fields that don't exist in standard XDM. These are added under your organization's namespace (e.g., _yourcompany.customField). Custom fields allow you to capture business-specific data while maintaining XDM standardization for common fields.</p>

<div class="info-card concept">
  <div class="card-title">🏗️ What You Configure in Schema</div>
  <p>✅ Field names and data types</p>
  <p>✅ Required vs optional fields</p>
  <p>✅ Field descriptions and metadata</p>
  <p>✅ Primary identity field (which field identifies unique individuals)</p>
  <p>❌ NOT Person ID for stitching (that's Connection)</p>
  <p>❌ NOT persistence settings (that's Data View)</p>
  <p>❌ NOT data itself (that's Dataset)</p>
</div>

<h2>Example Schema Structure</h2>
<div class="code-block">Schema: "Web Events"
├─ Base Class: XDM ExperienceEvent
├─ Field Groups:
│  ├─ Commerce Details
│  ├─ Web Details  
│  └─ Environment Details
└─ Custom Fields:
   └─ _mycompany.internalCampaign</div>
`,

"cja-layer2-dataset": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> 4-Layer Architecture</div>
  <h1>Layer 2: Dataset</h1>
  <p class="subtitle">The storage layer — containers holding actual data conforming to schemas</p>
</div>
<div class="tag-row"><span class="tag key">Storage Layer</span><span class="tag new">In AEP</span></div>

<h2>What is a Dataset?</h2>
<p>A Dataset is a container in AEP that stores actual data conforming to a specific schema. If the schema is the blueprint, the dataset is the actual building filled with data. Every dataset is linked to exactly ONE schema, and all data within that dataset must conform to that schema's structure. Datasets are created in Adobe Experience Platform (not CJA), and data is ingested into them through various methods: streaming ingestion (real-time data), batch ingestion (file uploads on schedule), source connectors (pre-built integrations with Salesforce, Google Analytics, etc.), or Adobe SDKs (Web SDK, Mobile SDK).</p>

<h2>Three Dataset Types</h2>
<div class="vs-grid">
  <div class="vs-card">
    <h4 class="layer1">Event Dataset (Time-Series)</h4>
    <p><strong>Purpose:</strong> Behavioral data with timestamps</p>
    <p><strong>Row = </strong>One event (page view, click, purchase)</p>
    <p><strong>Immutable:</strong> Events don't change once recorded</p>
    <p><strong>Examples:</strong> Web events, mobile app interactions, transaction logs</p>
    <p><strong>Schema Base:</strong> XDM ExperienceEvent</p>
  </div>
  <div class="vs-card">
    <h4 class="layer2">Profile Dataset (Entity)</h4>
    <p><strong>Purpose:</strong> Attribute data about entities</p>
    <p><strong>Row = </strong>One person or entity</p>
    <p><strong>Mutable:</strong> Can be updated (person's loyalty tier changes)</p>
    <p><strong>Examples:</strong> Customer master data, product catalog, store locations</p>
    <p><strong>Schema Base:</strong> XDM Individual Profile or custom</p>
  </div>
</div>

<div class="vs-grid" style="grid-template-columns:1fr">
  <div class="vs-card">
    <h4 class="layer3">Lookup Dataset (Reference)</h4>
    <p><strong>Purpose:</strong> Enrichment/reference data joined to other datasets</p>
    <p><strong>Use:</strong> Add descriptive attributes to transactional data</p>
    <p><strong>Examples:</strong> Product details (SKU → Product Name, Category, Price), Store details (Store ID → Location, Square Footage, Manager), Campaign details (Campaign Code → Campaign Name, Budget, Channel)</p>
    <p><strong>Join Key:</strong> Specify which field joins to event datasets</p>
  </div>
</div>

<h2>Dataset Configuration</h2>
<div class="info-card concept">
  <div class="card-title">⚙️ What You Configure in Dataset</div>
  <p>✅ Which schema the dataset uses</p>
  <p>✅ Ingestion method (streaming, batch, connector)</p>
  <p>✅ Data retention in AEP data lake</p>
  <p>✅ Enable for Profile (whether data contributes to Real-Time Customer Profile)</p>
  <p>❌ NOT Person ID (that's Connection)</p>
  <p>❌ NOT Attribution models (that's Data View)</p>
  <p>❌ NOT Derived fields (that's Data View)</p>
</div>

<h2>Real Example</h2>
<div class="info-card success">
  <div class="card-title">✅ Multi-Dataset CJA Setup</div>
  <p><strong>Dataset 1:</strong> "Website Events" — 50M rows (web behavioral data)</p>
  <p><strong>Dataset 2:</strong> "Mobile App Events" — 20M rows (app behavioral data)</p>
  <p><strong>Dataset 3:</strong> "Customer Master" — 500K rows (CRM profile data)</p>
  <p><strong>Dataset 4:</strong> "Product Catalog" — 10K rows (product lookup data)</p>
  <p>All four datasets will be combined in Layer 3 (Connection) for unified analysis.</p>
</div>
`,

"cja-layer3-connection": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> 4-Layer Architecture</div>
  <h1>Layer 3: Connection</h1>
  <p class="subtitle">The combination layer — unifying multiple AEP datasets for cross-channel analysis</p>
</div>
<div class="tag-row"><span class="tag exam">★ Heavily Tested</span><span class="tag key">Critical Layer</span><span class="tag new">In CJA</span></div>

<h2>What is a Connection?</h2>
<p>A Connection is the bridge between Adobe Experience Platform datasets and Customer Journey Analytics. It combines multiple AEP datasets (web, mobile, CRM, call center, POS, email, etc.) into a unified data source that CJA can analyze. This is where cross-channel magic happens — a Connection is what enables you to see a complete customer journey across all touchpoints in a single report. Connections are created and managed in CJA (not in AEP), and they reference datasets that exist in AEP. The Connection configuration includes critical settings that determine HOW data from different sources is unified — most importantly, the Person ID configuration and identity stitching settings.</p>

<h2>Critical Connection Settings</h2>
<div class="info-card danger">
  <div class="card-title">🎯 What You Configure in Connection (EXAM CRITICAL)</div>
  <p><strong>✅ Person ID:</strong> The field that identifies unique individuals across datasets</p>
  <p><strong>✅ Identity Stitching:</strong> Enable field-based or graph-based stitching</p>
  <p><strong>✅ Which Datasets:</strong> Select which AEP datasets to include</p>
  <p><strong>✅ Backfill:</strong> How much historical data to import when connection created</p>
  <p><strong>✅ Data Retention in CJA:</strong> How long data stays in CJA (rolling window)</p>
  <p><strong>✅ Event Dataset Settings:</strong> Person ID, timestamp field for each dataset</p>
  <p>❌ NOT Persistence (that's Data View)</p>
  <p>❌ NOT Attribution models (that's Data View)</p>
  <p>❌ NOT Derived fields (that's Data View)</p>
</div>

<h3>Person ID Configuration</h3>
<p>The Person ID is THE most critical Connection setting. It is the field that identifies unique individuals across all your datasets. Common Person ID choices include email address (user.email or personalEmail.address), customer ID from CRM (customerID or crmId), hashed email (for privacy compliance), or loyalty ID (loyaltyId). The key requirement is that this field must exist and be populated with MATCHING values across all datasets you want to stitch together. If your web dataset uses "email" and your mobile dataset uses "user_email" but they contain the same email addresses as values, CJA can still connect them — the field NAME doesn't have to match, only the VALUES need to match.</p>

<h3>Backfill</h3>
<p>When you first create a Connection, backfill determines how much historical data gets imported from AEP into CJA. For example, if you select "13 months" backfill, CJA will import the last 13 months of data from all connected datasets. This is a one-time import that occurs when the Connection is created or when new datasets are added. Going forward, new data flows in continuously in real-time or near-real-time. Backfill does NOT count against your data retention setting — retention is separate and controls the rolling window of how long data stays in CJA.</p>

<h3>Data Retention in CJA</h3>
<p>This setting controls how long data stays in CJA for analysis. It operates as a rolling window — data older than the retention period is automatically purged. For example, with 25-month retention, at any given moment you have access to the most recent 25 months of data. As new data flows in, the oldest data beyond 25 months is removed. Note that data still exists in AEP (governed by AEP's retention settings) — this setting only controls CJA's copy of the data.</p>

<h2>Example Connection</h2>
<div class="info-card success">
  <div class="card-title">✅ Real Connection Configuration</div>
  <p><strong>Connection Name:</strong> "Global Customer Data"</p>
  <p><strong>Datasets Included (5 total):</strong></p>
  <ul>
    <li>Website Events (Event dataset, 80M rows)</li>
    <li>Mobile App Events (Event dataset, 30M rows)</li>
    <li>CRM Customer Master (Profile dataset, 2M rows)</li>
    <li>Call Center Interactions (Event dataset, 5M rows)</li>
    <li>In-Store POS Transactions (Event dataset, 10M rows)</li>
  </ul>
  <p><strong>Person ID Field:</strong> email (common across all datasets)</p>
  <p><strong>Stitching:</strong> Field-based stitching enabled</p>
  <p><strong>Backfill:</strong> 13 months of historical data</p>
  <p><strong>CJA Data Retention:</strong> 25 months rolling window</p>
  <p><strong>Result:</strong> Unified cross-channel view of customer behavior — web, mobile, CRM, call center, and store data all combined!</p>
</div>
`,

"cja-layer4-dataview": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> 4-Layer Architecture</div>
  <h1>Layer 4: Data View</h1>
  <p class="subtitle">The presentation layer — configuring HOW data appears in reports</p>
</div>
<div class="tag-row"><span class="tag exam">★ Heavily Tested</span><span class="tag key">Critical Layer</span><span class="tag new">In CJA</span></div>

<h2>What is a Data View?</h2>
<p>A Data View is CJA's equivalent of a Report Suite's configuration settings in Adobe Analytics. It sits on top of a Connection and defines HOW the data from that Connection appears in Analysis Workspace reports. Think of it as a lens or filter through which analysts view the data — the underlying data doesn't change, but a Data View controls which fields are visible, how they're labeled, how persistence works, which attribution model is applied, and dozens of other reporting-level configurations. The powerful concept is that ONE Connection can have MANY Data Views, allowing different teams or use cases to have customized reporting configurations from the same underlying data.</p>

<h2>Critical Data View Settings</h2>
<div class="info-card danger">
  <div class="card-title">🎯 What You Configure in Data View (EXAM CRITICAL)</div>
  <p><strong>✅ Component Mapping:</strong> Schema field → Friendly dimension/metric name</p>
  <p><strong>✅ Persistence:</strong> How long dimension values persist (like eVar expiration)</p>
  <p><strong>✅ Attribution Model:</strong> First Touch, Last Touch, Linear, Time Decay, etc.</p>
  <p><strong>✅ Lookback Window:</strong> How far back to look for attribution (session, person, 30 days, etc.)</p>
  <p><strong>✅ Derived Fields:</strong> Create new dimensions by transforming existing fields</p>
  <p><strong>✅ Component Labels:</strong> Friendly names for dimensions and metrics</p>
  <p><strong>✅ Currency Conversion:</strong> Convert multi-currency data to reporting currency</p>
  <p><strong>✅ Session Settings:</strong> Session timeout duration</p>
  <p>❌ NOT Person ID (that's Connection)</p>
  <p>❌ NOT Identity Stitching (that's Connection)</p>
  <p>❌ NOT Which datasets to include (that's Connection)</p>
</div>

<h3>Component Mapping</h2>
<p>Schema fields have technical names like "web.webPageDetails.name" or "commerce.order.priceTotal". In the Data View, you map these XDM field paths to business-friendly names that analysts understand: "web.webPageDetails.name" becomes "Page Name" dimension, "commerce.order.priceTotal" becomes "Revenue" metric. You also decide whether a field is a dimension (green) or metric (blue) in Workspace. This mapping makes technical XDM data accessible to non-technical analysts.</p>

<h3>Persistence Configuration</h2>
<p>Persistence in CJA Data Views works similarly to eVar expiration in Adobe Analytics. You configure how long a dimension value "sticks around" after it's set. Options include: Hit/Event (no persistence — value only on the event where set), Session (persists for entire session), Person (persists across sessions for that person's lifetime), Time-based (7 days, 30 days, 90 days, etc.). For example, you might set "Campaign" dimension to persist for 30 days with Original Value allocation (first-touch attribution). This means when someone clicks a campaign, that campaign value persists for 30 days and gets credit for any conversions during that period.</p>

<h3>Attribution Models</h2>
<p>In the Data View, you can apply attribution models to dimensions. This is similar to Attribution IQ in Adobe Analytics but is configured at the Data View level rather than applied per-analysis. You choose from: First Touch (100% credit to first interaction), Last Touch (100% credit to last interaction), Linear (equal credit to all interactions), Time Decay (more credit to recent interactions), Algorithmic (ML-based credit distribution), Custom (define your own model). The attribution model determines how conversion credit is distributed when a customer has multiple touchpoints with different dimension values before converting.</p>

<h3>Derived Fields</h2>
<p>Derived Fields allow you to create new dimensions by transforming existing schema fields using logic rules — all without changing the underlying data or requiring IT involvement. This is one of CJA's most powerful features. Examples: IF device.screenWidth < 768 THEN "Mobile" ELSE IF device.screenWidth < 1024 THEN "Tablet" ELSE "Desktop" (creates Device Category dimension), Combine firstName + " " + lastName (creates Full Name dimension), Extract domain from email address using regex, Categorize revenue into tiers (<$50, $50-$100, $100-$500, $500+), Parse URL parameters to extract utm_source. Derived Fields are computed at query time, so they can be changed at any time without data reprocessing.</p>

<h2>Multiple Data Views from One Connection</h2>
<div class="vs-grid">
  <div class="vs-card">
    <h4 class="layer3">Marketing Team Data View</h4>
    <p><strong>Attribution:</strong> Last Touch</p>
    <p><strong>Lookback:</strong> 30 days</p>
    <p><strong>Session Timeout:</strong> 30 minutes</p>
    <p><strong>Focus:</strong> Campaign performance, conversion funnel</p>
    <p><strong>Components:</strong> Marketing-focused dimensions visible</p>
  </div>
  <div class="vs-card">
    <h4 class="layer4">Product Team Data View</h4>
    <p><strong>Attribution:</strong> Linear</p>
    <p><strong>Lookback:</strong> Person lifetime</p>
    <p><strong>Session Timeout:</strong> 60 minutes</p>
    <p><strong>Focus:</strong> Feature engagement, retention</p>
    <p><strong>Components:</strong> Product-focused dimensions visible</p>
  </div>
</div>

<p style="margin-top:16px;font-size:13px;color:var(--text-dim)">Same underlying data (Connection), but two completely different reporting configurations for different analytical needs. This is the power of Data Views.</p>
`,

"cja-identity-stitching": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Identity & Stitching</div>
  <h1>What is Identity Stitching?</h1>
  <p class="subtitle">Connecting different identifiers to recognize the same person across devices and channels</p>
</div>
<div class="tag-row"><span class="tag exam">★ Critical Concept</span><span class="tag key">Cross-Device</span></div>

<h2>The Problem Without Stitching</h2>
<div class="info-card danger">
  <div class="card-title">❌ Fragmented Customer View</div>
  <p>Sarah appears as 4 different "people" in your analytics:</p>
  <ul>
    <li><strong>Person 1:</strong> Cookie ABC123 (anonymous web browsing)</li>
    <li><strong>Person 2:</strong> Email sarah@example.com (logged-in web session)</li>
    <li><strong>Person 3:</strong> Device ID XYZ789 (mobile app usage)</li>
    <li><strong>Person 4:</strong> Customer ID CUST456 (CRM system)</li>
  </ul>
  <p><strong>Result:</strong> 4 unique "people", fragmented journey, no cross-channel insights, inflated user counts, broken attribution</p>
</div>

<h2>The Solution With Stitching</h2>
<div class="info-card success">
  <div class="card-title">✅ Unified Customer View</div>
  <p>Identity Stitching recognizes that all 4 IDs belong to the SAME person:</p>
  <p style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;margin:12px 0;color:var(--green)">
    cookie ABC123 ↔ sarah@example.com ↔ deviceID XYZ789 ↔ customer CUST456<br>
    <strong>= 1 Unified Person</strong>
  </p>
  <p><strong>Result:</strong> 1 unified person profile, complete cross-channel journey visible, accurate attribution, true unique user count</p>
</div>

<h2>How Stitching Works</h2>
<p><strong>Step 1:</strong> Configure Person ID in Connection (e.g., email field)</p>
<p><strong>Step 2:</strong> Enable stitching (field-based or graph-based method)</p>
<p><strong>Step 3:</strong> Real-time stitching — new events matched instantly if Person ID present</p>
<p><strong>Step 4:</strong> Replay stitching — historical data re-processed daily/weekly when new ID connections discovered</p>

<p>The replay process is critical: When Sarah browses anonymously (cookie ABC123) on Monday, then logs in on Tuesday revealing her email, the replay job runs and goes BACK to Monday's anonymous data and updates it to show that cookie ABC123 = sarah@example.com. Her entire history is now unified!</p>
`,

"cja-person-id": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Identity & Stitching</div>
  <h1>Person ID Configuration</h1>
  <p class="subtitle">The single most critical Connection setting — the key that unifies your data</p>
</div>
<div class="tag-row"><span class="tag exam">★ Exam Favorite</span><span class="tag key">Must Know</span></div>

<h2>Where Person ID is Configured</h2>
<div class="info-card danger">
  <div class="card-title">🎯 EXAM CRITICAL — Know This Cold</div>
  <p><strong>Question:</strong> "Where do you configure the Person ID for stitching in CJA?"</p>
  <p>❌ Schema — Defines fields but doesn't specify stitching ID</p>
  <p>❌ Dataset — Stores data but doesn't configure stitching</p>
  <p>✅ <strong>CONNECTION</strong> — This is where Person ID is configured!</p>
  <p>❌ Data View — Controls reporting, not identity stitching</p>
</div>

<h2>Choosing the Right Person ID</h2>
<p>The Person ID field must meet several criteria: It should exist across ALL datasets you want to stitch, it should have matching VALUES (not necessarily matching field NAMES), it should be stable over time (doesn't change for the same person), and it should be privacy-compliant (consider using hashed identifiers if needed). Common Person ID choices:</p>

<table class="data-table">
<thead><tr><th>Person ID Type</th><th>Field Example</th><th>Pros</th><th>Cons</th></tr></thead>
<tbody>
<tr><td><strong>Email</strong></td><td>personalEmail.address</td><td>Widely available, stable, cross-device</td><td>Privacy concerns, not always captured when anonymous</td></tr>
<tr><td><strong>Customer ID</strong></td><td>customerID or crmId</td><td>Unique, from authoritative source (CRM)</td><td>Only available after login/registration</td></tr>
<tr><td><strong>Hashed Email</strong></td><td>hashedEmail</td><td>Privacy-friendly, still stable</td><td>Requires consistent hashing algorithm</td></tr>
<tr><td><strong>Loyalty ID</strong></td><td>loyaltyId</td><td>Stable, unique</td><td>Only for loyalty program members</td></tr>
</tbody>
</table>

<h2>Person ID Across Multiple Datasets</h2>
<div class="info-card concept">
  <div class="card-title">🔗 Cross-Dataset Stitching Example</div>
  <p><strong>Dataset 1 (Web):</strong> person.email field</p>
  <p><strong>Dataset 2 (Mobile):</strong> user_email field</p>
  <p><strong>Dataset 3 (CRM):</strong> customer_email field</p>
  <p><strong>Connection Config:</strong> Person ID = email (specified for each dataset)</p>
  <p><strong>Matching Logic:</strong> If person.email = "sarah@example.com" AND user_email = "sarah@example.com" AND customer_email = "sarah@example.com", then all three records belong to the SAME person</p>
  <p>Field names don't have to match — only the VALUES need to match for stitching to work!</p>
</div>
`,

"cja-field-stitching": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Identity & Stitching</div>
  <h1>Field-Based Stitching</h1>
  <p class="subtitle">Direct field value matching to connect identities — simple, deterministic, and most commonly used</p>
</div>
<div class="tag-row"><span class="tag key">Stitching Method 1</span></div>

<h2>How Field-Based Stitching Works</h2>
<p>Field-based stitching is the simpler and most commonly used stitching method. It works by matching on a common field value (typically email or customer ID) across different datasets. The logic is straightforward: if multiple records have the same value in the Person ID field, they belong to the same person. This is a deterministic approach — there's no probability or guessing involved. Either the values match exactly (same person) or they don't (different people).</p>

<h2>Matching Process</h2>
<div class="info-card success">
  <div class="card-title">✅ Example Matching</div>
  <p><strong>Web Event:</strong> email = "sarah@example.com", cookie = "ABC123"</p>
  <p><strong>Mobile Event:</strong> email = "sarah@example.com", deviceID = "XYZ789"</p>
  <p><strong>CRM Record:</strong> email = "sarah@example.com", customerID = "CUST456"</p>
  <p style="margin-top:12px"><strong>Stitching Result:</strong> All three records linked via email = "sarah@example.com"</p>
  <p>Now when you query CJA, these three events are recognized as the same person. You can see Sarah's complete journey: anonymous web browsing → mobile app usage → CRM registration — all unified!</p>
</div>

<h2>Advantages</h2>
<p>✅ Simple and easy to understand<br>✅ Deterministic (no guessing or probability)<br>✅ Easy to debug and troubleshoot<br>✅ No dependency on external identity graphs<br>✅ Works with any common identifier field<br>✅ Privacy-friendly (can use hashed IDs)</p>

<h2>Limitations</h2>
<p>❌ Requires common identifier across datasets (if datasets don't share a field with matching values, they can't be stitched)<br>❌ Cannot connect IDs without direct link (if Cookie A links to Email B, and Email B links to Device C, field-based stitching does NOT automatically connect Cookie A to Device C — no transitive matching)<br>❌ Late-binding only (stitching happens after data collection)</p>
`,

"cja-graph-stitching": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Identity & Stitching</div>
  <h1>Graph-Based Stitching</h1>
  <p class="subtitle">Using Adobe's Identity Service graph for more comprehensive cross-device recognition</p>
</div>
<div class="tag-row"><span class="tag key">Stitching Method 2</span><span class="tag new">Advanced</span></div>

<h2>How Graph-Based Stitching Works</h2>
<p>Graph-based stitching leverages Adobe's Identity Service, which builds and maintains identity graphs that understand relationships between different identifiers. Unlike field-based stitching (which only matches direct field values), graph-based stitching can make transitive connections — if it knows that Cookie A is linked to Email B, and Email B is linked to Device C, the graph understands that Cookie A and Device C belong to the same person even though they never directly appeared together. This provides more comprehensive stitching, especially for complex cross-device scenarios.</p>

<h2>Transitive Matching Example</h2>
<div class="info-card concept">
  <div class="card-title">🔗 The Power of Identity Graphs</div>
  <p><strong>Day 1:</strong> User browses on laptop (cookie ABC123), then logs in → Identity Service learns: cookie ABC123 ↔ email sarah@example.com</p>
  <p><strong>Day 2:</strong> User opens mobile app on phone, logs in → Identity Service learns: email sarah@example.com ↔ deviceID XYZ789</p>
  <p><strong>Graph Inference:</strong> Identity Service now knows: cookie ABC123 ↔ deviceID XYZ789 (even though cookie and device never appeared together!)</p>
  <p><strong>Result:</strong> Laptop browsing and phone app usage are now recognized as the same person, providing complete cross-device journey visibility</p>
</div>

<h2>Advantages Over Field-Based</h2>
<p>✅ More comprehensive stitching (transitive connections)<br>✅ Handles complex identity relationships<br>✅ Better cross-device recognition<br>✅ Identity graph continuously learns and improves<br>✅ Can connect identifiers that never appeared together</p>

<h2>Considerations</h2>
<p>Graph-based stitching requires Adobe Identity Service to be implemented and building identity graphs. It's more complex to understand and troubleshoot than field-based. Graph quality depends on the completeness of identity data being collected. For most organizations, field-based stitching is sufficient and simpler to implement.</p>
`,

"cja-replay": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Identity & Stitching</div>
  <h1>Replay Process</h1>
  <p class="subtitle">Re-processing historical data when new identity connections are discovered</p>
</div>
<div class="tag-row"><span class="tag key">Critical Feature</span><span class="tag exam">Heavily Tested</span></div>

<h2>Why Replay Matters</h2>
<p>The replay process is what makes stitching truly powerful. Here's the problem it solves: Users often browse anonymously BEFORE logging in and revealing their identity. Without replay, all that anonymous activity would remain unconnected to their authenticated identity. Replay fixes this by going back through historical data and updating identities when new connections are discovered.</p>

<h2>The Anonymous → Authenticated Journey</h2>
<div class="info-card success">
  <div class="card-title">✅ Complete Replay Example</div>
  <p><strong>Monday 10 AM:</strong> Sarah browses anonymously on her laptop</p>
  <ul>
    <li>Person ID: temp_999 (temporary anonymous ID)</li>
    <li>Cookie: ABC123</li>
    <li>Activities: Viewed 5 product pages, added item to cart</li>
  </ul>
  
  <p><strong>Tuesday 2 PM:</strong> Sarah returns and logs in</p>
  <ul>
    <li>Identity Service learns: cookie ABC123 ↔ email sarah@example.com</li>
    <li>Person ID updated: sarah@example.com</li>
  </ul>
  
  <p><strong>Tuesday Night:</strong> Replay job runs (scheduled daily)</p>
  <ul>
    <li>Replay looks back at all events with cookie ABC123</li>
    <li>Finds Monday's anonymous browsing</li>
    <li>Updates Person ID: temp_999 → sarah@example.com</li>
  </ul>
  
  <p><strong>Result:</strong> Monday's anonymous activity is now attributed to sarah@example.com. Her complete unified history is now available for analysis — no data is left fragmented!</p>
</div>

<h2>Replay Schedule</h2>
<p>Replay jobs typically run on a schedule configured in your Connection settings: Daily replay (most common — runs every 24 hours to catch yesterday's new identity connections), Weekly replay (less frequent but processes longer lookback window), Manual replay (triggered on-demand by administrators). Each replay job looks back over a specified window (e.g., last 7 days, last 30 days) to find events that can now be re-attributed based on newly discovered identity links.</p>

<div class="info-card danger">
  <div class="card-title">🎯 Exam Question Pattern</div>
  <p><strong>Q:</strong> "A user browses anonymously for 3 days, then logs in on day 4. What happens to the anonymous browsing data?"</p>
  <p>❌ Wrong: "It remains anonymous forever"</p>
  <p>❌ Wrong: "It's immediately stitched when they log in"</p>
  <p>✅ Correct: "The next replay job will stitch the anonymous data to their authenticated identity"</p>
</div>

"cja-ropo": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> Cross-Channel Analysis</div>
  <h1>ROPO Analysis</h1>
  <p class="subtitle">Research Online, Purchase Offline — understanding digital's impact on physical store sales</p>
</div>
<div class="tag-row"><span class="tag key">Use Case</span></div>

<h2>Understanding ROPO Behavior</h2>
<p>ROPO (Research Online, Purchase Offline) is a common customer behavior pattern where digital channels drive physical store purchases. Customers browse products on your website, read reviews on mobile, compare prices across channels — all digitally — but complete the actual purchase transaction in a physical retail store. Traditional analytics (Adobe Analytics) cannot connect online research to offline purchases because they exist in separate systems. CJA solves this by unifying online and offline data through stitching, making the complete ROPO journey visible.</p>

<h2>Why ROPO is Critical for Retailers</h2>
<p>Without visibility into ROPO behavior, digital channels appear to underperform: Web analytics shows lots of traffic, product views, but low conversion rates. Store systems show high sales but no attribution to what drove them. Marketing teams might incorrectly conclude that digital is ineffective and reduce investment. With CJA's cross-channel view, you discover that digital research drives significant in-store sales — completely changing budget allocation and strategy decisions.</p>

<h2>Complete ROPO Journey in CJA</h2>
<div class="info-card success">
  <div class="card-title">✅ End-to-End ROPO Visibility</div>
  <p><strong>Monday:</strong> Sarah searches for "running shoes" on website (web dataset captures search term, product views)</p>
  <p><strong>Tuesday:</strong> Sarah reads reviews on mobile app (mobile dataset captures app engagement, review reads)</p>
  <p><strong>Wednesday:</strong> Sarah calls store to check inventory (call center dataset captures phone call, product inquiry)</p>
  <p><strong>Saturday:</strong> Sarah visits store and purchases shoes for $120 (POS dataset captures in-store transaction)</p>
  <p style="margin-top:12px;"><strong>CJA Report Shows:</strong></p>
  <ul>
    <li>Person: sarah@example.com (unified via stitching)</li>
    <li>First Touch Channel: Organic Search (web)</li>
    <li>Touchpoints: Web (2 sessions) → Mobile (1 session) → Call Center (1 call) → Store (1 visit)</li>
    <li>Total Touchpoints: 5 across 4 channels over 5 days</li>
    <li>Conversion: $120 in-store purchase</li>
    <li>Attribution: Organic Search gets credit for initiating journey that led to store sale</li>
  </ul>
  <p><strong>Business Impact:</strong> Organic search now properly credited with driving $120 store sale, not just "bounce" from website!</p>
</div>

"cja-cja-filters": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> CJA Components</div>
  <h1>Filters (CJA Segments)</h1>
  <p class="subtitle">CJA's term for segments — isolating specific subsets of people, sessions, or events</p>
</div>
<div class="tag-row"><span class="tag key">Terminology</span><span class="tag exam">30% of Exam</span></div>

<h2>Critical Terminology Change</h2>
<div class="info-card danger">
  <div class="card-title">🎯 EXAM CRITICAL — Use CJA Terms!</div>
  <p>In CJA, segments are called <strong>FILTERS</strong>. Using Adobe Analytics terminology will lead to wrong answers!</p>
  <table class="data-table" style="margin-top:12px">
  <thead><tr><th>Adobe Analytics</th><th>Customer Journey Analytics</th></tr></thead>
  <tbody>
  <tr><td>Segment</td><td><strong>Filter</strong></td></tr>
  <tr><td>Hit</td><td><strong>Event</strong></td></tr>
  <tr><td>Visit</td><td><strong>Session</strong></td></tr>
  <tr><td>Visitor</td><td><strong>Person</strong></td></tr>
  </tbody>
  </table>
  <p style="margin-top:12px">When the exam asks about creating a "segment" or references "visitors," translate mentally to Filter and Person!</p>
</div>

<h2>Filter Container Types</h2>
<p>CJA Filters use the same three-level container hierarchy as AA segments, but with renamed containers:</p>

<p><strong>Event Container (smallest):</strong> Returns only specific events matching the condition. Equivalent to Hit container in AA. Use when you want to analyze specific actions in isolation.</p>

<p><strong>Session Container (medium):</strong> Returns all events within sessions where the condition was met at least once. Equivalent to Visit container in AA. Use when you want to understand complete sessions/visits.</p>

<p><strong>Person Container (largest):</strong> Returns all data for people who ever met the condition across their entire lifetime. Equivalent to Visitor container in AA. Use for lifetime behavioral analysis.</p>

<div class="diagram">
  <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px">Container Hierarchy in CJA</div>
  <div class="flow">
    <div class="flow-box layer5" style="padding:12px 18px">EVENT<br><small>(Hit)</small></div>
    <div class="flow-arrow">⊂</div>
    <div class="flow-box layer3" style="padding:14px 22px">SESSION<br><small>(Visit)</small></div>
    <div class="flow-arrow">⊂</div>
    <div class="flow-box layer1" style="padding:18px 28px">PERSON<br><small>(Visitor)</small></div>
  </div>
</div>

<h2>Cross-Channel Filter Example</h2>
<div class="info-card success">
  <div class="card-title">✅ Multi-Channel Filter</div>
  <p><strong>Filter Name:</strong> "Omnichannel Customers"</p>
  <p><strong>Container:</strong> Person</p>
  <p><strong>Conditions:</strong></p>
  <ul>
    <li>Web events exist (any web activity)</li>
    <li>AND Mobile app events exist (any app activity)</li>
    <li>AND Store purchases exist (any in-store transaction)</li>
  </ul>
  <p><strong>Result:</strong> Returns ALL data for people who have used web + mobile app + physical store</p>
  <p><strong>Use Case:</strong> Analyze behavior of your most engaged omnichannel customers — these are typically your highest-value segments!</p>
</div>
`,

"cja-cja-dimensions": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> CJA Components</div>
  <h1>Dimensions & Metrics in CJA</h1>
  <p class="subtitle">Unlimited flexibility — any schema field can become a dimension or metric</p>
</div>
<div class="tag-row"><span class="tag key">No Limits</span></div>

<h2>CJA vs AA — The Key Difference</h2>
<table class="data-table">
<thead><tr><th>Feature</th><th>Adobe Analytics</th><th>Customer Journey Analytics</th></tr></thead>
<tbody>
<tr><td><strong>Custom Dimensions</strong></td><td>Limited: 75 props + 250 eVars = 325 total</td><td><strong>UNLIMITED</strong> — any schema field</td></tr>
<tr><td><strong>Custom Metrics</strong></td><td>Limited: 1000 custom events</td><td><strong>UNLIMITED</strong> — any numeric schema field</td></tr>
<tr><td><strong>Configuration Required?</strong></td><td>Yes — must pre-configure variables in implementation</td><td>No — just add fields to schema, map in Data View</td></tr>
<tr><td><strong>Implementation Changes?</strong></td><td>Yes — need code changes to add new props/eVars</td><td>No — add fields to schema without implementation changes</td></tr>
</tbody>
</table>

<h2>Creating Dimensions in CJA</h2>
<p>In CJA, you don't "configure props or eVars" — you simply map schema fields to dimensions in your Data View. The process is: Data exists in AEP dataset with XDM schema fields → In CJA Data View, drag schema field into Components → Specify whether it's a dimension (categorical) or metric (numeric) → Give it a friendly label → Configure persistence, attribution, format as needed → Done! The dimension is now available in Analysis Workspace.</p>

<h2>Example Dimension Mappings</h2>
<div class="code-block">// Web behavior dimensions
web.webPageDetails.name           → "Page Name" (dimension)
web.webReferrer.URL                → "Referring URL" (dimension)
device.type                        → "Device Type" (dimension)

// Commerce dimensions
commerce.order.priceTotal          → "Revenue" (metric)
commerce.productListItems.name     → "Product Name" (dimension)
commerce.productListItems.quantity → "Units Sold" (metric)

// Custom business dimensions
_yourcompany.customerTier          → "Customer Tier" (dimension)
_yourcompany.subscriptionStatus    → "Subscription Status" (dimension)
_yourcompany.internalCampaignCode  → "Internal Campaign" (dimension)</div>

<p>Every schema field can become a dimension or metric — no variable limits!</p>
`,

"cja-derived-fields": `
<div class="content-header">
  <div class="breadcrumb">Customer Journey Analytics <span class="sep">›</span> CJA Components</div>
  <h1>Derived Fields</h1>
  <p class="subtitle">Transform schema fields into new dimensions at query time — no data reprocessing needed</p>
</div>
<div class="tag-row"><span class="tag key">Powerful Feature</span><span class="tag new">Data View</span></div>

<h2>What are Derived Fields?</h2>
<p>Derived Fields are one of CJA's most powerful features. They allow you to create new dimensions by transforming existing schema fields using business logic rules — all within the Data View interface, without touching your data, without changing schemas, and without IT involvement. Derived Fields are calculated at query time, which means they can be changed at any time without data reprocessing. If you realize your device categorization logic needs adjustment, you just update the Derived Field definition — instantly, all historical data reflects the new logic.</p>

<h2>Common Derived Field Use Cases</h2>

<h3>1. Categorizing Continuous Values</h3>
<div class="info-card concept">
  <div class="card-title">📊 Example: Device Category from Screen Width</div>
  <p><strong>Logic:</strong></p>
  <div class="code-block">IF device.screenWidth < 768 THEN "Mobile"
ELSE IF device.screenWidth < 1024 THEN "Tablet"  
ELSE "Desktop"</div>
  <p><strong>Result:</strong> New dimension "Device Category" created from numeric screen width field</p>
</div>

<h3>2. Combining Multiple Fields</h3>
<div class="info-card concept">
  <div class="card-title">🔤 Example: Full Name</div>
  <p><strong>Logic:</strong> CONCATENATE(person.firstName, " ", person.lastName)</p>
  <p><strong>Result:</strong> "John" + " " + "Smith" = "John Smith" as new dimension</p>
</div>

<h3>3. Parsing Strings</h3>
<div class="info-card concept">
  <div class="card-title">🌐 Example: Email Domain</div>
  <p><strong>Logic:</strong> REGEX_EXTRACT(personalEmail.address, "@(.+)$")</p>
  <p><strong>Result:</strong> Extract domain from "sarah@example.com" → "example.com"</p>
</div>

<h3>4. Revenue Tiers</h3>
<div class="info-card concept">
  <div class="card-title">💰 Example: Order Size Category</div>
  <p><strong>Logic:</strong></p>
  <div class="code-block">IF commerce.order.priceTotal < 50 THEN "Small Order"
ELSE IF commerce.order.priceTotal < 200 THEN "Medium Order"
ELSE IF commerce.order.priceTotal < 500 THEN "Large Order"
ELSE "Enterprise Order"</div>
  <p><strong>Result:</strong> Revenue bucketed into business-meaningful categories</p>
</div>

<h2>Benefits of Derived Fields</h2>
<p>✅ No data reprocessing required — changes apply instantly to all historical data<br>✅ No implementation changes — all configuration done in Data View UI<br>✅ Query-time calculation — flexible and fast<br>✅ Business users can create them — no developer needed<br>✅ Doesn't change underlying data — completely non-destructive<br>✅ Can be modified anytime — iterative refinement possible</p>

<div class="info-card danger">
  <div class="card-title">🎯 Exam Question Pattern</div>
  <p><strong>Q:</strong> "Where do you create Derived Fields in CJA?"</p>
  <p>❌ Schema — Defines raw fields, not transformations</p>
  <p>❌ Dataset — Stores data, doesn't transform it</p>
  <p>❌ Connection — Combines data, doesn't transform it</p>
  <p>✅ <strong>Data View</strong> — This is where Derived Fields are created!</p>
</div>
`,

"cja-cja-attribution": `

<div class="tag-row"><span class="tag key">Cross-Channel</span></div>

<h2>CJA Attribution Power</h2>
<p>The key difference between AA and CJA attribution is that CJA can attribute OFFLINE conversions (store purchases, call center sales) back to DIGITAL touchpoints (web, mobile, email). This is transformational for businesses with physical locations or multiple channels. In AA, you can only attribute digital conversions (online purchases) to digital touchpoints. CJA breaks this limitation — you can see which Facebook ad drove someone to research online and eventually purchase in-store. You can measure which email campaigns lead to phone calls that convert to sales. You can understand which mobile app features drive users to visit physical locations.</p>

<h2>Cross-Channel Attribution Example</h2>
<div class="info-card success">
  <div class="card-title">✅ Complete Journey Attribution</div>
  <p><strong>Journey:</strong> Facebook Ad → Website → Email → Mobile App → Call Center → Store Purchase ($500)</p>

  <p><strong>Last Touch:</strong> Store Visit gets $500 (conversion channel credit)</p>

  <p><strong>Time Decay:</strong> Store $200, Call $150, App $80, Email $40, Web $20, Facebook $10</p>

"cja-cja-distribution": `
<div class="content-header">

<h2>Sharing Projects</h2>
<p>CJA Workspace projects can be shared with other CJA users in your organization. You can share with specific individuals or groups, and you can control permissions: Edit (recipient can modify the project), Duplicate (recipient can copy but not modify original), or View only (recipient can view but not change). When you share a project, the recipient sees data based on THEIR Data View permissions — so if you share a project but they don't have access to the underlying Data View, they won't see any data. This is an important security concept for the exam.</p>

<h2>Scheduling Reports</h2>
<p>You can schedule Workspace projects to be automatically delivered via email on a recurring schedule (daily, weekly, monthly). The scheduled report is delivered as a PDF or CSV file attached to an email. When scheduling, you specify recipients, frequency, date range (rolling or fixed), and file format. Scheduled reports continue to run until you manually stop them or until a specified end date.</p>

<h2>Export Options</h2>
<p><strong>PDF Export:</strong> Generates a PDF document of the Workspace project as it appears on screen. Preserves visualizations and formatting. Good for stakeholder presentations.</p>
<p><strong>CSV Export:</strong> Exports Freeform Table data as comma-separated values. Only exports data (not visualizations). Good for further analysis in Excel or other tools.</p>
<p><strong>Send File Now:</strong> One-time immediate delivery via email.</p>
<p><strong>Send File on Schedule:</strong> Recurring automated delivery.</p>

// Add the AI quiz checking function
function checkQuiz(btn, type) {
    const card = btn.closest('.quiz-card');
    const options = card.querySelectorAll('.quiz-option');
    const explain = card.querySelector('.quiz-explain');
    
    options.forEach(opt => {
        opt.disabled = true;
        opt.style.cursor = 'not-allowed';
    });
    
    if (type === 'correct') {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        // Find and highlight the correct answer
        options.forEach(opt => {
            if (opt.onclick.toString().includes("'correct'")) {
                opt.classList.add('correct');
            }
        });
    }
    
    if (explain) {
        explain.style.display = 'block';
    }
}

// Add smooth rendering and navigation
let currentExam = 'aa';
let currentTopic = '';

function switchExam(exam, evt) {
    currentExam = exam;
    const tabs = document.querySelectorAll('.exam-tab');
    tabs.forEach(t => t.classList.remove('active'));
    (evt ? evt.target : event.target).classList.add('active');

    renderNav();
    if (DATA[exam].sections[0] && DATA[exam].sections[0].items[0]) {
        loadTopic(DATA[exam].sections[0].items[0].id);
    }
}

function renderNav() {
    const nav = document.getElementById('sidebar-nav');
    const sections = DATA[currentExam].sections;
    
    let html = '';
    sections.forEach(section => {
        html += `<div class="nav-section">`;
        html += `<div class="nav-section-title">${section.title}</div>`;
        section.items.forEach(item => {
            const active = currentTopic === item.id ? 'active' : '';
            html += `<div class="nav-item ${active}" onclick="loadTopic('${item.id}')">`;
            html += `<span class="dot todo"></span>${item.title}`;
            html += `</div>`;
        });
        html += `</div>`;
    });
    
    nav.innerHTML = html;
}

function loadTopic(topicId) {
    currentTopic = topicId;
    const contentKey = `${currentExam}-${topicId}`;
    const content = CONTENT[contentKey] || `<div class="content-header"><h1>Coming Soon</h1><p>This section is being prepared.</p></div>`;
    
    document.getElementById('content-area').innerHTML = content;
    renderNav();
    
    // Smooth scroll to top
    document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
}

function filterNav() {
    const searchTerm = document.getElementById('search').value.toLowerCase();
    const items = document.querySelectorAll('.nav-item');
    
    items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(searchTerm) ? 'flex' : 'none';
    });
}

// Initialize on load
window.addEventListener('DOMContentLoaded', () => {
    renderNav();
    if (DATA.aa.sections[0] && DATA.aa.sections[0].items[0]) {
        loadTopic(DATA.aa.sections[0].items[0].id);
    }
    updateProgress();
});

function updateProgress() {
    const progressText = document.getElementById('prog-text');
    const progressCircle = document.getElementById('prog-circle');
    
    // Calculate progress (example: 60%)
    const progress = 60;
    progressText.textContent = progress + '%';
    
    const circumference = 2 * Math.PI * 16;
    const offset = circumference - (progress / 100) * circumference;
    progressCircle.style.strokeDashoffset = offset;
}
</script>
