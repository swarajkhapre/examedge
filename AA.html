</div>

<h2>Key Mindset Tips</h2>
<p>The exam tests practical, scenario-based knowledge — not rote memorization. Questions are typically framed as "A business stakeholder wants to understand X. Which variable/visualization/approach should you use?" You need to think like an analyst solving real business problems. When you see a question, first identify what the business is trying to accomplish, then match that to the correct Adobe Analytics feature. The exam does not test implementation code syntax heavily — it focuses on the "what" and "why" rather than the "how" of coding.</p>
`,

"aa-tricky-questions": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Exam Overview</div>
  <h1>Tricky Question Patterns</h1>
  <p class="subtitle">Common exam traps and how to avoid them — based on real candidate experiences and official sample questions</p>
</div>
<div class="tag-row"><span class="tag exam">★ Exam Critical</span><span class="tag danger">⚠ Traps</span></div>

<h2>Trap #1: Source vs Storage Confusion</h2>
<p>This is arguably the most common trick in the entire exam. Adobe intentionally designs questions that blur the line between WHERE data comes FROM (the source) and WHERE data is STORED (the variable). The tracking code dimension is the classic example. When a question asks "How is the tracking code dimension populated?", the correct answer is "URL query string parameters" — because that is the SOURCE of the data. The wrong but tempting answer is "eVar" — because that is where the value gets STORED after JavaScript reads it from the URL. The exam tests whether you understand this distinction. Always ask yourself: "Is this question asking about the origin of the data or where it lives in Adobe?"</p>

<div class="quiz-card">
  <div class="q-label">Practice Question</div>
  <div class="q-text">How is the tracking code dimension populated in Adobe Analytics?</div>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">A) eVar variable</button>
  <button class="quiz-option" onclick="checkQuiz(this,'correct')">B) URL query string parameters</button>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">C) v0 query parameter</button>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">D) Processing rules</button>
  <div class="quiz-explain"><strong>Explanation:</strong> The tracking code comes FROM the URL query string (e.g., ?cid=summer_campaign). The JavaScript (AppMeasurement) reads this parameter and sets s.campaign. The eVar is where it is stored, not where it originates. "v0" is Adobe's internal server-side format. Processing rules modify data after collection. Source ≠ Storage!</div>
</div>

<h2>Trap #2: Container Scope Misunderstanding</h2>
<p>Questions about segment containers are designed to test whether you truly understand the cascading scope of Hit → Visit → Visitor. The trap is assuming that a Visitor container with condition "Page = Cart" only returns cart page views. In reality, a VISITOR container returns ALL data for any visitor who EVER viewed the cart page — including their homepage visits, product views, and every other interaction across their entire lifetime. Similarly, a Visit container includes ALL hits within qualifying visits, not just the specific hits that match. Only the Hit container gives you exactly the matching hits and nothing more. When you see a container question, mentally expand the scope to understand what additional data gets included.</p>

<h2>Trap #3: Fallout vs Flow Keyword Confusion</h2>
<p>The exam loves testing whether you know when to use Fallout vs Flow visualizations. The keyword "sequential" or "customer journey" almost always points to FALLOUT. Fallout shows a pre-defined sequence of steps with conversion and drop-off rates at each stage. Flow is for path exploration — discovering what paths users actually take (not pre-defined). If a question mentions "sequential journey," "step-by-step funnel," or "conversion rates between defined steps," the answer is always Fallout. If it mentions "discover navigation paths," "explore user behavior," or "see where users go," it is Flow.</p>

<h2>Trap #4: s.t() vs s.tl() Page View Count</h2>
<p>A classic question asks: "A user clicks a download link on your site. Does the page views metric increase?" The answer is NO. Download clicks are tracked with s.tl() (link tracking), which creates a server call but does NOT increment the page views metric. Only s.t() (page view tracking) increments page views. The trap is that people assume all server calls equal page views — they do not.</p>

<h2>Trap #5: Props Cannot Attribute Conversions</h2>
<p>If a question asks about tracking something for "conversion attribution" or "understanding what led to a purchase," the answer is ALWAYS eVar, never prop. Props have zero persistence — they only exist on the exact hit where they are set. Since conversions happen on later hits, props cannot connect the dots. Only eVars persist across hits to enable attribution.</p>
`,

"aa-what-is-aa": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Fundamentals</div>
  <h1>What is Adobe Analytics?</h1>
  <p class="subtitle">Understanding the industry-leading digital analytics platform and its core capabilities</p>
</div>
<div class="tag-row"><span class="tag key">Foundation</span><span class="tag tip">Start Here</span></div>

<h2>The Digital Analytics Problem</h2>
<p>Adobe Analytics is the industry-leading enterprise digital analytics platform that transforms invisible digital behavior into observable, measurable, and actionable insights. In the physical retail world, store managers can directly observe customers — watching them browse aisles, noting which products they pick up, overhearing their conversations, and seeing when they leave without purchasing. This natural observability does not exist in the digital world. When someone visits a website or uses a mobile app, their behavior is completely invisible unless you have analytics instrumentation in place. Adobe Analytics solves this fundamental problem by collecting, processing, and reporting on every digital interaction a user has with your properties. It captures page views, clicks, scrolls, form submissions, video plays, purchases, and hundreds of other behavioral signals. These raw interactions are then organized into meaningful dimensions and metrics that allow business stakeholders to understand user behavior, measure campaign effectiveness, optimize conversion funnels, and make data-driven decisions. The platform is used by over 80% of Fortune 100 companies and processes trillions of server calls annually, making it the most widely deployed enterprise analytics solution in the world.</p>

<h2>Core Capabilities</h2>
<p><strong>Data Collection:</strong> Adobe Analytics captures every user interaction through JavaScript libraries (AppMeasurement.js or the modern Web SDK), mobile SDKs, and server-side integrations. Data is collected in real-time and includes contextual information like device type, browser, geographic location, referring domain, and marketing channel attribution. The collection layer is highly configurable — organizations define which variables to capture and how they map to business concepts.</p>

<p><strong>Analysis Workspace:</strong> The primary interface for analysis is Analysis Workspace — a powerful drag-and-drop environment where analysts can build custom reports without writing code. Workspace supports Freeform Tables (the most flexible report type), multiple visualization types (line charts, bar charts, area charts, scatter plots, donuts, treemaps), multiple panels in a single project, and real-time collaboration. It replaced the older Reports & Analytics interface and is now the standard analysis tool.</p>

<p><strong>Segmentation:</strong> Adobe Analytics provides a sophisticated segmentation engine with three container levels (Hit, Visit, Visitor), boolean logic operators (AND, OR, THEN), and sequential segmentation capabilities. Segments can be applied retroactively to any report and used across all visualizations. The segmentation engine is one of the most powerful in the analytics industry and is a significant portion of the certification exam.</p>

<p><strong>Attribution:</strong> Understanding which marketing touchpoints contribute to conversions is a critical business need. Adobe Analytics supports multiple attribution models including First Touch, Last Touch, Linear, Time Decay, U-Shaped (Position-Based), and Participation. Attribution can be applied to any dimension in Analysis Workspace, not just marketing channels, giving analysts unprecedented flexibility in understanding conversion paths.</p>

<p><strong>Predictive Analytics:</strong> Adobe Sensei (Adobe's AI/ML engine) powers anomaly detection, contribution analysis, and intelligent alerts within Analytics. Anomaly detection automatically identifies statistical outliers in your data. Contribution analysis determines which dimensions are driving those anomalies. Intelligent alerts notify stakeholders when important changes occur in their data — all without manual monitoring.</p>

<div class="info-card concept">
  <div class="card-title">💡 Key Value Proposition</div>
  <p>Adobe Analytics makes digital behavior: <strong>Observable</strong> (see what happened through data collection), <strong>Measurable</strong> (quantify with metrics like conversion rate, bounce rate, revenue), and <strong>Actionable</strong> (make data-driven decisions through analysis and attribution). This transformation from invisible to actionable is the fundamental value of the platform and the philosophical foundation for everything in the exam.</p>
</div>
`,

"aa-data-flow": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Fundamentals</div>
  <h1>Data Collection & Flow</h1>
  <p class="subtitle">The complete 5-stage journey from user action to reportable data — a critical 15% of the exam</p>
</div>
<div class="tag-row"><span class="tag exam">~15% of Exam</span><span class="tag key">Must Master</span></div>

<h2>The 5-Stage Data Pipeline</h2>
<p>Understanding how data flows from a user's browser to your Adobe Analytics reports is one of the most critical concepts for the exam. Approximately 15% of questions directly or indirectly test your knowledge of this pipeline. The flow has five distinct stages, and each stage transforms the data in a specific way. Understanding which stage does what is essential for answering questions about data collection, variable population, processing rules, and server-side enrichment.</p>

<div class="diagram">
  <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px">Adobe Analytics Data Flow Pipeline</div>
  <div class="flow">
    <div class="flow-box layer1">Stage 1<br><small>User Action</small></div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer2">Stage 2<br><small>JS Collection</small></div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer3">Stage 3<br><small>Image Request</small></div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer4">Stage 4<br><small>Server Processing</small></div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer5">Stage 5<br><small>Storage & Reporting</small></div>
  </div>
</div>

<h3>Stage 1: User Action (The Trigger)</h3>
<p>Everything begins with a user action — a page load, button click, form submission, video play, purchase completion, or any other trackable interaction. This action serves as the trigger for the analytics data collection process. At this stage, no data has been collected yet. The action simply initiates the sequence. For page loads, this happens automatically when the HTML document finishes loading and the JavaScript executes. For interactions like clicks and downloads, event listeners or manual tracking calls trigger the collection. The tracking code also originates here — when a user clicks a marketing link with URL parameters (e.g., ?cid=summer_sale), those parameters are part of the user action.</p>

<h3>Stage 2: JavaScript Collection (AppMeasurement.js)</h3>
<p>Once the trigger fires, the AppMeasurement.js library (or the modern Web SDK / Adobe Launch) executes its tracking logic. This JavaScript code performs several critical functions: it reads the URL to extract query parameters like campaign tracking codes, it reads cookies to identify returning visitors, it captures contextual data like page name (s.pageName), referring URL, screen resolution, and browser type. It then packages all of this information into a set of s.* variables. For example: s.pageName = "Product Detail - Running Shoes", s.products = ";Shoes;1;89.99", s.events = "purchase", s.campaign = "summer_email_2025". After assembling all variables, the library fires either an s.t() call (page view track) or an s.tl() call (link track), which initiates the server request.</p>

<h3>Stage 3: Image Request (The Beacon)</h3>
<p>The JavaScript library sends data to Adobe's data collection servers via an HTTP request disguised as a 1x1 pixel image request (often called a "beacon"). This technique is used because image requests can be sent cross-domain without browser security restrictions. The request URL contains all the tracked variables encoded as URL parameters. A typical beacon URL looks like: https://metrics.example.com/b/ss/rsid/1/JS-2.x/s12345?pageName=Product%20Detail&events=purchase&products=;Shoes;1;89.99. The data travels from the user's browser to Adobe's Data Collection (DC) servers, which receive and acknowledge the request.</p>

<h3>Stage 4: Server-Side Processing</h3>
<p>Once Adobe's servers receive the image request, they perform extensive processing before the data becomes reportable. This is where the magic of data transformation happens. First, VISTA rules execute — these are server-side rules configured by Adobe consultants that can modify, copy, or delete data before it enters the processing pipeline. Next, Processing Rules run — these are admin-configurable rules that can map context data variables to props/eVars, set values based on conditions, and perform basic data transformations. Then, Marketing Channel rules evaluate the hit to determine which marketing channel should receive attribution credit. Finally, the server performs enrichment — adding geographic data (city, country, DMA from IP address), device/browser details, and time-of-day calculations. All of this processing happens in near real-time.</p>

<h3>Stage 5: Storage & Reporting</h3>
<p>The fully processed data is stored in Adobe's data warehouse and becomes available in Analysis Workspace, usually within 30-90 seconds of the original user action. At this point, the data can be queried, segmented, visualized, and analyzed. The original raw data is also preserved for Data Warehouse queries, which can access historical data at full granularity. The processed data respects all the configurations defined in the Report Suite settings — variable persistence (eVar expiration), visit definitions, internal URL filters, and other admin settings.</p>

<div class="info-card danger">
  <div class="card-title">🎯 Critical Exam Distinction</div>
  <p>The exam frequently tests whether you understand the difference between <strong>source</strong> (where data comes from, Stages 1-3) and <strong>storage</strong> (where data lives in Adobe, Stages 4-5). The tracking code comes FROM URL parameters (source). It is STORED in an eVar (storage). When asked "how is tracking code populated?" — the answer is always about the SOURCE, not the storage.</p>
</div>
`,

"aa-report-suites": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Fundamentals</div>
  <h1>Report Suites</h1>
  <p class="subtitle">The fundamental data containers in Adobe Analytics that organize and segment your analytics data</p>
</div>
<div class="tag-row"><span class="tag key">Foundation</span></div>

<h2>What is a Report Suite?</h2>
<p>A Report Suite is the fundamental data container in Adobe Analytics. Think of it as a separate database that receives and stores a specific stream of analytics data. Every piece of data collected by Adobe Analytics must be directed to at least one Report Suite. The Report Suite ID (RSID) is specified in the JavaScript tracking code and determines where the collected data lands. Report Suites are completely independent of each other — they have their own variable configurations, processing rules, marketing channel definitions, visit timeout settings, and internal URL filters. Organizations typically create separate Report Suites for different properties (main website vs mobile app), different environments (production vs staging), different brands, or different business units. A common strategy is a "multi-suite tagging" approach where data is sent simultaneously to a global Report Suite (for company-wide analysis) and a property-specific Report Suite (for focused analysis of that property). Understanding Report Suites is important because many exam questions reference them when discussing variable configurations and administrative settings.</p>

<h2>Key Report Suite Settings</h2>
<table class="data-table">
<thead><tr><th>Setting</th><th>Purpose</th><th>Exam Relevance</th></tr></thead>
<tbody>
<tr><td><strong>Visit Timeout</strong></td><td>How long of inactivity before a new visit starts (default: 30 min)</td><td>Understanding visit definition</td></tr>
<tr><td><strong>Internal URL Filters</strong></td><td>Domains considered "internal" (not referrals)</td><td>Marketing channel attribution</td></tr>
<tr><td><strong>Currency</strong></td><td>Currency for revenue metrics</td><td>Low priority</td></tr>
<tr><td><strong>Timezone</strong></td><td>Timezone for date-based reporting</td><td>Low priority</td></tr>
<tr><td><strong>Variable Mapping</strong></td><td>eVar/prop naming, enabled events</td><td>High priority — knowing what's configurable</td></tr>
</tbody>
</table>

<h2>Virtual Report Suites (VRS)</h2>
<p>A Virtual Report Suite is a filtered view of a parent Report Suite. Rather than collecting data separately, a VRS applies a persistent segment to an existing Report Suite to create a subset view. For example, if your global Report Suite contains data from US, UK, and India, you could create three VRS instances — one for each country — by applying a geography segment. VRS instances share the underlying data, so they do not count toward data collection limits and do not require separate implementation. They are purely a reporting-level construct. This concept is important for the exam because it tests whether you understand the difference between data collection-level separation (Report Suites) and reporting-level separation (Virtual Report Suites).</p>
`,

"aa-processing-rules": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Fundamentals</div>
  <h1>Processing & VISTA Rules</h1>
  <p class="subtitle">Server-side data transformation rules that modify data before it reaches reports</p>
</div>
<div class="tag-row"><span class="tag key">Server-Side</span></div>

<h2>Processing Rules</h2>
<p>Processing Rules are server-side rules configured in the Adobe Analytics admin interface that can modify incoming data before it is stored and reported. They execute during Stage 4 of the data flow pipeline — after the image request arrives at Adobe's servers but before data is written to the reporting database. Processing Rules are powerful because they let you transform data without changing your website's JavaScript code. Common use cases include mapping context data variables to props and eVars (particularly useful when using Adobe Launch to send data in a standardized context data format), overwriting variable values based on conditions (e.g., if page URL contains "/checkout/" then set eVar5 = "Checkout Flow"), copying one variable to another (e.g., copy s.pageName to prop1 for pathing analysis), and setting variables when specific conditions are met. Processing Rules are non-destructive in the sense that they execute in order from top to bottom, and you can always add new rules. However, they are permanent once applied — you cannot retroactively undo a processing rule. If you make a mistake, you can only fix it going forward. For the exam, understand that Processing Rules are an admin-level feature for data transformation. They run server-side, they are configurable without code changes, and they cannot be applied retroactively to historical data.</p>

<h2>VISTA Rules</h2>
<p>VISTA (Visitor Identification, Segmentation and Transformation Architecture) rules are more powerful server-side rules that execute BEFORE Processing Rules in the data pipeline. Unlike Processing Rules which you configure in the admin UI, VISTA rules are custom scripts written by Adobe consultants and deployed at the server level. They can perform complex logic like data routing (sending different data to different Report Suites based on conditions), advanced data manipulation that exceeds Processing Rule capabilities, and data filtering (removing or modifying hits before they count). VISTA rules are rarely asked about directly on the exam, but you should know they exist and that they execute before Processing Rules in the pipeline.</p>

<div class="diagram">
  <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px">Server-Side Processing Order</div>
  <div class="flow">
    <div class="flow-box layer1">Data Arrives</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer3">VISTA Rules</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer4">Processing Rules</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer2">Marketing Channels</div>
    <div class="flow-arrow">→</div>
    <div class="flow-box layer5">Stored in Reports</div>
  </div>
</div>
`,

"aa-props": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Variables & Tracking</div>
  <h1>Props (Traffic Variables)</h1>
  <p class="subtitle">Hit-level dimensions with no persistence — perfect for current state and pathing analysis</p>
</div>
<div class="tag-row"><span class="tag exam">High Priority</span><span class="tag key">~20% of Exam</span></div>

<h2>Understanding Props</h2>
<p>Props (short for "properties," also called Traffic Variables or s.propN) are one of the two main custom dimension types in Adobe Analytics. They are designated as s.prop1 through s.prop75, giving you up to 75 custom traffic variables per Report Suite. The defining characteristic of props is that they have ZERO persistence — their value only exists on the exact server call (hit) where they are set, and then immediately disappears. On the very next hit, unless the prop is explicitly set again, it has no value. This non-persistent nature makes props fundamentally different from eVars and determines their use cases entirely.</p>

<p>Because props do not persist, they CANNOT be used for conversion attribution. Conversion events like purchases and form submissions happen on specific hits. If a prop value was set three hits ago (e.g., on the product detail page) but the purchase happens on the confirmation page (a different hit), the prop has no value at the time of purchase and therefore cannot receive credit. This is the single most important thing to understand about props, and it is tested heavily on the exam. Any question about "which variable to use for conversion attribution" — the answer is NEVER a prop.</p>

<p>However, props have one capability that eVars do not: they enable pathing reports. Pathing allows you to use Flow visualizations in Workspace to see the sequence of values — for example, "users went from Home → Products → Cart → Checkout." This makes props ideal for tracking navigation sequences and page flow analysis. Additionally, props support list props, which allow you to send multiple values in a single variable on a single hit (e.g., multiple product categories viewed simultaneously).</p>

<h2>Characteristics Summary</h2>
<table class="data-table">
<thead><tr><th>Feature</th><th>Props</th></tr></thead>
<tbody>
<tr><td><strong>Persistence</strong></td><td>❌ None — hit-level only</td></tr>
<tr><td><strong>Conversion Attribution</strong></td><td>❌ Cannot attribute</td></tr>
<tr><td><strong>Pathing</strong></td><td>✅ Yes — enables Flow reports</td></tr>
<tr><td><strong>Limit</strong></td><td>75 per Report Suite</td></tr>
<tr><td><strong>List Support</strong></td><td>✅ Yes — can hold multiple values per hit</td></tr>
</tbody>
</table>

<h2>When to Use Props</h2>
<p><strong>Perfect use cases:</strong> Site section (which part of the site the user is currently on), page type (homepage, product page, category page, checkout), navigation elements, error messages displayed on the current page, form field names, content type classifications.</p>
<p><strong>Wrong use cases (use eVar instead):</strong> Campaign tracking, internal search terms that should be attributed to later purchases, product finding methods, any scenario where you need to connect an earlier value to a later conversion event.</p>

<div class="info-card danger">
  <div class="card-title">🎯 Exam Decision Rule</div>
  <p>If the question asks about <strong>conversion attribution</strong> (connecting a value to a purchase/conversion) → Always eVar, never prop.</p>
  <p>If the question asks about <strong>pathing</strong> or <strong>navigation flow</strong> → Prop is the correct choice.</p>
  <p>If the question is ambiguous → Default to eVar (it is more powerful and flexible).</p>
</div>
`,

"aa-evars": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Variables & Tracking</div>
  <h1>eVars (Conversion Variables)</h1>
  <p class="subtitle">Persistent dimensions that enable conversion attribution — the most powerful and heavily tested variable type</p>
</div>
<div class="tag-row"><span class="tag exam">~20% of Exam</span><span class="tag key">Critical</span></div>

<h2>Understanding eVars</h2>
<p>eVars (short for "conversion variables," also called s.eVarN) are the second major custom dimension type in Adobe Analytics. You have up to 250 eVars per Report Suite (eVar1 through eVar250). The defining characteristic of eVars is PERSISTENCE — once set, an eVar's value continues to exist across subsequent server calls until it either expires (based on a configured expiration setting) or is overwritten by a new value. This persistence is what makes eVars the essential tool for conversion attribution. When a user sets an eVar value early in their session (e.g., by clicking an email campaign link) and then purchases something several pages later, the eVar still holds the campaign value at the time of purchase. This allows Adobe Analytics to attribute the conversion back to the email campaign — something that would be completely impossible with a prop.</p>

<h2>Persistence — The Key Differentiator</h2>
<p>Let us trace through an example to make persistence concrete. Imagine a user clicks an email campaign link and arrives on your product page. At that moment, JavaScript sets eVar1 = "summer_email_2025". Over the next 10 minutes, the user browses 5 more pages. On each of those subsequent page views, eVar1 STILL has the value "summer_email_2025" — even though it was only explicitly set on the first hit. When the user finally reaches the checkout confirmation page and a purchase event fires, eVar1 is still present with the campaign value. Adobe Analytics therefore records that the "summer_email_2025" campaign should receive credit for this purchase. This entire attribution chain depends on persistence.</p>

<h2>Configuration Settings</h2>
<p><strong>Allocation (First vs Last Touch):</strong> Determines what happens when an eVar already has a value and a NEW value arrives. "Original Value" (First Touch) keeps the first value and ignores subsequent values. "Most Recent" (Last Touch) overwrites with the newest value. "Linear" distributes credit equally among all values.</p>

<p><strong>Expiration:</strong> Determines how long the eVar's value persists before automatically clearing. Options include: Hit (expires immediately — behaves like a prop), Visit (expires at end of session), Purchase (expires when a purchase event occurs), and time-based options (Day, Week, Month, Quarter, Year, Never). The "Never" option means the value persists until explicitly overwritten by a new value — it can last months or years.</p>

<h2>Instances vs Occurrences</h2>
<div class="info-card concept">
  <div class="card-title">🔢 Critical Metric Distinction</div>
  <p><strong>Instances:</strong> The number of times the eVar was explicitly SET (appeared in the JavaScript call). If a user searches once, Instances = 1.</p>
  <p><strong>Occurrences:</strong> The number of times the eVar had ANY value (set OR persisting). If the user searches once and then browses 4 more pages, Occurrences = 5 (1 set + 4 persisting).</p>
  <p>This distinction trips up many exam candidates. Remember: Instances = set counts. Occurrences = total hit counts where value exists.</p>
</div>
`,

"aa-props-vs-evars": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Variables & Tracking</div>
  <h1>Props vs eVars — Complete Comparison</h1>
  <p class="subtitle">Side-by-side analysis with decision framework for choosing the right variable type</p>
</div>
<div class="tag-row"><span class="tag exam">★ Exam Critical</span></div>

<table class="data-table">
<thead><tr><th>Feature</th><th>Props (Traffic Variables)</th><th>eVars (Conversion Variables)</th></tr></thead>
<tbody>
<tr><td><strong>Persistence</strong></td><td>❌ None (hit-level only)</td><td>✅ Configurable (visit, purchase, 30 days, never, etc.)</td></tr>
<tr><td><strong>Conversion Attribution</strong></td><td>❌ Cannot attribute</td><td>✅ Full attribution capability</td></tr>
<tr><td><strong>Pathing</strong></td><td>✅ Yes (Flow reports)</td><td>❌ No</td></tr>
<tr><td><strong>Limit</strong></td><td>75 per Report Suite</td><td>250 per Report Suite</td></tr>
<tr><td><strong>Primary Use</strong></td><td>Current state & navigation</td><td>Attribution & conversion tracking</td></tr>
<tr><td><strong>Typical Examples</strong></td><td>Site section, page type, error messages</td><td>Campaign, search term, finding method</td></tr>
<tr><td><strong>Metric Pairing</strong></td><td>Traffic metrics (page views, visits)</td><td>Conversion metrics (events, revenue)</td></tr>
</tbody>
</table>

<h2>Decision Framework</h2>
<div class="info-card warning">
  <div class="card-title">🎯 How to Choose on the Exam</div>
  <p><strong>Question 1:</strong> "Do you need to know what VALUE led to a CONVERSION?" → If YES → <strong>eVar</strong></p>
  <p><strong>Question 2:</strong> "Do you need to see the SEQUENCE/PATH of values?" → If YES → <strong>Prop</strong></p>
  <p><strong>Rule of thumb:</strong> When in doubt → eVar (it is more powerful and can do everything a prop does except pathing)</p>
</div>

<h2>Common Exam Scenarios</h2>
<div class="quiz-card">
  <div class="q-label">Scenario Question</div>
  <div class="q-text">A retailer wants to track which internal search terms lead to the most purchases. Which variable type should they use?</div>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">A) Prop — to see all search terms</button>
  <button class="quiz-option" onclick="checkQuiz(this,'correct')">B) eVar — to attribute purchases to search terms</button>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">C) Success Event — to count searches</button>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">D) Classification — to categorize searches</button>
  <div class="quiz-explain"><strong>Explanation:</strong> The question says "lead to purchases" — this is conversion attribution. The search term must PERSIST from the search page through browsing until the purchase event fires. Only eVars persist. Props would lose the search term value after the search results page, making attribution impossible.</div>
</div>
`,

"aa-events": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Variables & Tracking</div>
  <h1>Success Events (s.events)</h1>
  <p class="subtitle">Metrics that count conversions and quantify business outcomes</p>
</div>
<div class="tag-row"><span class="tag key">Metrics Foundation</span></div>

<h2>Understanding Success Events</h2>
<p>Success Events (also called Custom Events or simply Events) are the metrics in Adobe Analytics. While dimensions (props and eVars) describe the WHAT (what page, what campaign, what search term), events quantify the HOW MUCH (how many purchases, how much revenue, how many cart additions). Events are configured as s.events in the tracking code and designated as event1 through event1000 in the Admin Console. There are three types of events based on how they count values:</p>

<p><strong>Counter Events:</strong> Simply count occurrences. Each time the event fires, its count increments by 1. Examples include purchases (how many orders), cart additions, form submissions, video starts, and registrations. You set them with just the event name: s.events = "purchase" or s.events = "event5".</p>

<p><strong>Numeric Events:</strong> Accept a specific numeric value that gets added to the total. Used when you need to sum quantities. Example: event10 = "number of items in cart". Set with: s.events = "event10=3" (customer added 3 items).</p>

<p><strong>Currency Events:</strong> Accept a currency value. Revenue is the most common example. Set with: s.events = "purchase" and s.products = ";ProductName;1;89.99" — the revenue value comes from the products variable, not the event directly.</p>

<h2>Built-in vs Custom Events</h2>
<p>Adobe Analytics has several built-in events that have special behavior: <strong>purchase</strong> (deduplicated by Order ID, triggers revenue calculation from s.products), <strong>prodView</strong> (product view), <strong>scAdd</strong> (cart addition), <strong>scRemove</strong> (cart removal), <strong>scCheckout</strong> (checkout initiation). These built-in events have special integration with the s.products variable. Beyond built-in events, you have up to 1000 custom events (event1 through event1000) for tracking any business action you need.</p>

<h2>Event Serialization</h2>
<p>Event serialization prevents duplicate counting. By assigning a unique serial ID to each event, Adobe Analytics will only count the first occurrence of that ID and ignore duplicates. This is critical for scenarios where a user might refresh a confirmation page — without serialization, each refresh would count as an additional purchase. Set with: s.events = "purchase:ORDER12345" where ORDER12345 is the unique serializer.</p>
`,

"aa-tracking-code": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Variables & Tracking</div>
  <h1>Tracking Code & Campaigns</h1>
  <p class="subtitle">How marketing campaign data flows from URLs to attribution reports</p>
</div>
<div class="tag-row"><span class="tag exam">★ Exam Favorite</span><span class="tag key">Source vs Storage</span></div>

<h2>The Complete Campaign Tracking Flow</h2>
<p>Tracking code is one of the most tested topics because it perfectly illustrates the source-vs-storage distinction that Adobe loves to test. Here is the complete end-to-end flow of how campaign data gets from a marketing email into your Adobe Analytics reports:</p>

<p><strong>Step 1 — URL Creation:</strong> A marketer creates a campaign link with a tracking parameter appended to the URL. For example: https://www.example.com/summer-sale?cid=email_summer_2025. The "cid" parameter is a commonly used query string parameter name (though it could be anything — utm_campaign, campaign, s_cid, etc.).</p>

<p><strong>Step 2 — User Click:</strong> The customer clicks the link in their email, which opens the browser and loads the URL including the query parameter. This is the SOURCE of the tracking code — it comes from the URL.</p>

<p><strong>Step 3 — JavaScript Extraction:</strong> AppMeasurement.js (or Adobe Launch) includes a utility function called getQueryParam() that reads the URL and extracts the value of the specified parameter. It takes the value "email_summer_2025" from ?cid=email_summer_2025.</p>

<p><strong>Step 4 — Variable Setting:</strong> The JavaScript sets the campaign variable: s.campaign = "email_summer_2025". This value is included in the image request sent to Adobe.</p>

<p><strong>Step 5 — Persistence:</strong> The tracking code value persists according to the eVar expiration setting configured for the campaign variable. Typically it persists until a purchase event occurs or until a specified time period (like 30 days) elapses.</p>

<p><strong>Step 6 — Attribution:</strong> When the user eventually converts (makes a purchase, submits a form, etc.), the persisted tracking code value is present on the conversion hit, allowing Adobe Analytics to attribute the conversion to the "email_summer_2025" campaign.</p>

<div class="info-card danger">
  <div class="card-title">🎯 THE Exam Trap</div>
  <p><strong>Question:</strong> "How is the tracking code dimension populated?"</p>
  <p>❌ <strong>Wrong:</strong> "eVar variable" — This is WHERE it's STORED, not how it's populated</p>
  <p>❌ <strong>Wrong:</strong> "v0 query parameter" — This is Adobe's internal server-side format</p>
  <p>❌ <strong>Wrong:</strong> "Processing rules" — These can modify but don't originate the data</p>
  <p>✅ <strong>Correct:</strong> "URL query string parameters" — This is the actual SOURCE</p>
</div>
`,

"aa-hit-types": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Variables & Tracking</div>
  <h1>s.t() vs s.tl() — Hit Types</h1>
  <p class="subtitle">Understanding the two types of server calls and their impact on page view metrics</p>
</div>
<div class="tag-row"><span class="tag key">Important Distinction</span></div>

<h2>The Two Tracking Functions</h2>
<p>Adobe Analytics has exactly two functions for sending data to its servers: s.t() for page views and s.tl() for link tracking. Understanding the difference between these two functions is critical because they behave differently with respect to the Page Views metric and have different use cases. Every server call (also called a "hit" or "image request") in Adobe Analytics is triggered by one of these two functions. There is no third option.</p>

<table class="data-table">
<thead><tr><th>Feature</th><th>s.t() — Page View Track</th><th>s.tl() — Link Track</th></tr></thead>
<tbody>
<tr><td><strong>Purpose</strong></td><td>Track page loads / screen views</td><td>Track clicks, downloads, interactions</td></tr>
<tr><td><strong>Page Views Metric</strong></td><td>✅ Increments page views by 1</td><td>❌ Does NOT increment page views</td></tr>
<tr><td><strong>When to Use</strong></td><td>Full page loads, SPA route changes</td><td>Button clicks, file downloads, video plays, outbound links</td></tr>
<tr><td><strong>s.pageName Required?</strong></td><td>Yes (strongly recommended)</td><td>No (optional)</td></tr>
</tbody>
</table>

<h2>s.tl() Link Types</h2>
<p>The s.tl() function takes three parameters: s.tl(linkObject, linkType, linkName). The linkType parameter categorizes the interaction:</p>
<div class="code-block">s.tl(this, 'o', 'Button Click');   // 'o' = Custom/Other link
s.tl(this, 'd', 'PDF Download');   // 'd' = Download link
s.tl(this, 'e', 'Exit Link');      // 'e' = Exit link (leaving site)</div>

<div class="quiz-card">
  <div class="q-label">Exam-Style Question</div>
  <div class="q-text">A user clicks a PDF download link on your website. Does the Page Views metric increase?</div>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">A) Yes — any interaction counts as a page view</button>
  <button class="quiz-option" onclick="checkQuiz(this,'correct')">B) No — s.tl() does not increment page views</button>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">C) Yes — downloads are tracked as special page views</button>
  <button class="quiz-option" onclick="checkQuiz(this,'wrong')">D) Depends on the Report Suite configuration</button>
  <div class="quiz-explain"><strong>Explanation:</strong> Download links are tracked with s.tl(this, 'd', 'Download Name'). The s.tl() function creates a server call but specifically does NOT increment the Page Views metric. Only s.t() page view tracking calls increment Page Views. This is a fundamental distinction — not all server calls are page views.</div>
</div>
`,

"aa-seg-containers": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Segmentation</div>
  <h1>Segment Containers</h1>
  <p class="subtitle">The three-level container hierarchy that determines the scope of your segments</p>
</div>
<div class="tag-row"><span class="tag exam">High Priority</span><span class="tag key">~19% of Exam</span></div>

<h2>Container Hierarchy</h2>
<p>Adobe Analytics segments use a container hierarchy that determines the SCOPE of the data returned. This is one of the most misunderstood and heavily tested concepts on the exam. There are three containers, each nested within the next like Russian dolls:</p>

<div class="diagram">
  <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px">Container Scope: HIT ⊂ VISIT ⊂ VISITOR</div>
  <div class="flow">
    <div class="flow-box layer1" style="padding:20px 30px">VISITOR<br><small>All data, lifetime</small></div>
    <div class="flow-arrow">⊃</div>
    <div class="flow-box layer3" style="padding:16px 24px">VISIT<br><small>All hits in session</small></div>
    <div class="flow-arrow">⊃</div>
    <div class="flow-box layer5" style="padding:12px 18px">HIT<br><small>Single event</small></div>
  </div>
</div>

<h3>Hit Container (Smallest Scope)</h3>
<p>The Hit container is the most restrictive — it returns ONLY the specific server calls (hits) that match the condition. If your condition is "Page = Cart," a Hit container returns only the actual cart page view hits. It does not include the homepage view, the product page view, or any other hit in the same visit — just the cart page views themselves. Use this when you want to analyze specific events in isolation: "Show me only the cart page views," "Show me only purchase hits," "Show me only video start events." The result set is always the smallest of the three containers because it returns only exact matches.</p>

<h3>Visit Container (Medium Scope)</h3>
<p>The Visit container returns ALL hits within visits that match the condition at least once. This is the crucial distinction — it expands the scope from matching hits to complete sessions. If your condition is "Page = Cart" with a Visit container, you get all hits from every visit where the cart page was viewed at least once. This means you also get the homepage views, product views, checkout views, and every other page viewed in those qualifying visits. The same condition that returned 2,000 hits in a Hit container might return 15,000 hits in a Visit container (because each qualifying visit averages 7-8 page views). Use this when you want to understand complete sessions: "Show me all pages viewed in visits that included a cart view."</p>

<h3>Visitor Container (Largest Scope)</h3>
<p>The Visitor container returns ALL data for visitors who EVER matched the condition, across ALL their visits, past and future (within the date range). If your condition is "Page = Cart" with a Visitor container, you get the complete lifetime history of every person who ever viewed the cart page — including visits where they did not view the cart at all. That same condition might return 50,000 hits because it includes all visits from qualifying visitors. Use this for lifetime analysis: "Show me everything that people who viewed the cart page have ever done on our site."</p>

<div class="info-card danger">
  <div class="card-title">🎯 Exam Pattern</div>
  <p><strong>Q:</strong> A segment uses a VISITOR container with condition "Revenue > 0". What data is included?</p>
  <p><strong>Wrong:</strong> Only the hits where revenue occurred</p>
  <p><strong>Correct:</strong> ALL data for anyone who EVER generated revenue — including non-revenue visits, browsing history, everything. The VISITOR container returns the complete lifetime data for qualifying individuals.</p>
</div>
`,

"aa-seg-logic": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Segmentation</div>
  <h1>AND / OR / THEN Logic</h1>
  <p class="subtitle">Boolean operators that combine segment conditions — understanding their impact on result size</p>
</div>
<div class="tag-row"><span class="tag key">Logic Operators</span></div>

<h2>The Three Operators</h2>
<p><strong>AND (Intersection):</strong> Both conditions must be true simultaneously. AND is restrictive — it makes your segment SMALLER because fewer people/visits/hits will meet both conditions at the same time. Example: "Mobile Users" AND "Purchasers" = only people who are BOTH mobile users AND have made a purchase. If you have 6,000 mobile users and 500 purchasers, the AND result might be only 180 (those who purchased on mobile).</p>

<p><strong>OR (Union):</strong> Either condition can be true. OR is inclusive — it makes your segment LARGER because people/visits/hits only need to meet one of the conditions. Example: "Mobile Users" OR "Tablet Users" = anyone using EITHER device. If you have 6,000 mobile users and 2,000 tablet users (with some overlap), the OR result is approximately 8,000.</p>

<p><strong>THEN (Sequential):</strong> Conditions must occur in chronological order. THEN enables sequential segmentation — finding patterns where users follow a specific sequence of actions. Example: "Page = Homepage" THEN "Page = Product Detail" THEN "Purchase Event" = users who followed this exact sequence. The THEN operator is unique to sequential segments and is one of Adobe Analytics' most powerful segmentation capabilities.</p>

<div class="info-card concept">
  <div class="card-title">📐 Size Impact Rule</div>
  <p><strong>AND</strong> = Smaller result (more restrictive — both must be true)</p>
  <p><strong>OR</strong> = Larger result (more inclusive — either can be true)</p>
  <p><strong>THEN</strong> = Smallest result (most restrictive — must follow specific order)</p>
</div>
`,

"aa-seg-sequential": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Segmentation</div>
  <h1>Sequential Segmentation</h1>
  <p class="subtitle">Finding users who follow specific behavioral sequences using the THEN operator</p>
</div>
<div class="tag-row"><span class="tag key">Advanced</span></div>

<h2>How Sequential Segments Work</h2>
<p>Sequential segments use the THEN operator to define a required order of events. Unlike AND (where both conditions must be true at the same time) or OR (where either can be true), THEN requires that Condition A occurs BEFORE Condition B in chronological order. This is incredibly powerful for analyzing funnel progression, identifying users who follow specific conversion paths, or finding people who exhibit particular behavioral patterns over time. Sequential segments can span across hits within a single visit, or across visits within a single visitor's lifetime, depending on the container level used.</p>

<p>Example: "Page = Homepage" THEN "Page = Product Detail" THEN "Event = Purchase" finds visitors who started on the homepage, later viewed a product detail page, and eventually purchased — in that specific order. The events do not have to be consecutive (there can be other pages viewed between them), but they must occur in the specified sequence.</p>

<h2>Time Constraints</h2>
<p>You can add time constraints to sequential segments using "within" and "after" operators. "Within 7 days" means the entire sequence must complete within a 7-day window. "After 3 days" means there must be at least a 3-day gap between steps. These time constraints make sequential segments even more powerful for identifying specific behavioral patterns — like users who viewed a product page and then purchased within 24 hours (impulse buyers) vs those who took more than 7 days (considered purchasers).</p>
`,

"aa-workspace": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Reporting & Workspace</div>
  <h1>Analysis Workspace</h1>
  <p class="subtitle">The primary analysis interface — powerful drag-and-drop environment for building custom reports</p>
</div>
<div class="tag-row"><span class="tag exam">38% of Exam</span><span class="tag key">Most Tested Area</span></div>

<h2>Workspace Components</h2>
<p>Analysis Workspace is Adobe Analytics' primary analysis interface and accounts for the largest portion of the exam (within the 38% Reporting section). It replaced the legacy Reports & Analytics interface and provides a flexible, drag-and-drop environment for building custom analyses. Understanding Workspace components and how they interact is essential for the exam. The interface consists of three main areas: the component rail (left panel with dimensions, metrics, segments, and date ranges), the canvas (where you build your analysis with panels and visualizations), and the settings (configuration options for each component).</p>

<p><strong>Freeform Tables:</strong> The most versatile and commonly used component. You drag dimensions into rows and metrics into columns to create custom cross-tabulation reports. Freeform tables support unlimited nesting (breaking down dimensions within dimensions), inline segmentation (drag a segment onto a specific row), and dynamic sorting. Nearly every analysis starts with a Freeform Table.</p>

<p><strong>Panels:</strong> Containers for groups of visualizations within a single project. Each panel can have its own date range and segments, allowing you to compare different time periods or audience segments side by side within the same project. Special panel types include Attribution Panel (compare attribution models), Segment Comparison Panel (find statistical differences between segments), and Analytics for Target panel (A/B test integration).</p>

<p><strong>Visualizations:</strong> Charts and graphics that present data visually. Available types include Line, Bar, Stacked Bar, Area, Donut, Treemap, Scatter, Histogram, Horizontal Bar, Fallout, Flow, Cohort Table, Venn Diagram, Summary Number, Summary Change, Map, and Text. Each visualization type serves specific analytical purposes, and the exam tests whether you know which visualization to use for different business questions.</p>

<p><strong>Components (Left Rail):</strong> Dimensions (orange), Metrics (green), Segments (blue), and Date Ranges (purple). These are drag-and-drop building blocks. Knowing the color coding helps with exam questions that reference component types by their visual indicator.</p>
`,

"aa-viz-fallout": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Reporting & Workspace</div>
  <h1>Fallout Visualization</h1>
  <p class="subtitle">Sequential funnel analysis showing conversion and drop-off rates at each step</p>
</div>
<div class="tag-row"><span class="tag exam">★ Exam Favorite</span><span class="tag key">Must Know</span></div>

<h2>What is Fallout?</h2>
<p>The Fallout visualization is one of the most tested visualizations on the AD0-E212 exam. It shows a pre-defined sequential journey with conversion rates and drop-off percentages at each step. You define the steps (touchpoints) in a specific order, and Fallout shows you what percentage of users successfully progressed from one step to the next, and what percentage "fell out" (abandoned the journey). This makes it the perfect tool for analyzing any sequential process: checkout funnels, registration flows, multi-step forms, content consumption sequences, or any scenario where users should follow a defined path.</p>

<h2>Fallout Example — Checkout Funnel</h2>
<div class="info-card success">
  <div class="card-title">✅ Checkout Funnel Analysis</div>
  <p>Step 1: Cart Page → 10,000 visitors (100%)</p>
  <p>&nbsp;&nbsp;&nbsp;⬇ 40% drop off (4,000 leave)</p>
  <p>Step 2: Shipping Info → 6,000 visitors (60%)</p>
  <p>&nbsp;&nbsp;&nbsp;⬇ 25% drop off (1,500 leave)</p>
  <p>Step 3: Payment → 4,500 visitors (45%)</p>
  <p>&nbsp;&nbsp;&nbsp;⬇ 11% drop off (500 leave)</p>
  <p>Step 4: Order Complete → 4,000 visitors (40% total conversion)</p>
  <p><strong>Insight:</strong> The biggest drop-off is at Cart → Shipping (40%). This suggests the shipping page is the primary bottleneck and should be the focus of optimization efforts (simplify the form, add guest checkout, reduce required fields).</p>
</div>

<h2>Fallout vs Flow</h2>
<table class="data-table">
<thead><tr><th>Feature</th><th>Fallout</th><th>Flow</th></tr></thead>
<tbody>
<tr><td><strong>Purpose</strong></td><td>Sequential journey with defined steps</td><td>Path exploration and discovery</td></tr>
<tr><td><strong>Steps</strong></td><td>Pre-defined by analyst</td><td>Discovered from data</td></tr>
<tr><td><strong>Shows</strong></td><td>Conversion & drop-off rates</td><td>All navigation paths</td></tr>
<tr><td><strong>Best For</strong></td><td>Checkout funnels, registration flows, forms</td><td>Discovering navigation patterns, finding unexpected paths</td></tr>
<tr><td><strong>Key Metric</strong></td><td>Conversion rate between steps</td><td>Path volume and branching</td></tr>
</tbody>
</table>

<div class="info-card danger">
  <div class="card-title">🎯 The Exam Question Pattern</div>
  <p><strong>Q:</strong> "Which visualization shows a sequential customer journey with drop-off rates?"</p>
  <p>Keywords to spot: "sequential," "customer journey," "drop-off," "conversion funnel," "step-by-step"</p>
  <p><strong>Answer: FALLOUT</strong> — always. Flow is for exploration, Fallout is for sequential funnels.</p>
</div>
`,

"aa-viz-flow": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Reporting & Workspace</div>
  <h1>Flow Visualization</h1>
  <p class="subtitle">Path exploration — discovering how users navigate through your site</p>
</div>
<div class="tag-row"><span class="tag key">Path Analysis</span></div>

<h2>Understanding Flow</h2>
<p>The Flow visualization shows the actual navigation paths users take through your site. Unlike Fallout (where you pre-define the steps), Flow discovers paths from the data itself. You specify a starting point (or an intermediate point) and Flow shows you all the paths leading to and from that point, including branching, looping, and exit points. This makes Flow ideal for exploratory analysis — understanding WHERE users actually go rather than measuring how well they follow a pre-defined funnel. Flow visualizations are powered by props (traffic variables) because props support pathing analysis. You can start with any dimension value (like a specific page) and see the previous pages (entry paths) and next pages (exit paths) for users who viewed that page. Flow is best used when you want to answer questions like: "Where do users go after viewing the product page?", "What are the most common paths to the checkout page?", "Where do users typically enter and exit the site?", or "Are there unexpected navigation patterns we should optimize for?" The Flow visualization in Workspace is highly interactive — you can click on any branch to expand it, filter by segment, and adjust the number of visible paths.</p>
`,

"aa-viz-cohort": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Reporting & Workspace</div>
  <h1>Cohort Tables</h1>
  <p class="subtitle">Track groups of users over time to understand retention and engagement patterns</p>
</div>
<div class="tag-row"><span class="tag key">Retention Analysis</span></div>

<h2>What is a Cohort Table?</h2>
<p>A Cohort Table groups users into cohorts based on a shared characteristic (typically the date they first performed an action) and then tracks their behavior over subsequent time periods. This is the standard tool for retention analysis and repeat behavior measurement. For example, you could create a cohort of all users who made their first purchase in January, then track what percentage of them returned to purchase in February, March, April, etc. Each row represents a different cohort (grouped by their inclusion date), and each column represents a subsequent time period. The cells show the percentage of users from that cohort who were active (or who completed a specific action) in that subsequent period. Cohort Tables are valuable for understanding user lifecycle, measuring the effectiveness of acquisition campaigns over time (do users acquired from Campaign A have better retention than Campaign B?), and identifying trends in user engagement.</p>
`,

"aa-viz-venn": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Reporting & Workspace</div>
  <h1>Venn & Histogram Visualizations</h1>
  <p class="subtitle">Overlap analysis and distribution analysis tools</p>
</div>
<div class="tag-row"><span class="tag tip">Supporting Visualizations</span></div>

<h2>Venn Diagram</h2>
<p>The Venn visualization in Workspace shows the overlap between up to 3 segments. It visually displays how many users belong to one segment only, how many belong to multiple segments, and the exact overlap counts. This is useful for understanding audience composition — for example, showing the overlap between "Mobile Users," "Email Subscribers," and "Purchasers" to see how many people are in all three groups. For the exam, know that Venn diagrams are used for segment overlap analysis and can compare up to 3 segments.</p>

<h2>Histogram</h2>
<p>The Histogram visualization shows the distribution of a metric across buckets. For example, a histogram of "Revenue per Visit" would show how many visits generated $0-$10, $10-$50, $50-$100, $100+, etc. This helps identify the shape of your data distribution — is it normally distributed? Are there outliers? Is it heavily skewed toward low values? Histograms are useful for understanding the distribution patterns of metrics like session duration, pages per visit, order value, and any other numeric metric.</p>
`,

"aa-attr-models": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Attribution & Metrics</div>
  <h1>Attribution Models</h1>
  <p class="subtitle">Understanding how credit for conversions is distributed across touchpoints</p>
</div>
<div class="tag-row"><span class="tag exam">Heavily Tested</span><span class="tag key">Critical</span></div>

<h2>All Attribution Models</h2>
<p>Attribution models determine how conversion credit is distributed when a user interacts with multiple marketing touchpoints before converting. This is one of the most debated topics in digital analytics, and Adobe Analytics provides multiple models to address different business perspectives. Understanding each model, when to use it, and how the math works is essential for the exam.</p>

<table class="data-table">
<thead><tr><th>Model</th><th>Credit Distribution</th><th>Best Use Case</th></tr></thead>
<tbody>
<tr><td><strong>First Touch</strong></td><td>100% to the first touchpoint</td><td>Measuring awareness & acquisition effectiveness</td></tr>
<tr><td><strong>Last Touch</strong></td><td>100% to the last touchpoint</td><td>Measuring conversion closing effectiveness</td></tr>
<tr><td><strong>Linear</strong></td><td>Equal credit to all touchpoints</td><td>When all touchpoints are equally valuable</td></tr>
<tr><td><strong>Time Decay</strong></td><td>More credit to recent touchpoints</td><td>When recency is most important</td></tr>
<tr><td><strong>U-Shaped</strong></td><td>40% first, 40% last, 20% split across middle</td><td>When first and last interactions matter most</td></tr>
<tr><td><strong>Participation</strong></td><td>100% to EACH touchpoint (total > 100%)</td><td>When you want to see every touchpoint's role</td></tr>
</tbody>
</table>

<h2>Worked Example</h2>
<p>Consider this journey: <strong>Google Search → Email → Direct → Purchase ($100)</strong></p>
<div class="info-card concept">
  <div class="card-title">📊 Attribution Math</div>
  <p><strong>First Touch:</strong> Google $100, Email $0, Direct $0</p>
  <p><strong>Last Touch:</strong> Google $0, Email $0, Direct $100</p>
  <p><strong>Linear:</strong> Google $33.33, Email $33.33, Direct $33.33</p>
  <p><strong>U-Shaped:</strong> Google $40, Email $20, Direct $40</p>
  <p><strong>Time Decay:</strong> Google ~$15, Email ~$30, Direct ~$55 (exact values depend on decay rate)</p>
  <p><strong>Participation:</strong> Google $100, Email $100, Direct $100 (total = $300, but each channel gets full credit)</p>
</div>
`,

"aa-calc-metrics": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Attribution & Metrics</div>
  <h1>Calculated Metrics</h1>
  <p class="subtitle">Essential formulas to memorize for the exam</p>
</div>
<div class="tag-row"><span class="tag exam">Memorize</span><span class="tag key">Formula Sheet</span></div>

<h2>Essential Formulas</h2>
<table class="data-table">
<thead><tr><th>Metric</th><th>Formula</th><th>Example</th></tr></thead>
<tbody>
<tr><td><strong>Conversion Rate</strong></td><td><span class="formula">(Orders ÷ Visits) × 100</span></td><td>(250 ÷ 10,000) × 100 = 2.5%</td></tr>
<tr><td><strong>Bounce Rate</strong></td><td><span class="formula">(Single Page Visits ÷ Total Visits) × 100</span></td><td>(450 ÷ 1,000) × 100 = 45%</td></tr>
<tr><td><strong>Avg Order Value (AOV)</strong></td><td><span class="formula">Revenue ÷ Orders</span></td><td>$50,000 ÷ 500 = $100</td></tr>
<tr><td><strong>Cart Abandonment Rate</strong></td><td><span class="formula">((Cart Adds - Checkouts) ÷ Cart Adds) × 100</span></td><td>((1,200 - 450) ÷ 1,200) × 100 = 62.5%</td></tr>
<tr><td><strong>Pages Per Visit</strong></td><td><span class="formula">Page Views ÷ Visits</span></td><td>15,000 ÷ 3,000 = 5</td></tr>
<tr><td><strong>Revenue Per Visitor</strong></td><td><span class="formula">Revenue ÷ Unique Visitors</span></td><td>$50,000 ÷ 5,000 = $10</td></tr>
</tbody>
</table>
`,

"aa-marketing-channels": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Attribution & Metrics</div>
  <h1>Marketing Channels</h1>
  <p class="subtitle">Classifying traffic sources to understand which channels drive engagement and conversions</p>
</div>
<div class="tag-row"><span class="tag key">Attribution</span></div>

<h2>How Marketing Channels Work</h2>
<p>Marketing Channels in Adobe Analytics classify how visitors arrive at your site. Rather than looking at raw referrer URLs, Marketing Channel rules categorize traffic into meaningful business channels like Paid Search, Organic Search, Email, Social, Display, Direct, Affiliate, and others. These rules are configured in the Admin Console and evaluate each incoming hit to determine which marketing channel should receive credit. The rules are evaluated in order (first match wins), and they look at various data points including the referring URL, query string parameters, and whether the visitor is new or returning. The key distinction on the exam is understanding that Marketing Channel rules evaluate the SOURCE of the visit (how the visitor arrived), and they execute server-side during Stage 4 of the data flow pipeline. This is different from campaign tracking (which uses URL parameters and eVars) — Marketing Channels provide a higher-level classification of all traffic into business-meaningful categories.</p>
`,

"aa-classifications": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Admin & Implementation</div>
  <h1>Classifications (SAINT)</h1>
  <p class="subtitle">Enriching dimension values with additional metadata for deeper analysis</p>
</div>
<div class="tag-row"><span class="tag key">Data Enrichment</span></div>

<h2>Understanding Classifications</h2>
<p>Classifications (historically called SAINT — SiteCatalyst Attribute Importing and Naming Tool) allow you to add metadata to your existing dimension values. Think of classifications as a lookup table that enriches raw tracking values with human-readable labels, categories, and additional attributes. For example, your tracking code might collect values like "em_2025_summer_shoes_us" — a code that is meaningful to the marketing team but not immediately understandable. Using classifications, you can map this code to: Campaign Name = "Summer Shoe Sale 2025", Channel = "Email", Region = "US", Product Category = "Footwear", Creative = "Version A". Once classified, you can report on these higher-level attributes instead of the raw codes — viewing revenue by Channel or Region rather than by cryptic tracking codes. Classifications can be uploaded manually via CSV files, through the Classification Rule Builder (which applies regex-based rules automatically), or through automated FTP imports. For the exam, the key concept is that classifications ADD metadata to existing values — they do not change the underlying collected data.</p>
`,

"aa-data-feeds": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Admin & Implementation</div>
  <h1>Data Feeds & Data Warehouse</h1>
  <p class="subtitle">Exporting raw and aggregated data for external analysis</p>
</div>
<div class="tag-row"><span class="tag key">Data Export</span></div>

<h2>Data Feeds</h2>
<p>Data Feeds export the raw, hit-level data from Adobe Analytics. Every single server call is included with all its variables, timestamps, and metadata. This data is delivered as flat files (TSV format) to an FTP or cloud storage location on a scheduled basis. Data Feeds are used by organizations that want to bring Adobe Analytics data into their own data warehouse, data lake, or BI tools for advanced analysis that goes beyond what Analysis Workspace can provide. The files contain one row per hit and include all standard and custom variables. This is the most granular export option available.</p>

<h2>Data Warehouse</h2>
<p>Data Warehouse is a reporting tool for requesting large, aggregated data exports. Unlike Analysis Workspace (which has row limits and is optimized for interactive analysis), Data Warehouse can process unlimited rows and export the results as CSV or Tableau Data Extract (TDE) files. Data Warehouse requests are queued and processed asynchronously — they may take minutes to hours depending on the data volume and complexity. Use Data Warehouse when you need complete, unsampled data for a specific query that exceeds Workspace's capabilities.</p>
`,

"aa-virtual-report-suites": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Admin & Implementation</div>
  <h1>Virtual Report Suites</h1>
  <p class="subtitle">Filtered views of existing Report Suites for role-based or region-based reporting</p>
</div>
<div class="tag-row"><span class="tag key">Admin Feature</span></div>

<h2>Virtual Report Suite Concept</h2>
<p>A Virtual Report Suite (VRS) applies a persistent segment to an existing Report Suite to create a filtered view of the data. The VRS does not store data separately — it dynamically applies its segment filter whenever someone queries it. This means VRS instances are lightweight, do not increase data collection costs, and do not require any implementation changes. They are purely a reporting-level construct. Common use cases include: creating region-specific views (US VRS, EMEA VRS, APAC VRS from a global Report Suite), creating team-specific views (Marketing VRS with only marketing-relevant dimensions visible, Product VRS with only product engagement data), and creating environment-specific views (removing internal traffic or bot traffic from a production Report Suite). VRS can also have their own curated component lists — you can restrict which dimensions, metrics, and segments are visible in the VRS, simplifying the interface for users who only need a subset of available components.</p>
`,

"aa-anomaly-detection": `
<div class="content-header">
  <div class="breadcrumb">Adobe Analytics <span class="sep">›</span> Admin & Implementation</div>
  <h1>Anomaly Detection & Intelligent Alerts</h1>
  <p class="subtitle">AI-powered detection of unusual patterns in your data</p>
</div>
<div class="tag-row"><span class="tag tip">AI/ML Feature</span></div>

<h2>Anomaly Detection</h2>
<p>Anomaly Detection is an AI/ML feature powered by Adobe Sensei that automatically identifies statistically significant deviations in your data. When enabled on a metric in a Freeform Table, it calculates an expected range based on historical patterns (seasonality, trends, day-of-week patterns) and flags data points that fall outside the expected confidence interval. A green band shows the expected range, and data points outside this band are highlighted as anomalies. This eliminates the need to manually monitor metrics for unusual changes — the system does it automatically. Anomaly Detection uses advanced statistical models that account for day-of-week patterns, seasonal trends, and growth trends. It is available on any daily-granularity metric in Analysis Workspace.</p>

<h2>Intelligent Alerts</h2>
<p>Intelligent Alerts build on Anomaly Detection by allowing you to set up automated notifications when anomalies occur or when specific metric thresholds are crossed. You can create alerts like "Notify me when daily revenue drops more than 20% below expected," "Alert when bounce rate exceeds 60%," or "Notify when conversion rate is anomalous." Alerts can be delivered via email and can include multiple conditions combined with AND/OR logic.</p>
`,
