      { q: "A 'Purchase' success event fires. The s.products variable also populated. What metrics does this generate?", opts: ["Only the custom Purchase event count", "Orders, revenue, units — derived from the s.products string", "Only revenue — orders and units must be separate events", "Only the Revenue eVar updates"], ans: 1, explain: ["The purchase event also auto-builds Orders, Revenue, and Units.", "✅ When a Purchase event fires with a valid s.products string (product;category;quantity;revenue), Adobe auto-calculates Orders (1 per purchase event), Revenue (sum), and Units (sum of quantities).", "Orders and units are extracted from s.products automatically — no separate events needed.", "eVars capture dimensions — Revenue is a metric from s.products, not an eVar."] },
      { q: "What does setting a success event's 'Participation' flag to 'Enabled' do?", opts: ["Allows the event to fire on every page view automatically", "Gives full conversion credit to ALL eVars/dimensions that touched the path, not just the last", "Enables the event to be used in calculated metrics", "Requires the event to fire before the visit ends"], ans: 1, explain: ["Participation doesn't change when events fire.", "✅ Participation metric flag gives 100% credit to ALL touchpoints (eVar values) set before the conversion — enabling first-touch, multi-touch analysis in reports.", "Events are always available in calculated metrics regardless of this setting.", "Event timing depends on implementation — not the participation flag."] },
      { q: "A company wants to count the number of times users click their 'Add to Cart' button (no page load occurs). Which method is CORRECT?", opts: ["Set a page view hit (s.t()) with a custom event", "Use s.tl() link tracking with s.events set to the Cart Add event", "Set an eVar to capture 'cart-add'", "Use a processing rule to fire the event"], ans: 1, explain: ["s.t() increments page views — not appropriate for a button click.", "✅ s.tl() fires a custom link hit without a page view — ideal for button clicks. Passing the Cart Add event in s.events counts the action.", "An eVar captures a dimension value — not a counter event.", "Processing rules transform existing data — they cannot fire new hits."] },
      { q: "An event is configured as type 'Counter' with 'No Duplicate Event Filtering'. What does 'Duplicate Event Filtering' do when enabled?", opts: ["Removes all events from the same visitor", "Prevents the same event from being counted more than once per visit", "Merges duplicate events into a single row in reports", "Flags bot traffic associated with duplicate events"], ans: 1, explain: ["Filtering per visitor would be too broad.", "✅ With Duplicate Event Filtering enabled on a Counter event, the same event firing multiple times in one visit is only counted ONCE — preventing double-counting from page refreshes or browser back-navigation.", "Events appear as separate rows normally — filtering prevents double counting, not merging.", "Bot filtering is a separate admin feature."] },
      { q: "Which of the following is a reason to use a NUMERIC success event instead of a Currency event?", opts: ["Numeric events can be used in conversion funnels; Currency events cannot", "To capture a non-monetary numeric value like 'number of video seconds watched'", "Numeric events support multi-value capture", "Currency events are deprecated in recent Adobe Analytics versions"], ans: 1, explain: ["Both event types can be used in funnels.", "✅ Numeric events store plain numbers without currency formatting — ideal for metrics like page load time (ms), video duration (seconds), form fields completed (count).", "Neither event type natively supports multi-value in one hit.", "Currency events are not deprecated — they are still used for revenue."] }
    ];

    QUIZZES["aa-tracking-code"] = [
      { q: "Where does the campaign tracking code typically reside when a visitor clicks a marketing link?", opts: ["In a first-party cookie set before the click", "As a URL query string parameter (e.g., ?cid=email_spring)", "In the HTTP referrer header", "As a subdomain of the landing page URL"], ans: 1, explain: ["Cookies are set after arrival — the tracking code must reach the landing page first.", "✅ Campaign tracking codes are passed as URL query parameters — e.g., ?cid=email_spring — captured by s.campaign on the landing page.", "The referrer shows where you came FROM but doesn't carry custom tracking codes.", "Subdomains identify site sections — not campaign tracking codes."] },
      { q: "The s.campaign variable in Adobe Analytics is characterized as what type of variable by DEFAULT?", opts: ["A prop (traffic variable)", "A standard eVar with 30-day visit expiration", "An eVar (conversion variable) that by default has 30-day expiration", "A success event counter"], ans: 2, explain: ["s.campaign is an eVar — it persists across hits to attribute conversions.", "s.campaign uses 30-day expiration by default — not 'visit'.", "✅ s.campaign is essentially eVar0 — configured as an eVar with default 30-day expiration to link campaign clicks to later conversions.", "s.campaign is not a success event."] },
      { q: "What happens if a user clicks a campaign link but their browser blocks cookies?", opts: ["The tracking code is stored in localStorage instead", "The tracking code cannot be stored — the visit appears as Direct/None in channel reports", "Adobe Analytics uses a server-side session instead", "The tracking code is attached to the IP address"], ans: 1, explain: ["AA does not fall back to localStorage for campaign tracking.", "✅ If cookies are blocked, the s.campaign value cannot persist to a returning visit — the user appears as a new visitor and their channel may attribute to Direct.", "AA is client-side cookie based — no server-side session fallback for tracking codes.", "IP attribution is not a supported fallback mechanism."] },
      { q: "What is the recommended way to standardize campaign tracking codes across all marketing teams?", opts: ["Let each team define their own format freely", "Use Adobe Analytics Processing Rules to normalize values after collection", "Implement a UTM parameter standard and a campaign code builder tool", "Use Classifications (SAINT) to map raw codes to standardized names and categories"], ans: 3, explain: ["Free-form codes create messy, inconsistable data.", "Processing rules can help but require rules for every variation — not scalable.", "UTM parameters are Google Analytics convention — AA uses its own campaign variable.", "✅ SAINT Classifications let you upload a lookup table mapping raw codes (e.g., EM-2024-SPRING) to readable names, channels, and campaign attributes without changing implementation."] },
      { q: "A company uses paid search (PPC). How should they TRACK which paid keyword drove a conversion?", opts: ["Use the referrer URL to extract the keyword", "Set s.campaign with the keyword value from the URL parameter and let it persist to conversion", "Use a prop to capture the keyword on the landing page", "Configure an Adobe Target activity for each keyword"], ans: 1, explain: ["Referrers show the search engine URL — extracting specific keywords requires additional processing.", "✅ Pass the paid keyword as s.campaign (or a dedicated eVar) via URL parameter. Its 30-day persistence links keyword → conversion even if the user returns later.", "A prop captures the keyword but cannot attribute to the purchase event.", "Adobe Target is for testing and personalization — not attribution."] },
      { q: "What does 'Last-Touch Channel' vs 'First-Touch Channel' mean in Marketing Channel reporting?", opts: ["Last-Touch = channel at time of purchase; First-Touch = channel of first ever visit", "First-Touch = channel that won the click; Last-Touch = channel that lost to another channel", "Last-Touch = total revenue; First-Touch = total visits", "They are identical — just different report names"], ans: 0, explain: ["✅ Last-Touch = the channel that directly preceded the conversion (gets full credit for revenue). First-Touch = the channel of the visitor's first-ever interaction — useful for acquisition analysis.", "That definition is backwards.", "Last-Touch and First-Touch are attribution windows — not revenue/visit counts.", "They represent fundamentally different attribution perspectives."] },
      { q: "A user clicks an email link (campaign = 'email_may'), then 2 days later clicks a paid search ad (campaign = 'ppc_brand'), then purchases. With 30-day expiration and Last Value allocation, which campaign gets revenue credit?", opts: ["email_may — because it was the first campaign", "ppc_brand — because it is the most recent value", "Both equally", "Neither — the 30 days expired"], ans: 1, explain: ["Last Value allocation gives credit to the MOST RECENT value.", "✅ 'Last Value' allocation means the most recent eVar value (ppc_brand) overrides email_may and receives all revenue credit.", "Linear allocation would split credit — Last Value does not.", "2 days is well within 30-day expiration."] },
      { q: "Which link type in s.tl() is used to track file downloads like a PDF?", opts: ["Custom Link (lnk_o)", "Exit Link (lnk_e)", "Download Link (lnk_d)", "Page Link (lnk_p)"], ans: 2, explain: ["Custom links (lnk_o) are for other custom interactions.", "Exit links (lnk_e) track clicks to external sites.", "✅ Download links (lnk_d) are the correct type for file downloads — Adobe Analytics uses this to populate the 'File Downloads' report.", "'Page Link' is not a valid s.tl() link type."] }
    ];

    QUIZZES["aa-hit-types"] = [
      { q: "What is the main difference between s.t() and s.tl()?", opts: ["s.t() fires for links; s.tl() fires for page loads", "s.t() fires a page view hit; s.tl() fires a link tracking hit without incrementing page views", "Both increment page views equally", "s.tl() is deprecated — s.t() handles all tracking"], ans: 1, explain: ["This is exactly backwards.", "✅ s.t() = page view call (increments Page Views). s.tl() = link/custom tracking (does NOT increment Page Views or Visits counter).", "Only s.t() increments page views.", "s.tl() is actively used for button clicks, downloads, cross-domain tracking."] },
      { q: "A developer uses s.tl(true, 'o', 'Add to Cart') to track a button click. What does the 'true' argument control?", opts: ["Whether the hit includes all page-level variables", "Whether to delay link tracking by 500ms to allow data to send before page changes", "Enabling list prop for this hit", "Overriding the page's report suite ID"], ans: 1, explain: ["The 'true' argument is about the 'this' context — but in the delay context it controls timing.", "✅ The first parameter is an object reference ('this') or boolean. When true, it enables a 500ms delay to ensure data completes sending before the page navigates away (e.g., clicking a link that causes navigation).", "List props are configured in Admin — not in s.tl().", "Report suite overrides use the s.account variable — not s.tl() parameters."] },
      { q: "Which s.tl() parameter is required to identify what was clicked in reports?", opts: ["The link URL (second parameter)", "The link type (second parameter)", "The link name (third parameter)", "A special s.te() call"], ans: 2, explain: ["The first parameter is an object/boolean delay indicator.", "The link type ('d', 'e', 'o') is second — classifies the link.", "✅ The third parameter is the link name — this is what appears in the Custom Links / Download Links / Exit Links reports.", "s.te() is not a real Adobe Analytics function."] },
      { q: "When would you use s.tl() instead of s.t() to track a Single Page Application (SPA) route change?", opts: ["Never — SPAs should only use s.t() for all route changes", "Use s.t() for the initial load, then s.tl() for subsequent route changes to avoid inflating Visits", "Use s.tl() for all SPA tracking to avoid any page view increments", "Use s.tl() only when the URL does not change"], ans: 1, explain: ["Using s.t() for all route changes inflates Page Views and Visits.", "✅ SPA best practice: s.t() for initial page load (sets the visit). Subsequent in-app navigation uses s.t() but with updated pageName — or s.tl() if you want to track interactions without new page views.", "Using s.tl() exclusively misses the actual page view tracking.", "URL changes are handled differently in SPAs but s.tl() can be used with or without URL changes."] },
      { q: "What metric does s.tl() increment (beyond custom events you set manually)?", opts: ["Page Views", "Visits", "Instances (custom link occurrences)", "Server Calls"], ans: 2, explain: ["s.tl() does NOT increment Page Views.", "s.tl() does NOT create a new Visit.", "✅ s.tl() increments 'Instances' for any eVar values captured and contributes to the Custom Links / Download Links reports — but does not increment standard Page Views.", "Server calls are incremented by both s.t() and s.tl() — but this is not a 'metric' visible in reports."] },
      { q: "A form submit button triggers a redirect to a thank-you page. The developer is worried data might not send before the page unloads. What should they do?", opts: ["Use s.t() with a callback function", "Use s.tl(this, 'o', 'Form Submit') — the 'this' reference plus link name enables a send buffer", "Use s.tl(true, 'o', 'Form Submit') to trigger a 500ms delay", "Use cookies to store the event and fire it on the thank-you page"], ans: 2, explain: ["s.t() is a page view call — not ideal for a form submit button action.", "'this' without 'true' doesn't guarantee buffering time.", "✅ s.tl(true, ...) enables a 500ms send delay so the beacon can complete before navigation. For s.tl(this, ...) when 'this' is a link element, the browser's link delay is used.", "Cookie-based retry is an alternative approach but not the standard s.tl() mechanism."] },
      { q: "Which report in Adobe Analytics is populated by s.tl() calls using link type 'e' (exit links)?", opts: ["Exit Pages report", "Custom Links report", "Exit Links report", "Outbound Links report"], ans: 2, explain: ["Exit Pages report shows last page of a visit — not exit link clicks.", "Custom Links report uses type 'o'.", "✅ Link type 'e' populates the Exit Links report — showing which external URLs users clicked to leave your site.", "'Outbound Links' is not the official report name in AA — it's 'Exit Links'."] },
      { q: "What is a 'heartbeat' call in Adobe Analytics video/media tracking?", opts: ["A page view call that fires every 10 seconds to keep the visit alive", "A periodic s.tl() call sent during video playback to measure time spent watching", "A server ping to check if the Adobe collection servers are online", "A timer that resets the visitor's session timeout"], ans: 1, explain: ["Visits don't need keep-alive calls — they time out after 30 min of inactivity.", "✅ Media heartbeat tracking sends periodic s.tl()-based calls (typically every 10 seconds during playback) to measure content consumption and time spent — creating detailed video engagement metrics.", "Collection server health is monitored by Adobe infrastructure — not client-side.", "Session timeout is 30 minutes of inactivity — heartbeats don't change this."] }
    ];

    QUIZZES["aa-seg-containers"] = [
      { q: "What are the THREE segment containers in Adobe Analytics, from smallest to largest scope?", opts: ["Page > Visit > Visitor", "Hit > Visit > Visitor", "Event > Session > Person", "Click > Session > Profile"], ans: 1, explain: ["'Page' is not the container name — 'Hit' is.", "✅ Hit (single interaction) > Visit (session) > Visitor (all time cross-visit). These are the three containers.", "Event/Session/Person are CJA terminology — not Adobe Analytics.", "Click/Session/Profile are not Adobe Analytics container names."] },
      { q: "A segment uses a VISITOR container with the condition 'Page Name = Checkout'. What does this return?", opts: ["Only the hits where the checkout page was viewed", "Only the visits that included a checkout page view", "ALL hits from ALL visits for ANY visitor who EVER viewed the checkout page", "The checkout page view hit plus the conversion event hit only"], ans: 2, explain: ["Hit-level container returns only the specific hits.", "Visit-level container returns all visits that included checkout.", "✅ Visitor container broadens to ALL data — every visit and every hit from any visitor who ever saw the checkout page, even visits where they didn't visit checkout.", "Visitor container doesn't filter to just certain hits — it includes everything from qualifying visitors."] },
      { q: "When should you use a HIT-level container instead of a VISIT-level container?", opts: ["When you want all visits where the condition occurred", "When you want to filter to the exact hits where a specific condition was true", "When you want to find visitors who ever did something", "When analyzing returning customers across multiple visits"], ans: 1, explain: ["All visits where condition occurred = VISIT container.", "✅ Hit container limits results to the specific interactions where the condition was true — ideal when you need granular precision (e.g., 'hits where search term = laptop').", "Cross-visit analysis = VISITOR container.", "Returning customer analysis = VISITOR container."] },
      { q: "A segment is: VISIT container [Page = Homepage] AND [Purchase exists]. What does this return?", opts: ["Visitors who visited homepage AND ever purchased", "Visits where the homepage was viewed AND a purchase occurred IN THE SAME VISIT", "Hits where both homepage and purchase happened simultaneously", "Visitors who purchased through the homepage only"], ans: 1, explain: ["This would be a VISITOR container.", "✅ VISIT container with multiple conditions = conditions must co-occur IN THE SAME VISIT. This returns visits where both homepage was viewed AND a purchase was completed in that same visit.", "Simultaneous hits are impossible — a Hit container with AND would require the same hit to have both values.", "'Homepage only' would require excluding other referrers."] },
      { q: "Which operator creates a SEQUENTIAL segment requiring A happened THEN B?", opts: ["AND", "OR", "NOT", "THEN"], ans: 3, explain: ["AND requires both conditions true together — not necessarily in order.", "OR means either condition can be true.", "NOT excludes a condition.", "✅ THEN creates a sequential requirement — the second condition must occur AFTER the first condition in the data timeline."] },
      { q: "A segment has VISITOR container with NOT [Page = Cart]. What does this exclude?", opts: ["Hits on the cart page", "Visits that included a cart page view", "ALL visitors who EVER viewed the cart page (removing all their data)", "Only visitors who ended their last visit on the cart page"], ans: 2, explain: ["NOT at visitor level doesn't target hits — it removes entire visitors.", "Visit container would remove visits — Visitor container removes all data from qualifying visitors.", "✅ NOT inside a VISITOR container removes ALL data for any visitor who ever saw the cart page — all their hits across all time are excluded.", "Visit-ending on cart is different from ever visiting cart."] },
      { q: "Why is it PROBLEMATIC to use a VISITOR container when you only want to analyze a specific visit behavior?", opts: ["Visitor containers cannot be used with eVars", "Visitor containers are less accurate due to cookie deletion", "Visitor containers bring in data from ALL visits — including irrelevant visits where the condition didn't occur — inflating metrics", "Visitor containers don't work with sequential segments"], ans: 2, explain: ["Visitor containers work fine with eVars.", "Cookie deletion affects identification — not the container logic.", "✅ Using a Visitor container 'bleeds in' all visits from qualifying visitors — including visits where the condition wasn't met. This inflates session counts and can mislead analysis.", "Visitor containers do work with sequential segments."] },
      { q: "What is an 'exclude' container in segmentation and when is it used?", opts: ["A special container that blocks data from specific IPs", "A way to specify conditions that must NOT be present within the defined scope", "A container that removes bots from report data", "A segment applied to a VRS to exclude internal traffic"], ans: 1, explain: ["IP exclusion is a separate admin feature — not an exclude container.", "✅ Exclude containers let you define conditions that disqualify data. Example: VISIT container EXCLUDE [Page = Error Page] — shows visits that did NOT include an error page.", "Bot filtering is a separate admin feature.", "VRS segment filtering is a separate concept from segment exclude containers."] }
    ];

    QUIZZES["aa-seg-logic"] = [
      { q: "In an Adobe Analytics segment, AND logic means:", opts: ["Either condition can be true", "Both conditions must be true for the same scope", "One condition is true while the other is false", "Conditions are evaluated in sequence over time"], ans: 1, explain: ["Either condition = OR logic.", "✅ AND requires BOTH conditions to be simultaneously satisfied within the same container scope.", "One true/one false describes XOR or exclusion logic.", "Over-time sequential evaluation is THEN logic (sequential segments)."] },
      { q: "OR logic in a segment means:", opts: ["Both conditions must be true at the same time", "At least ONE of the conditions must be true", "Neither condition can be true", "Conditions must occur in order"], ans: 1, explain: ["Both true simultaneously = AND logic.", "✅ OR = at least one condition is satisfied — broadens the segment to include more data.", "Neither condition true = NOT logic.", "Order-based = THEN (sequential) logic."] },
      { q: "A segment is: [Page = Product] OR [Event = Add to Cart]. Which visitors are INCLUDED?", opts: ["Only visitors who viewed a product AND added to cart", "Visitors who viewed a product, OR added to cart, OR both", "Only visitors who did BOTH actions in the same visit", "Visitors who viewed a product but did NOT add to cart"], ans: 1, explain: ["AND logic — not OR — requires both simultaneously.", "✅ OR includes visitors who satisfy EITHER condition — those who only viewed products, those who only added to cart, AND those who did both.", "'Only both' describes AND logic.", "'Viewed but not added' would require AND + NOT logic."] },
      { q: "When segmenting for 'Visitors who viewed Product page AND then Purchased', which logic is required?", opts: ["AND logic within a Visit container", "OR logic within a Visitor container", "THEN logic within a sequential segment", "NOT logic to exclude non-purchasers"], ans: 2, explain: ["AND in a visit container means both conditions co-occurred but doesn't ensure ORDER.", "OR would include visitors who only did one or the other.", "✅ THEN logic with a sequential segment ensures 'Viewed Product' happened BEFORE 'Purchase' — the time-ordered relationship is captured.", "NOT logic excludes — it doesn't establish order."] },
      { q: "How does 'THEN' logic differ from 'AND' inside the same Visit container?", opts: ["They are identical — THEN is just an alias for AND at the visit level", "AND requires both conditions in the same visit; THEN requires both in order (ordered sequence)", "THEN only works across visits; AND works within a visit", "THEN can only use Visitor containers; AND works with all containers"], ans: 1, explain: ["THEN and AND are distinctly different operators.", "✅ AND: both conditions in the same scope (no order guarantee). THEN: conditions must be satisfied in temporal ORDER — A must happen before B.", "THEN works across visits AND within visits depending on configuration.", "THEN can be used with all container types."] },
      { q: "A segment uses: HIT container [eVar1='Email'] AND NOT [Event=Purchase]. What does this capture?", opts: ["All email hits where a purchase also occurred", "Email-attributed hits where a purchase did NOT occur in the same hit", "All email visitors who never purchased", "Email hits from visitors who purchased in other visits"], ans: 1, explain: ["AND NOT excludes purchase from the same scope — not adds it.", "✅ Hit container [eVar1='Email'] AND NOT [Event=Purchase] returns the specific hits where eVar1 was Email but the purchase event did NOT fire in that same hit.", "Visitor-level never-purchased logic needs a Visitor container and NEVER operator.", "Cross-visit analysis needs Visitor container — this is Hit-scoped."] },
      { q: "Which container combination correctly segments 'Visits where a mobile user viewed the homepage AND added to cart'?", opts: ["VISITOR[Device=Mobile] AND VISITOR[Page=Home] AND VISITOR[Event=Cart Add]", "VISIT[HIT[Device=Mobile] AND HIT[Page=Home] AND HIT[Event=Cart Add]]", "VISIT[Device=Mobile AND Page=Home AND Event=Cart Add]", "HIT[Device=Mobile] THEN HIT[Page=Home] THEN HIT[Event=Cart Add]"], ans: 2, explain: ["Visitor container would include all visits from ever-mobile users — too broad.", "Nested HIT containers would require all three conditions in the SAME hit — impossible (device, page, and cart add can be different hits in a visit).", "✅ VISIT container with all conditions means: within ONE visit, the visitor used mobile, viewed homepage, AND added to cart — conditions distributed across the visit.", "THEN creates sequential ordering — OR nested Hit containers add complexity unnecessarily."] },
      { q: "What is a 'stacked segment' in Adobe Analytics?", opts: ["A segment applied inside an eVar formula", "Applying multiple segments simultaneously to the same report — AND logic between segments", "A segment that uses multiple THEN operators", "A segment based on stacked bar chart data"], ans: 1, explain: ["eVar formulas use calculated metrics — not segments.", "✅ Stacked segments apply two or more saved segments to the same freeform table — effectively creating AND logic between each segment's conditions.", "Multiple THEN operators create sequential segments — that's sequential, not stacked.", "Segments are not derived from visualization types."] }
    ];

    QUIZZES["aa-seg-sequential"] = [
      { q: "What is the key operator that defines a sequential segment?", opts: ["AND", "OR", "THEN", "WITHIN"], ans: 2, explain: ["AND requires co-occurrence — not sequential order.", "OR broadens — doesn't enforce sequence.", "✅ THEN is the sequential operator — it requires the second condition to occur AFTER the first in the data timeline.", "WITHIN is a modifier that limits the TIME or HITS between sequential steps."] },
      { q: "A sequential segment is: [Page=Homepage] THEN [Event=Purchase]. What does this capture?", opts: ["Visitors who visited homepage and purchased in any order", "Visitors who visited homepage and then SUBSEQUENTLY purchased (homepage first)", "Visits where homepage and purchase occurred in the same hit", "Visitors who purchased but never visited the homepage"], ans: 1, explain: ["'Any order' would use AND without THEN.", "✅ THEN enforces that homepage happened FIRST, then the purchase happened AFTER — could be same visit or different visits depending on container.", "Same hit is impossible for two different page interactions — and would use Hit container with AND.", "'Never visited' would use NOT logic."] },
      { q: "What does the 'WITHIN 1 Visit' modifier do in a sequential segment?", opts: ["Limits the segment to only single-page visits", "Requires both steps to occur within the same visit session", "Means the steps must happen within 1 calendar day", "Requires exactly 1 visit between the two steps"], ans: 1, explain: ["Single-page visits are a different concept.", "✅ 'WITHIN 1 Visit' constrains the THEN sequence — both conditions must occur within the same visit, not across any future visit.", "Calendar day limiting uses 'Within 1 Day' modifier.", "'Within 1 Visit' doesn't mean 1 visit apart — it means within the same visit."] },
      { q: "How is an 'EXCLUDE after' logic used in sequential segments?", opts: ["Removes visitors from the segment entirely", "Requires that after step A, condition B did NOT occur before step C", "Excludes the hit where the first step fired", "Prevents event double-counting"], ans: 1, explain: ["'Exclude after' is more targeted — not a full visitor removal.", "✅ Exclude-after lets you say: [Step A] THEN EXCLUDE [condition B] THEN [Step C] — used to find users who went A → C without B in between (e.g., checkout without error page).", "It doesn't exclude the step A hit — it excludes qualifying data AFTER step A.", "Double-counting prevention is a separate event deduplication feature."] },
      { q: "A segment captures users who 'Searched THEN purchased within the same visit'. What CONTAINER and OPERATOR are needed?", opts: ["Visitor container + AND", "Visit container + THEN", "Hit container + THEN", "Visitor container + THEN + WITHIN 1 Visit"], ans: 3, explain: ["Visitor + AND = co-occurred at any time, no order.", "Visit + THEN = works BUT must configure time constraint properly.", "Hit container + THEN = impossible — THEN requires different hit events.", "✅ Visitor container + THEN + WITHIN 1 Visit modifier constrains the sequential logic to a single visit — finding visitors who completed search → purchase in one session."] },
      { q: "What is the difference between a CHECKPOINT and an EXCLUSION in sequential segmentation?", opts: ["Checkpoints require an action; exclusions are optional conditions", "Checkpoints define steps that MUST occur; exclusions define steps that must NOT occur between checkpoints", "Checkpoints are hit-level; exclusions are visit-level", "They are identical — different admin UI labels"], ans: 1, explain: ["Optionality is not the distinction.", "✅ Checkpoints are required positive conditions in the sequence. Exclusions specify that a condition must be ABSENT between checkpoints (e.g., viewed cart THEN EXCLUDE [error page] THEN purchased).", "Both can be at any container level.", "They serve distinctly different purposes."] },
      { q: "Can a sequential segment span multiple visits?", opts: ["No — sequential segments only work within a single visit", "Yes — by default THEN can span across multiple visits for the same visitor", "Only if the WITHIN modifier specifies multiple visits", "Only if configured in Admin settings"], ans: 1, explain: ["THEN is not limited to a single visit by default.", "✅ By default, THEN logic works across visits — if Visit 1 had step A and Visit 5 had step B, the segment can capture that. Add WITHIN 1 Visit to constrain it.", "WITHIN modifier constrains — but without it, cross-visit sequences are captured.", "No Admin setting is required."] },
      { q: "A sequential segment: [Visit container] [Searched] THEN WITHIN 30 Minutes [Purchased]. What does this capture?", opts: ["Visitors who searched and later purchased in any 30-day window", "Visits where user searched AND purchased within a 30-minute window in the same visit", "All visits where search and purchase happened within 30 hits of each other", "Visitors who made a purchase within 30 minutes of their FIRST ever visit"], ans: 1, explain: ["30 minutes is a time constraint — not 30 days.", "✅ WITHIN 30 Minutes restricts the THEN to require the purchase to occur within 30 minutes of the search — in the same visit context.", "Hits-based limit uses 'WITHIN X Hits' — not 'WITHIN 30 Minutes'.", "First-visit analysis requires different logic."] }
    ];


    QUIZZES["aa-workspace"] = [
      { q: "What is Analysis Workspace in Adobe Analytics?", opts: ["A data collection tool for setting up tracking code", "A drag-and-drop report builder for visualizing and analyzing data", "An admin tool for configuring eVars and events", "A mobile SDK for app analytics"], ans: 1, explain: ["Data collection is done via AppMeasurement — not Workspace.", "✅ Analysis Workspace is Adobe Analytics' drag-and-drop reporting interface for building custom reports, visualizations, and sharing insights.", "Admin settings are configured in Report Suite Manager — not Workspace.", "Mobile SDK is a separate implementation library."] },
      { q: "What is a 'Panel' in Analysis Workspace?", opts: ["A single visualization like a bar chart", "A container that can hold multiple visualizations and tables, with its own date range and segment", "A saved report shared to a dashboard", "A calculated metric formula"], ans: 1, explain: ["A single visualization is not a panel — a panel CONTAINS visualizations.", "✅ A Panel is a top-level container in Workspace that groups related visualizations. It has its own date range and segment that applies to everything inside it.", "Shared reports are 'Projects' — not panels.", "Calculated metrics are defined in the Components menu."] },
      { q: "Which Adobe Analytics panel compares how different attribution models credit conversion channels?", opts: ["Blank Panel", "Quick Insights Panel", "Attribution Panel", "Segment Comparison Panel"], ans: 2, explain: ["Blank Panel is an empty starting container — no specific analysis.", "Quick Insights Panel auto-suggests visualizations for beginners.", "✅ The Attribution Panel lets you drop in a metric and compare up to 10 attribution models side by side (First Touch, Last Touch, Linear, Time Decay, etc.).", "Segment Comparison Panel finds the biggest differences between two segments."] },
      { q: "How do you apply a segment to ONLY ONE panel in a multi-panel Workspace project?", opts: ["Drop the segment into the Report Suite selector", "Drop the segment into the panel's segment drop zone at the top of that panel", "Apply the segment in the project-level filter — it only affects the selected panel", "Segments in Workspace always apply to the entire project"], ans: 1, explain: ["Report suite selector determines which data set to use — not segmentation.", "✅ Each panel has its own segment drop zone in the header. Segments dropped there apply ONLY to that panel — other panels use their own segments.", "Project-level date range applies across panels — project-level segments do too.", "Panels have their own scope — segments can be panel-level OR project-level."] },
      { q: "What does 'Ctrl+Z' (Undo) do in Analysis Workspace?", opts: ["Deletes the last created panel", "Undoes the last action — drag, drop, edit — allowing non-destructive exploration", "Saves the project", "Resets the project to default state"], ans: 1, explain: ["Ctrl+Z undoes the action — not delete a specific element.", "✅ Workspace supports full undo/redo — great for exploratory analysis where you can experiment freely and reverse any changes.", "Ctrl+S saves — Ctrl+Z undoes.", "Resetting to default requires manual action — Ctrl+Z restores the previous state."] },
      { q: "A Freeform Table in Workspace has a dimension row. What happens when you DOUBLE-CLICK on a dimension value?", opts: ["The value is highlighted for copy/paste", "A breakdown appears — showing sub-dimensions within that specific value", "A new panel is created for that value", "The row is deleted"], ans: 1, explain: ["Double-click triggers breakdown — not copy.", "✅ Double-clicking a dimension value in a Freeform Table adds a breakdown row — allowing you to see a sub-dimension (e.g., break down 'Organic Search' by 'Search Keyword').", "new panel creation requires right-click or dragging a panel.", "Rows have an X button to delete — not double-click."] },
      { q: "What is a 'Computed Column' in a Freeform Table?", opts: ["A column that automatically sums all rows below it", "A column created by dragging a calculated metric into the table", "A column that shows sparkline trends for each row", "A column auto-generated by Adobe's AI insights"], ans: 1, explain: ["Auto-summation is the 'Total Row' feature — not computed columns.", "✅ Computed columns are created by dragging a calculated metric (or a regular metric with an applied segment) into the Freeform Table as a column — giving you custom metric views per row.", "Sparklines are a Freeform Table option but not what 'computed column' means.", "AI insights appear in Intelligent Alerts and Anomaly Detection — not computed columns."] },
      { q: "Which feature in Analysis Workspace automatically identifies unusual changes in data trends?", opts: ["Segment IQ", "Anomaly Detection", "Contribution Analysis", "Flow Visualization"], ans: 1, explain: ["Segment IQ (Segment Comparison Panel) compares two segments — not anomalies.", "✅ Anomaly Detection uses statistical modeling to automatically highlight statistically significant deviations in time-series metrics — shown as shaded bands in line charts.", "Contribution Analysis (now AI-powered) identifies which dimensions drove an anomaly — it's a step AFTER Anomaly Detection.", "Flow shows navigation paths — not statistical anomalies."] }
    ];

    QUIZZES["aa-viz-fallout"] = [
      { q: "What does a Fallout visualization show?", opts: ["The paths users take freely through a site", "How many users completed each step of a defined funnel (and where they dropped off)", "Revenue contribution by marketing channel", "Page load times across the site"], ans: 1, explain: ["Free paths = Flow visualization.", "✅ Fallout shows conversion rates at each predefined step — what % of visitors completed each step and where they fell out of the funnel.", "Channel revenue = Attribution Panel or marketing channel report.", "Page load = Server Call timing metrics."] },
      { q: "In Fallout, what is a 'Touchpoint'?", opts: ["A paid media ad click", "A step in the funnel that you define (e.g., a page view or event)", "The final conversion goal only", "A visitor segment applied to the report"], ans: 1, explain: ["Paid ad clicks are a marketing concept — not Fallout terminology.", "✅ A Touchpoint is each step you define in the Fallout visualization — can be a page name, an eVar value, an event, or any dimension value.", "Fallout can have any number of touchpoints — not just the conversion step.", "Segments can be applied to Fallout but are not touchpoints themselves."] },
      { q: "What is the difference between 'Event', 'Session', and 'Person' container in a Fallout visualization?", opts: ["They determine which report suite is used", "They control the scope of fallout — hit level, visit level, or all visits for the visitor", "They determine the time range of the analysis", "They filter which touchpoints count"], ans: 1, explain: ["Report suite is selected at the panel level.", "✅ Event container = must complete fallout in one hit (rare use). Session container = must complete within one visit. Person container = can complete across ANY visits over time.", "Time range is the panel date range — not container type.", "Container type controls the unit of analysis — not which touchpoints exist."] },
      { q: "A Fallout shows: Homepage (100%) → Product Page (60%) → Cart (30%) → Purchase (15%). What is the 'fallout rate' from Cart to Purchase?", opts: ["15%", "30%", "50%", "85%"], ans: 2, explain: ["15% is the overall completion — not the Cart→Purchase rate.", "30% is the Cart completion rate — not the fallout rate.", "✅ Fallout from Cart (30%) to Purchase (15%): 15/30 = 50% FELL OUT between cart and purchase. 50% conversion from cart, 50% fallout.", "85% is the fallout from Homepage to Product Page."] },
      { q: "Which scenario is BEST suited for a Fallout visualization?", opts: ["Finding navigation paths users took after viewing a product", "Comparing revenue attributed to email vs paid search", "Measuring checkout funnel conversion by device type", "Seeing how long users stay on the site over time"], ans: 2, explain: ["Free-form navigation paths = Flow visualization.", "Channel revenue comparison = Attribution Panel or bar chart.", "✅ A multistep checkout funnel by device type is perfect for Fallout — define the steps, break down by device dimension, see where mobile vs desktop users drop off.", "Time-on-site trends = line chart or cohort table."] },
      { q: "How can you compare two audience segments within the same Fallout visualization?", opts: ["Create two separate Fallout visualizations in different panels", "Drag and drop two segment pills onto the Fallout visualization", "Use the Attribution Panel instead", "Create a Venn diagram to show overlap first"], ans: 1, explain: ["Separate panels work but Fallout supports in-visualization segments.", "✅ You can drag segments directly onto a Fallout visualization to create parallel funnel lines — one per segment — enabling direct visual comparison of conversion rates.", "Attribution Panel analyzes channel credit — not funnel comparison.", "Venn shows overlap — not funnel conversion by segment."] },
      { q: "A marketer wants to understand if users who see a new product recommendation feature convert at higher rates. Which visualization should they build?", opts: ["Flow — to see where feature viewers go", "Fallout — define steps: Homepage → Feature Seen → Product Page → Purchase", "Cohort Table — track retention of feature users over 4 months", "Histogram — show distribution of feature views"], ans: 1, explain: ["Flow shows paths — not conversion funnel rates.", "✅ Fallout defines the exact steps and shows conversion rates at each step — perfect for measuring the impact of a feature on the purchase funnel.", "Cohort tracks long-term return behavior — not funnel conversion.", "Histogram shows value distribution — not funnel steps."] },
      { q: "In a Fallout report, what is 'All Visits' fallout vs 'Only Preceding Step' fallout?", opts: ["'All Visits' = only users who started at step 1; 'Preceding Step' = any user who reached any step", "'All Visits' = percentage of original step-1 volume reaching each step; 'Preceding Step' = conversion rate from PREVIOUS step to current step", "They display identical data in different formats", "'All Visits' is for Visitor container; 'Preceding Step' for Session container"], ans: 1, explain: ["These modify the percentage calculation, not who qualifies.", "✅ 'All Visits' shows each touchpoint as % of the FIRST touchpoint. 'Only Preceding Step' shows each touchpoint as % conversion from the PREVIOUS step — these are two modes for the same funnel.", "The data is the same but the percentage basis changes.", "Container type and percentage calculation mode are different settings."] }
    ];

    QUIZZES["aa-viz-flow"] = [
      { q: "What type of analysis is a Flow visualization designed for?", opts: ["Defined funnel conversion rates", "Free-form path exploration — what did users do before/after a specific page or event", "Revenue attribution by channel", "Visitor retention over time cohorts"], ans: 1, explain: ["Defined funnel = Fallout.", "✅ Flow explores free-form paths — it reveals what users ACTUALLY did (pages before/after), rather than a pre-defined funnel you measure.", "Revenue attribution = Attribution Panel.", "Retention = Cohort Table."] },
      { q: "What does the 'Dimension' drop zone in a Flow visualization accept?", opts: ["Only the Page Name dimension", "Any dimension — page name, eVar, prop, event, or marketing channel", "Only success events", "Only segment pills"], ans: 1, explain: ["Flow accepts any dimension — not just page name.", "✅ Flow works with ANY dimension — you can see what pages users went to, which site sections, which marketing channels, which eVar values, etc.", "Events can be used but are not the only option.", "Segments modify the analysis — they don't go in the dimension drop zone."] },
      { q: "In a Flow report, what information is displayed in each node (box)?", opts: ["Revenue from that touchpoint", "Number of visits/sessions that passed through that path", "Time spent on that page", "The dimension value and volume (visits or visitors) that passed through"], ans: 3, explain: ["Flow is path-based — not revenue-based.", "Volume of visits is correct but 'passes through' also shows the dimension value.", "Time spent requires a separate metric.", "✅ Each node shows the dimension value (e.g., page name) AND the number of visits/visitors who passed through that specific point in the path."] },
      { q: "A Flow visualization shows pages AFTER 'Product Detail Page'. A stakeholder asks 'Why are so many people exiting the site from this page?' Which Flow setting would you use?", opts: ["Change Flow to show inbound paths", "Enable 'Show exits' in the Flow settings", "Break down the flow by Device Type", "Switch the Flow dimension to Marketing Channel"], ans: 1, explain: ["Inbound paths show what came BEFORE — not what happened after.", "✅ Enabling 'Show exits' reveals exits (users leaving the site) as a path option — helping quantify how many users exit from specific points.", "Device type breakdown helps understand WHO but not WHERE they exited.", "Changing dimension shows different data — not exits from product pages."] },
      { q: "What is the purpose of 'Limit to first/last occurrence' in Flow?", opts: ["Shows only the first time a user ever visited a page", "Limits the flow to the first or last interaction instance within a visit to avoid path loops", "Filters the date range to first/last week", "Removes returning visitors"], ans: 1, explain: ["'First time ever' would require Visitor container with first-session filtering.", "✅ In Flow, 'limit to first occurrence' prevents loops — e.g., a user who visits Category 3 times in a visit would show as one path node instead of a circular path.", "Date range is controlled by the panel — not this setting.", "Visitor type filtering is done via segment."] },
      { q: "A Flow built on the 'Marketing Channel' dimension shows paths. What does this reveal?", opts: ["The exact pages users visited within each marketing channel", "How users switch between marketing channels across multiple visits (channel journey)", "The revenue contribution of each channel by device", "The sequence of events within a single marketing session"], ans: 1, explain: ["Pages within a channel require a page dimension — not Marketing Channel dimension.", "✅ A Flow on Marketing Channel dimension reveals multi-session channel journeys — e.g., Paid Search → Email → Direct → Organic — showing how channels lead into each other before conversion.", "Revenue by channel and device needs a separate attribution/breakdown report.", "Flow shows cross-visit sequences when using Visitor container."] },
      { q: "Which container should you use in Flow to see paths ACROSS multiple visits (not just within one session)?", opts: ["Hit container", "Visit container", "Visitor container", "No container needed — Flow always shows cross-visit paths"], ans: 2, explain: ["Hit container = single interaction — too granular for paths.", "Visit container = paths within one session only.", "✅ Visitor container in Flow shows paths across all visits for the same visitor — enabling cross-session journey analysis.", "Container selection determines the scope — it does need to be set to Visitor for cross-visit paths."] },
      { q: "What is the key use case for using a Flow visualization with EVENTS (instead of pages) as the dimension?", opts: ["Measuring page load performance for event-heavy pages", "Understanding the sequence of user ACTIONS (add to cart, save, share, purchase) within a session", "Showing entry pages for event-triggered users", "Measuring how events affect bounce rate"], ans: 1, explain: ["Page load performance uses technical metrics — not event-based Flow.", "✅ Using events as the Flow dimension reveals the ACTION sequence — e.g., View Product → Add to Cart → Save for Later → Return → Purchase. This shows the behavioral path through actions, not pages.", "Entry page analysis is a standard prop-based report.", "Bounce rate is a session-level metric — not a Flow analysis."] }
    ];

    QUIZZES["aa-viz-cohort"] = [
      { q: "What does a Cohort Table in Adobe Analytics measure?", opts: ["Instant conversion rates across pages", "Retention — how many users from an initial group return to perform an action over time periods", "Revenue attribution by first marketing channel", "Path analysis through multiple pages"], ans: 1, explain: ["Instant conversion = Fallout.", "✅ A Cohort Table groups users by an 'inclusion event' and tracks what % return to perform a 'return event' in subsequent weeks/months — measuring retention.", "First-channel revenue = Attribution Panel.", "Path analysis = Flow."] },
      { q: "In a Cohort Table, what is the 'Inclusion Criterion'?", opts: ["The metric being measured in the table", "The event that defines the group — who enters the cohort", "The time period of the analysis", "The segment applied to the entire report"], ans: 1, explain: ["Metrics are the 'Return Criterion' calculations.", "✅ The Inclusion Criterion defines which users form each cohort — e.g., 'Users who made their first purchase in January.' Everyone satisfying this in the same period = one cohort row.", "Time period is the 'Granularity' setting.", "Segments are applied separately — they're not the inclusion criterion."] },
      { q: "A Cohort Table is set up with: Inclusion = First Purchase, Return = Any Visit, Granularity = Month. What does the 'Month 2' column show?", opts: ["Total revenue in month 2", "% of the cohort who made another purchase in month 2", "% of the cohort who visited the site in month 2 (the second month AFTER their first purchase)", "The number of users who were first acquired in month 2"], ans: 2, explain: ["Revenue isn't the metric unless configured as Return Criterion.", "Return event = Any Visit — so returning users who visit is what Month 2 shows.", "✅ Month 2 = the second month AFTER the inclusion month. It shows what % of the original cohort visited the site in that subsequent month.", "Month 2 column shows RETURNS — not new acquisitions."] },
      { q: "What insight does a Cohort Table with 'Inclusion = App Download, Return = In-App Purchase' provide?", opts: ["Which marketing channels drove app downloads", "What % of app downloaders made in-app purchases over subsequent months", "Revenue per app session", "Which features drove the highest time-in-app"], ans: 1, explain: ["Channel attribution requires marketing channel reports.", "✅ This cohort measures purchase conversion and retention — what fraction of each month's new app users made in-app purchases in months 1, 2, 3 after download.", "Revenue per session needs a separate metric report.", "Feature engagement needs event-based analysis."] },
      { q: "What does a ROLLING CALCULATION turn on in a Cohort Table?", opts: ["Real-time data refresh for the table", "Calculates each period relative to the user's last interaction — not fixed months from inclusion", "Applies a 30-day rolling window to all metrics", "Enables multi-channel attribution within the cohort"], ans: 1, explain: ["Real-time data isn't a cohort feature.", "✅ Rolling Calculation changes the percentage base — instead of '% of original cohort,' it shows '% of users who were active in the PREVIOUS period' — measuring rolling retention month-over-month.", "The 30-day window is controlled by granularity — not rolling calculation.", "Attribution within cohorts requires separate analysis."] },
      { q: "A cohort shows 40% retention in Week 1, and Week 4 shows 15%. What does the drop indicate?", opts: ["40% of users came from paid channels", "The product has a retention problem — 60% of users don't return after week 1, and by week 4 only 15% remain active", "The cohort was too small to be significant", "Users prefer to access the service monthly, not weekly"], ans: 1, explain: ["Retention drops don't reveal channel source.", "✅ A drop from 40% to 15% shows significant churn — 85% of the original user group stopped engaging by week 4, which is a product/engagement challenge.", "The table doesn't speak to statistical significance directly.", "Weekly decline patterns can indicate cadence, but 40%→15% is typically concerning churn."] },
      { q: "Which granularity option creates 'day 0, day 1, day 2...' columns instead of 'month 1, month 2...'?", opts: ["Week granularity", "Day granularity", "Quarter granularity", "Custom granularity"], ans: 1, explain: ["Week gives Week 1, 2, 3... columns.", "✅ Day granularity creates day 0 (the day of inclusion), day 1 (next day), day 2, etc. — perfect for new user onboarding analysis where early-day behavior matters.", "Quarter gives Q1, Q2 columns.", "Custom granularity is not a standard Cohort Table option."] },
      { q: "How is a 'Latency Table' (or 'Latency Cohort') different from a standard Cohort Table?", opts: ["Latency shows page load times, not user retention", "Latency shows behavior BEFORE AND AFTER an inclusion event, not just after", "Latency uses a fixed date — not cohort-based monthly groupings", "Latency only works with Visitor container"], ans: 1, explain: ["Latency in cohort analysis refers to time before/after an event — not page speed.", "✅ Latency Table shows weeks/days BEFORE the inclusion event (negative columns) AND after — helping understand pre-event behavior. E.g., when did users start buying app items relative to a campaign launch?", "Latency table still uses event-based cohort groupings.", "Container type is configured separately."] }
    ];

    QUIZZES["aa-attr-models"] = [
      { q: "What does an attribution model determine in Adobe Analytics?", opts: ["Which eVar expiration setting is used", "How conversion credit is distributed across marketing touchpoints in a visitor journey", "The order in which Processing Rules are applied", "Which segment containers are used for reporting"], ans: 1, explain: ["eVar expiration is a separate admin setting.", "✅ Attribution models define HOW conversion credit (revenue, orders, events) is distributed across the marketing channels or eVar values a visitor interacted with before converting.", "Processing rules have their own order independent of attribution.", "Segment containers are a segmentation concept."] },
      { q: "Last Touch attribution means:", opts: ["The first marketing channel the visitor interacted with gets 100% credit", "The most recent channel/touchpoint before conversion gets 100% credit", "Credit is split evenly across all channels", "Credit decreases exponentially for older touchpoints"], ans: 1, explain: ["First touchpoint = First Touch attribution.", "✅ Last Touch gives 100% credit to the LAST marketing channel or eVar value seen immediately before the conversion event.", "Equal split = Linear attribution.", "Exponential decay = Time Decay attribution."] },
      { q: "Which attribution model gives progressively MORE credit to touchpoints CLOSER to the conversion?", opts: ["First Touch", "Last Touch", "Linear", "Time Decay"], ans: 3, explain: ["First Touch gives all credit to the first touchpoint.", "Last Touch gives all credit to the last touchpoint.", "Linear gives equal credit to all touchpoints.", "✅ Time Decay gives the most credit to touchpoints closest in time to the conversion — older touchpoints get less credit, creating an exponential decay curve."] },
      { q: "A visitor's channel journey is: Paid Search → Email → Organic Search → Direct → Purchase. With Linear attribution, how much credit does each channel get?", opts: ["Paid Search 50%, Direct 50%", "Each of the 4 channels gets 25%", "Organic Search gets 100% — last non-direct", "Direct gets 100% — last touch"], ans: 1, explain: ["First and last only = not Linear.", "✅ Linear attribution distributes credit EQUALLY across all touchpoints. 4 channels = 25% each.", "Single-channel credit is not linear attribution.", "Last touch gives all credit to one channel."] },
      { q: "The Position Based (U-Shaped) attribution model credits:", opts: ["First and last touchpoints equally, ignoring middle touches", "40% to first touch, 40% to last touch, 20% split among middle touchpoints", "Equal credit to all touchpoints", "100% to first touch, 0% to others"], ans: 1, explain: ["Equal BUT only first+last would be a specific 50/50 model.", "✅ U-Shaped (Position Based): 40% First Touch + 40% Last Touch + 20% distributed evenly among middle touchpoints — emphasizing acquisition and closing channels.", "Equal to all = Linear.", "100% first only = First Touch."] },
      { q: "What is the key benefit of the Attribution Panel in Analysis Workspace?", opts: ["It automatically implements new attribution rules server-side", "It lets you compare multiple attribution models side by side for the same metric", "It changes the eVar expiration settings retroactively", "It tracks cross-device journeys automatically"], ans: 1, explain: ["Attribution Panel affects reporting — not server-side data processing.", "✅ The Attribution Panel is a reporting tool that lets you place one metric and compare up to 10 attribution models simultaneously — seeing how credit changes under different models.", "eVar settings require admin changes — not the Attribution Panel.", "Cross-device tracking requires identity stitching (a separate feature)."] },
      { q: "When should you use PARTICIPATION metric instead of an attribution model?", opts: ["When you want to compare multiple models", "When you want EVERY touchpoint that contributed to show the FULL metric value (100% each)", "When you want to weight recent channels more heavily", "When you want first-touch analysis"], ans: 1, explain: ["Comparing models = Attribution Panel.", "✅ Participation gives 100% of the conversion metric to EVERY eVar value that was set before conversion — not splitting credit but crediting all simultaneously. Shows 'did this channel have any role?'", "Weighting recent = Time Decay.", "First touch = First Touch model."] },
      { q: "A company's CMO asks 'Which channel ACQUIRES new customers most effectively?' Which attribution model should you use?", opts: ["Last Touch — closest to conversion", "Linear — fair to all channels", "First Touch — identifies the initial acquisition source", "Time Decay — rewards recent engagement"], ans: 2, explain: ["Last Touch shows what closes deals — not what acquires customers.", "Linear doesn't distinguish between acquisition and closing.", "✅ First Touch attribution identifies the FIRST channel a new customer interacted with — directly answering 'what acquires customers?'", "Time Decay rewards closing channels — not acquisition."] }
    ];

    QUIZZES["aa-calc-metrics"] = [
      { q: "What is a Calculated Metric in Adobe Analytics?", opts: ["A metric value uploaded via Data Sources", "A custom metric created by applying mathematical formulas to existing metrics", "A metric captured by a success event", "A fixed metric like Page Views that Adobe pre-defines"], ans: 1, explain: ["Data Sources uploads offline data — not calculated metrics.", "✅ Calculated Metrics are virtual metrics created using formulas that combine existing metrics, filters, and mathematical functions — e.g., Revenue / Orders = AOV.", "Success events are raw collected metrics — calculated metrics are derived from them.", "Adobe pre-defined metrics (Page Views, Visits) are not calculated — they are collected."] },
      { q: "Which formula correctly calculates BOUNCE RATE?", opts: ["Bounces / Page Views", "Single-Page Visits / Entries (or Total Visits)", "Exits / Visits", "Single Visits / Total Visitors"], ans: 1, explain: ["Bounces/Page Views gives a ratio but Bounce Rate is defined as single-page sessions.", "✅ Bounce Rate = Single-Page Visits (visits with only 1 page view) / Total Entries (visits). This is the standard definition.", "Exits/Visits gives Exit Rate — not Bounce Rate.", "Single Visits/Visitors is not the standard bounce rate formula."] },
      { q: "What formula calculates Average Order Value (AOV)?", opts: ["Orders × Revenue", "Revenue / Orders", "Revenue / Visits", "Orders / Revenue"], ans: 1, explain: ["Orders × Revenue incorrectly multiplies — AOV should divide.", "✅ AOV = Revenue ÷ Orders — the average dollar value per completed order.", "Revenue / Visits = Revenue per Visit — not per order.", "Orders / Revenue would give Orders per Dollar — meaningless for AOV."] },
      { q: "What is the DIFFERENCE between a DECIMAL type and a PERCENT type calculated metric?", opts: ["They produce different calculated results", "Percent type multiplies the result by 100 and displays with a % symbol", "Decimal type has higher precision", "Percent type applies only to eVar-based metrics"], ans: 1, explain: ["The mathematical result is the same — the display format differs.", "✅ When you set metric type to 'Percent', Workspace multiplies the decimal result by 100 and shows a % sign — e.g., 0.23 becomes 23%. Useful for rate metrics.", "Both have the same calculation precision.", "Percent type works with any metrics."] },
      { q: "A calculated metric uses a SEGMENT as a filter component. What does this create?", opts: ["A segment-specific event", "A metric that only counts instances where the segment condition is true", "A virtual report suite filter", "A SAINT classification lookup"], ans: 1, explain: ["Segment-based metrics don't create new events.", "✅ Adding a segment as a component inside a calculated metric formula creates a 'segment-based calculated metric' — e.g., [Mobile Users] Revenue counts revenue from only mobile visits.", "VRS uses segments at the suite level — not calculated metrics.", "SAINT is a classification import tool — not a calculated metric concept."] },
      { q: "What is the 'Participation' flag on a calculated metric?", opts: ["Enables the metric across all report suites", "Gives 100% credit to all eVar values that contributed to a conversion", "Allows the metric to be used in sequential segments", "Enables real-time calculation of the metric"], ans: 1, explain: ["Report suite access is configured in admin.", "✅ Enabling Participation gives every contributing dimension value (eVar) that appeared before the conversion full credit for the metric — useful for multi-touch analysis.", "Participation is not related to sequential segments.", "Metrics are always calculated on-demand."] },
      { q: "You want to show CONVERSION RATE = Orders / Visits. A user had 5 visits and made 2 orders. What does this calculated metric show at the visitor level?", opts: ["40% (2/5)", "200% (2/1 unique visitor)", "Depends on the metric format setting", "0.4 if Decimal type, 40% if Percent type — same numbers, different display"], ans: 3, explain: ["40% is correct mathematically — but the display depends on type setting.", "200% is incorrect — division is orders/visits.", "The formula is clear — 2/5 = 0.4.", "✅ Both Decimal (0.4) and Percent (40%) are the same calculated value — the TYPE setting only affects how it's formatted/displayed in Workspace."] },
      { q: "Which scope/container should a CONVERSION RATE metric use in its definition?", opts: ["Hit — to measure per page", "Visitor — to measure total orders across all visits divided by all visits", "Visit — to accurately calculate orders per visit session", "No container is needed — the metric determines scope automatically"], ans: 2, explain: ["Hit-level conversion rate would be nearly meaningless — orders and visits are not hit-level.", "Visitor scope counts across all time — useful for visitor-level conversion rate.", "✅ For Order Conversion Rate (Orders/Visits), visit-level scope makes most sense — evaluating each session independently.", "Container context affects how the metric evaluates — a container should be consciously set."] }
    ];

    QUIZZES["aa-marketing-channels"] = [
      { q: "What is the PRIMARY purpose of Marketing Channels in Adobe Analytics?", opts: ["To track page performance metrics", "To attribute visits and conversions to the marketing source that drove the visitor to the site", "To manage ad campaigns within Adobe Analytics", "To configure eVar expiration for campaign variables"], ans: 1, explain: ["Page performance uses page-level metrics.", "✅ Marketing Channels attribute VISITS and CONVERSIONS to the marketing source — Paid Search, Email, Organic Search, Direct, Social, etc.", "Campaign management is done outside Adobe Analytics.", "eVar expiration is a separate admin setting."] },
      { q: "Marketing Channel processing rules are evaluated in what order?", opts: ["Alphabetically by channel name", "From bottom to top", "From top to bottom — first matching rule wins", "Simultaneously — all matching rules share the attribution"], ans: 2, explain: ["Alphabetical order is not used.", "Bottom to top is incorrect.", "✅ Rules are evaluated TOP to BOTTOM — the FIRST rule that matches the visit conditions claims the channel. Order matters enormously.", "Only one rule wins — the first match."] },
      { q: "Which is an example of a correct Marketing Channel processing rule condition for 'Paid Search'?", opts: ["Referrer contains 'google.com'", "Referrer matches Paid Search (Adobe's paid search detection) OR query parameter 'gclid' exists", "Campaign contains any value", "Page URL contains 'search'"], ans: 1, explain: ["Organic search also comes from google.com — referrer alone doesn't distinguish paid.", "✅ Using Adobe's built-in paid search detection (or detecting gclid/msclkid parameters added by paid search platforms) correctly identifies paid search visits.", "'Campaign contains any value' would incorrectly capture any campaign-tagged visit as Paid Search.", "Page URL containing 'search' doesn't identify the traffic source."] },
      { q: "What is the 'First Touch Channel' vs 'Last Touch Channel' in Marketing Channel reporting?", opts: ["First Touch = last channel visited; Last Touch = first channel ever", "First Touch = the very first channel in visitor's history; Last Touch = the most recent channel in a configurable lookback window", "They are identical but in different reports", "First Touch = paid channels; Last Touch = organic channels"], ans: 1, explain: ["The definitions are the opposite of this.", "✅ First Touch = the very first marketing interaction ever recorded for the visitor (never changes until expiration). Last Touch = the most recent channel seen within the attribution lookback window.", "They represent different attribution perspectives.", "Channel type is not limited by first/last touch designation."] },
      { q: "A visitor's journey: Email (Day 1) → Organic (Day 5) → Direct (Day 10, converts). With DEFAULT Last Touch attribution, which channel gets credit?", opts: ["Email — first channel", "Organic — the non-direct penultimate channel", "Direct — last channel before conversion", "No channel — direct traffic is excluded"], ans: 2, explain: ["First channel credit = First Touch.", "Last non-direct is an override rule common in custom configs — not default AA behavior.", "✅ Default Last Touch attribution: Direct (the most recent channel before conversion) gets 100% credit — even if it's direct traffic.", "Direct traffic is a valid channel — it's not excluded."] },
      { q: "What is the Marketing Channel 'Engagement' window?", opts: ["The maximum number of channels a visitor can have in their journey", "The number of days after a channel interaction that the channel still gets attribution credit", "The time between ad click and site arrival", "The time spent on site per marketing channel"], ans: 1, explain: ["Number of channels is not the engagement window.", "✅ The engagement window (lookback window) defines how long a channel interaction remains eligible for attribution credit — default is 30 days.", "Ad click timing is not the engagement window.", "Time on site is a behavioral metric."] },
      { q: "Which channel typically has the highest volume of visits but low conversion rate in most implementations?", opts: ["Paid Search — because bids are expensive", "Direct — because repeat visitors browse without buying", "Email — because email campaigns drive high volume", "No clear rule — it varies by implementation"], ans: 3, explain: ["Paid search often has high intent and reasonable conversion rates.", "Direct often has high conversion because these are loyal/returning customers.", "Email can have strong conversion rates with targeted campaigns.", "✅ There is no universal pattern — channel performance varies entirely by business model, implementation quality, and audience. The exam tests whether you understand that."] },
      { q: "What happens to Marketing Channel credit if NO channel rule matches a visit?", opts: ["The visit is attributed to 'Direct'", "The visit is marked 'Unspecified' in Marketing Channel reports", "The visit is excluded from all reports", "The visit defaults to the first-defined channel"], ans: 1, explain: ["Direct is only assigned if a Direct Traffic rule fires — not as a fallback.", "✅ If no processing rule matches, the visit appears as 'Unspecified' — a gap that usually indicates missing rules or misconfiguration.", "Visits are not excluded — they just show as Unspecified.", "No default first-rule fallback exists."] }
    ];

    QUIZZES["aa-classifications"] = [
      { q: "What is the purpose of SAINT (Classifications) in Adobe Analytics?", opts: ["To segment visitors by behavior", "To append additional metadata/attributes to existing dimension values", "To create new success events", "To configure eVar persistence settings"], ans: 1, explain: ["Classifications don't segment — they enrich existing data.", "✅ SAINT (Simple Analytics Import and export Tool) lets you upload lookup tables that add additional attributes to existing dimension values — e.g., map product code → product name, category, brand, margin.", "Success events are configured in Admin > Report Suite Manager.", "eVar persistence is a separate Admin setting — not for Classifications."] },
      { q: "A company tracks Campaign ID (e.g., EM-2024-SPRING) in s.campaign. They want to report by Channel, Region, and Season. What is the BEST approach?", opts: ["Create separate eVars for Channel, Region, and Season", "Modify the tracking code structure", "Upload a SAINT Classification lookup table mapping Campaign ID → Channel, Region, Season", "Use Processing Rules to parse the campaign code"], ans: 2, explain: ["Separate eVars work but require re-implementation — not scalable.", "Restructuring tracking codes requires new development work and may break existing data.", "✅ SAINT is ideal — upload a spreadsheet mapping EM-2024-SPRING → (Channel=Email, Region=Global, Season=Spring) WITHOUT changing any tracking code.", "Processing Rules can parse codes but are limited in complexity — SAINT is designed for this use case."] },
      { q: "Which method is used to upload Classification data into Adobe Analytics?", opts: ["FTP server upload or the Browser-based importer in the Admin UI", "API call directly from a JavaScript tag", "Real-time data stream via the Data Insertion API", "AppMeasurement setVar() function"], ans: 0, explain: ["✅ Classifications can be imported via FTP file upload to Adobe's FTP server OR via the Classifications Importer UI (Admin > Report Suites > Edit Settings > Conversion > Classifications importer).", "JavaScript tags don't upload classification tables.", "Data Insertion API sends hit-level data — not classification lookup tables.", "AppMeasurement doesn't have a classification upload function."] },
      { q: "How long does it typically take for newly uploaded Classification data to appear in Adobe Analytics reports?", opts: ["Instantly — classifications apply in real-time", "Within 24-72 hours for standard scheduled processing", "Only at the end of each calendar month", "Immediately after upload but only for future data"], ans: 1, explain: ["Classifications are not real-time — they require processing.", "✅ Classification data typically takes 24-72 hours to fully process and appear in reports after upload.", "Monthly processing is not how classifications work.", "Classifications apply retroactively to ALL historical data matching the key — not just future hits."] },
      { q: "What is a 'Numeric 2' classification?", opts: ["A second numeric event within the same classification table", "A special classification type that stores a numeric value associated with each row", "The second excel column in a SAINT export", "A type that enables sorting by the classified value"], ans: 1, explain: ["'Numeric 2' is a column classification type — not a second event.", "✅ Numeric 2 is a classification column type that stores a numeric value (like cost or price) for each dimension key — enabling calculated metrics based on classified numeric data.", "Column position doesn't define the type.", "Sorting is a display setting — not a classification type."] },
      { q: "A Classification was uploaded last month for 'Product Category'. A new product is added TODAY without updating the classification file. What happens in reports?", opts: ["The new product appears as 'Unclassified' in Product Category reports", "The new product automatically inherits the category of the most similar product", "The new product is excluded from all reports", "Adobe automatically classifies the new product using AI"], ans: 0, explain: ["✅ Any dimension value without a corresponding classification entry appears as 'Unclassified' (or the raw tracking code value) in reports — a common data quality issue.", "No auto-inheritance exists in SAINT.", "Unclassified data still appears — just without the category attribute.", "Adobe AI does not auto-classify for SAINT."] },
      { q: "What is a 'Hierarchy' classification used for?", opts: ["Setting the eVar expiration order", "Creating a multi-level parent-child classification — e.g., Electronics > Laptops > Gaming Laptops", "Determining the order of Marketing Channel rules", "Classifying visitors by their journey stage"], ans: 1, explain: ["eVar expiration is not related to classification hierarchies.", "✅ Hierarchy (or sub-classification) lets you create relationship trees — Product Category can be sub-classified into sub-categories, creating multi-level drill-down in reports.", "Channel rule order is set in Marketing Channels Admin.", "Visitor journey stages are determined by segments."] },
      { q: "Classifications are RETROACTIVE. What does this mean for your reporting?", opts: ["They only apply to data collected from the upload date forward", "Uploading a classification file enriches ALL historical data with that key — past and future", "They expire after 90 days", "They only apply within the current year's data"], ans: 1, explain: ["Retroactive means they DO apply to historical data.", "✅ Once you upload a SAINT file mapping Product ID → Product Name, ALL historical hits with that product ID — past and future — are immediately enriched. This is a major advantage.", "Classifications don't expire.", "Retroactivity applies to all data in the report suite."] }
    ];

    QUIZZES["aa-data-feeds"] = [
      { q: "What is the primary purpose of Adobe Analytics Data Feeds?", opts: ["To import CRM data into Adobe Analytics", "To export raw hit-level data from Adobe Analytics to external storage for custom analysis", "To create real-time dashboards in Adobe Analytics", "To send segment data to Adobe Campaign"], ans: 1, explain: ["CRM imports use Data Sources — not Data Feeds.", "✅ Data Feeds export raw, hit-level data (every s.t() and s.tl() call) in flat files to an S3 bucket, Azure, or FTP — enabling full custom analysis outside of Adobe's reporting UI.", "Dashboards are created in Analysis Workspace — not Data Feeds.", "Adobe Campaign integration uses different connectors."] },
      { q: "What format does Data Feed data come in?", opts: ["JSON API response", "Flat text files (tab-delimited) with a column headers file and zipped data files", "Excel workbook per report suite", "Real-time SQL database export"], ans: 1, explain: ["Data Feeds are not JSON API responses.", "✅ Data Feeds export TSV (tab-separated values) flat files — one row per hit — delivered on a scheduled basis to cloud storage with a lookup file mapping column names.", "Excel format is not supported for raw data feeds.", "SQL database requires Adobe Analytics API — not Data Feeds."] },
      { q: "What is Adobe Data Warehouse and how does it differ from Data Feeds?", opts: ["Data Warehouse is faster; Data Feeds are slower", "Data Warehouse lets you run custom queries returning aggregated report data; Data Feeds export raw hit-level files", "Data Warehouse exports raw files; Data Feeds create aggregated summary reports", "They are identical products with different names"], ans: 1, explain: ["Speed isn't the primary distinction.", "✅ Data Warehouse = run segmented, custom-dimension queries returning aggregated structured data exports. Data Feeds = all raw hit-level data in flat files for external processing.", "The definitions are the opposite of this option.", "They serve different purposes."] },
      { q: "Which column in a Data Feed identifies the unique visitor?", opts: ["post_visid_high and post_visid_low — combined to form the Visitor ID", "visitor_email", "s_vi cookie value", "user_agent"], ans: 0, explain: ["✅ The Visitor ID in Data Feeds is composed of post_visid_high + post_visid_low (two 64-bit integers that together create the 128-bit unique visitor key).", "Email is PII — not stored directly in Data Feeds.", "The s_vi cookie contributes to the ID but the feed columns are post_visid_high/low.", "user_agent identifies browser/device — not the unique visitor."] },
      { q: "A company wants to join their Adobe Analytics data with CRM purchase records for ML modeling. Which export method is BEST?", opts: ["Analysis Workspace CSV export", "Data Warehouse segment query", "Data Feeds — raw hit-level export", "Marketing Channel report export"], ans: 2, explain: ["Workspace CSV is good for manual analysis — not ML-scale data.", "Data Warehouse exports aggregated/query results — useful but not hit-level.", "✅ Data Feeds export complete raw hit-level data at scale — every interaction logged — making it ideal for joining with CRM records and training ML models in your data lake.", "Channel report exports aggregate channel data — not hit-level detail."] },
      { q: "What is the 'Column Header File' that accompanies a Data Feed?", opts: ["A CSV with company and report suite information", "A lookup file mapping the numeric column positions to human-readable column/variable names", "A configuration file for the FTP destination", "A manifest file tracking which files were delivered"], ans: 1, explain: ["Company info is in the Admin settings — not column headers.", "✅ Each Data Feed delivery includes a column header file listing what each column in the data files represents — because columns are delivered as positional data without headers in the main file.", "FTP destination is configured in Adobe's admin UI — not in a delivered file.", "The manifest file is a separate delivery tracking file."] },
