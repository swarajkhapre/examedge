    QUIZZES["cja-what-is-aep"] = [
      { q: "What is Adobe Experience Platform (AEP)?", opts: ["A marketing campaign management tool", "An open data foundation that centralizes customer data, applies AI, and powers real-time experiences across applications", "A web analytics collection server", "An email marketing platform"], ans: 1, explain: ["Campaign management is Adobe Campaign.", "✅ AEP is the centralized customer data platform — it ingests data from any source, standardizes it with XDM schema, builds real-time profiles, and serves as the data layer for CJA and Adobe apps.", "Analytics collection servers are a component — not what AEP IS.", "Email marketing is handled by Adobe Campaign — built on AEP."] },
      { q: "What is the Real-Time Customer Profile in AEP?", opts: ["A dashboard showing live website traffic", "A unified, stitched customer record assembled from all ingested data sources — updated in real time", "A segment of high-value customers", "A notification system for customer actions"], ans: 1, explain: ["Live traffic is an analytics concept — not the Profile.", "✅ Real-Time Customer Profile (RTCP) stitches all events, attributes, and identities for a person into a single, unified profile accessible across AEP applications in sub-second latency.", "Segments are built FROM profiles — not the profile itself.", "Notifications are Intelligent Alerts — not the Profile."] },
      { q: "What is an 'Identity Namespace' in AEP?", opts: ["A naming convention for AEP schemas", "A categorization that specifies WHAT TYPE of identifier a value is — e.g., Email, ECID, CRM ID, Phone", "A privacy regulation requiring data labeling", "A URL namespace for API calls"], ans: 1, explain: ["Naming conventions are part of schema governance but not what 'Identity Namespace' means.", "✅ Identity Namespaces classify identifiers — so AEP knows that '12345' in one field is a CRM ID and 'user@email.com' in another is an Email ID — enabling cross-source person stitching.", "Privacy labeling uses Data Governance Labels — not Identity Namespaces.", "API namespaces are a different technical concept."] },
      { q: "Which AEP service powers AI/ML-based audience scoring and customer journey analytics?", opts: ["Adobe Analytics", "Adobe Experience Platform — specifically Query Service and Customer AI", "Adobe Target", "Adobe Campaign"], ans: 1, explain: ["Adobe Analytics is a reporting layer — not the AI/ML engine.", "✅ AEP's Customer AI (part of Intelligent Services) provides propensity scores and AI-powered segmentation. Query Service enables SQL-based data exploration across AEP datasets.", "Adobe Target uses ML for personalization — but Customer AI is on AEP.", "Adobe Campaign executes campaigns — AEP provides the data intelligence."] },
      { q: "What does AEP's 'Data Lake' store?", opts: ["Only real-time streaming events", "ALL ingested data in its raw and processed forms — supporting batch and streaming ingestion", "Only profiles without event history", "Only anonymized, aggregated data"], ans: 1, explain: ["The Data Lake stores batch AND streaming data.", "✅ AEP's Data Lake stores raw event data, behavioral data, and processed datasets at scale — enabling both real-time profile updates AND historical analysis (like CJA).", "Profile store holds stitched profiles — the Data Lake holds the underlying raw data.", "Data is stored at event level — not just aggregated."] },
      { q: "What is the 'Identity Graph' in AEP?", opts: ["A visualization of all XDM schema relationships", "A map of how identifiers (ECID, email, CRM ID) link together to form one person", "A report showing identity overlap between segments", "A database of person names and IDs"], ans: 1, explain: ["Schema relationships are the Schema Registry — not Identity Graph.", "✅ The Identity Graph links multiple identifiers to a single person — e.g., ECID from web + CRM ID from login + email from form = one identity cluster representing one real person.", "Segment overlap is the Venn/Overlap report — not Identity Graph.", "Identity Graph is about identifier relationships — not a PII name database."] },
      { q: "CJA connects to AEP via which of the following?", opts: ["Direct SQL query on AEP's database", "A CJA Connection that specifies which AEP Datasets to include", "An API key linked to a Report Suite", "An FTP data feed from AEP"], ans: 1, explain: ["CJA doesn't run direct SQL — it uses a structured Connection architecture.", "✅ A CJA Connection is the configuration that specifies which AEP datasets to bring into CJA — defining the data available for Data Views and Analysis Workspace.", "Report Suite IDs are AA concepts — not AEP/CJA.", "FTP feeds are AA Data Feeds — not how AEP connects to CJA."] },
      { q: "Which AEP feature allows creating audience segments that can be ACTIVATED across channels (email, ads, etc.)?", opts: ["CJA Analysis Workspace", "Adobe Experience Platform Segmentation Service + Real-Time CDP", "AEP Query Service", "AEP Data Governance"], ans: 1, explain: ["Workspace is for analysis — not audience activation.", "✅ AEP Segmentation Service builds audiences from profile data, and Real-Time CDP activates them to downstream destinations (email, paid social, DSPs).", "Query Service is for SQL exploration — not audience activation.", "Data Governance manages data access policies — not audience activation."] }
    ];

    QUIZZES["cja-why-aep"] = [
      { q: "Why does CJA REQUIRE Adobe Experience Platform instead of connecting directly to raw data sources?", opts: ["Because AEP is cheaper than direct connections", "AEP provides the unified data layer — standardizing data with XDM schema, handling identity stitching, and making cross-source analysis possible", "CJA was built by the same team as AEP", "Adobe licensing requires AEP to be purchased first"], ans: 1, explain: ["Architecture decisions are driven by capability — not cost.", "✅ AEP standardizes disparate data sources into a common XDM schema and handles identity resolution — without this foundation, CJA could not meaningfully combine web + CRM + call center data.", "Team relationships don't drive architecture requirements.", "While licensing matters, the technical reason is the data unification layer."] },
      { q: "What does the XDM schema in AEP provide that raw database tables do NOT?", opts: ["Faster query performance", "Standard field naming, data types, and identity references that enable cross-source joins and AI applications", "Better storage compression", "Real-time data streaming"], ans: 1, explain: ["XDM is about standardization — not query speed.", "✅ XDM (Experience Data Model) provides a standardized schema — so 'email' from CRM and 'email' from web are the SAME field type, enabling joins across datasets without custom ETL.", "Storage compression is not XDM's purpose.", "Streaming is a separate AEP capability — not XDM's contribution."] },
      { q: "Without AEP identity stitching, what limitation would CJA face?", opts: ["It could not display bar charts", "It would analyze each dataset in isolation — unable to connect a person's web events to their CRM purchase history", "It could not use calculated metrics", "It would lose date range filtering capability"], ans: 1, explain: ["Visualizations are not dependent on identity stitching.", "✅ Without stitching, a web hit from ECID '123' and a CRM record for 'john@email.com' are unrelated records. AEP's Identity Graph links them into one Person — enabling true cross-channel journeys.", "Calculated metrics are independent of identity.", "Date ranges are independent of identity."] },
      { q: "AEP's 'Datasets' are the source of data for CJA. What is a Dataset in AEP?", opts: ["A SQL table in Adobe's Analytics database", "A structured collection of data conforming to a specific XDM schema — stored in the AEP Data Lake", "A saved segment of audience members", "A connection string to an external database"], ans: 1, explain: ["AEP Datasets are not SQL tables — they're stored in the Data Lake.", "✅ An AEP Dataset is a collection of data records (events, profiles, lookups) that conform to a specific XDM schema — e.g., 'Web Events Dataset' following the Web SDK XDM schema.", "Audiences/segments are built FROM datasets — not datasets themselves.", "Connection strings are implementation details — not what a Dataset IS."] },
      { q: "A retailer has web data in Adobe Analytics and purchase data in their CRM. To analyze cross-channel in CJA, what is needed?", opts: ["Export AA data to Excel and merge manually", "Ingest both sources into AEP as Datasets, stitch on a common identifier, then connect to CJA", "Buy a separate BI tool", "Use AA classification files to import CRM data"], ans: 1, explain: ["Manual Excel merging is not scalable.", "✅ Both data sources must be ingested into AEP as separate Datasets, identity stitching links them on a common ID (email/CRM ID), and a CJA Connection then includes both datasets for unified analysis.", "A BI tool doesn't provide the identity stitching layer.", "AA Classifications add metadata to existing AA data — they can't cross-join CRM to the level CJA enables."] },
      { q: "What type of data can be ingested into AEP and subsequently analyzed in CJA?", opts: ["Only web clickstream data", "Only mobile app data", "Any data type — web, mobile, CRM, call center, POS, IoT — as long as it's mapped to XDM schema", "Only structured relational database tables"], ans: 2, explain: ["CJA is not limited to web data.", "CJA handles all channel types — not just mobile.", "✅ AEP is source-agnostic — ingest any data (streaming or batch) and map it to XDM. CJA can then analyze ALL of it together.", "Semi-structured and event data are also supported — not just relational tables."] },
      { q: "Which AEP capability is most directly responsible for making CJA's Person-level reporting possible?", opts: ["AEP Query Service", "Real-Time Customer Profile with Identity Graph", "AEP Data Governance", "AEP Sandboxes"], ans: 1, explain: ["Query Service is SQL exploration — not Person-level reporting.", "✅ RTCP with Identity Graph links multiple identifiers to one Person record — this stitched person is the basis for CJA's Person-level analysis.", "Data Governance manages data access policies — not Person stitching.", "Sandboxes are isolated environments for dev/test — not the stitching mechanism."] },
      { q: "What is an AEP 'Sandbox' and why does it matter for CJA implementations?", opts: ["A child report suite for testing", "An isolated environment within AEP (e.g., Production, Dev, QA) where data and configurations are separate", "A test segment applied to analysis", "A staging area for Classification files"], ans: 1, explain: ["Report suites are an AA concept — not AEP sandboxes.", "✅ AEP Sandboxes are isolated partitions of AEP — a Production sandbox and a Dev sandbox have completely separate schemas, datasets, and configurations. CJA connects to a specific sandbox.", "Segments are created within a sandbox — not what a sandbox IS.", "Classification staging is an AA feature."] }
    ];

    QUIZZES["cja-xdm"] = [
      { q: "What does XDM stand for?", opts: ["Extended Data Management", "Experience Data Model", "External Data Module", "Experience Design Methodology"], ans: 1, explain: ["'Extended Data Management' is not the meaning.", "✅ XDM = Experience Data Model — Adobe's standard schema framework for organizing and standardizing customer experience data in AEP.", "'External Data Module' is not correct.", "'Experience Design Methodology' is not correct."] },
      { q: "What is an XDM 'Schema' in AEP?", opts: ["A saved Workspace report template", "A formal structure defining what fields a Dataset can contain and what data types they are", "A type of identity identifier", "A filter applied to a dataset"], ans: 1, explain: ["Workspace templates are separate.", "✅ An XDM Schema is a blueprint — it defines the structure (field names, data types, required fields) that all records in a conforming Dataset must follow.", "Identifiers are fields within a schema — not schemas themselves.", "Filters are segments or queries — not schema definitions."] },
      { q: "What are the two main types of XDM classes?", opts: ["Individual and Group", "XDM ExperienceEvent (time-series events) and XDM Individual Profile (entity/person records)", "Standard and Custom", "Web and Mobile"], ans: 1, explain: ["Individual/Group is not XDM class nomenclature.", "✅ XDM ExperienceEvent captures time-stamped behavioral events (page views, purchases). XDM Individual Profile captures person attributes (name, email, preferences) — the two core AEP data types.", "Standard vs Custom describes FIELD types — not the two main XDM classes.", "Web/Mobile describe channels — not XDM classes."] },
      { q: "What is a 'Mixin' (now called 'Field Group') in XDM?", opts: ["A standalone schema used for lookup data", "A reusable set of fields that can be added to any schema — e.g., 'Commerce Details' adds product, order, and price fields", "A type of identity namespace", "A batch data ingestion format"], ans: 1, explain: ["Lookup schemas exist but Mixins/Field Groups are reusable field sets.", "✅ Field Groups (formerly Mixins) are pre-built collections of related fields — e.g., 'Web Details' adds referer, URL fields; 'Commerce Details' adds order/product structure. You compose schemas by adding Field Groups.", "Namespaces categorize identities — not schema compositions.", "Ingestion formats are Parquet, CSV, JSON — not XDM classes."] },
      { q: "Why is XDM standardization important for CJA analysis?", opts: ["It reduces data storage costs", "Fields with the same XDM path across datasets (e.g., commerce.purchases.value) automatically join without custom mappings", "XDM is only required for real-time profile — not CJA", "It ensures GDPR compliance automatically"], ans: 1, explain: ["Storage efficiency is not the main XDM benefit for analytics.", "✅ When two datasets share the same XDM field path (e.g., web SDK and mobile SDK both use commerce.order.priceTotal), CJA can combine them naturally without ETL transformations.", "XDM is required for CJA datasets.", "GDPR compliance requires Data Governance labels — XDM alone doesn't ensure compliance."] },
      { q: "What is an 'Identity Field' in an XDM schema?", opts: ["A field marked as primary key for the AEP database", "A schema field designated as containing a person or entity identifier — used by AEP to build the Identity Graph", "A field that cannot be modified after data ingestion", "A field used for data partitioning in the Data Lake"], ans: 1, explain: ["AEP Identity Fields are for identity resolution — not database primary keys.", "✅ Marking an XDM field as an Identity Field (with a specific Namespace like Email, ECID, CRM ID) tells AEP to use that value for identity stitching in the Identity Graph.", "Identity fields can be populated with each ingested record.", "Partitioning is a technical storage concept — not what identity fields define."] },
      { q: "In the context of CJA, what is a 'Lookup Dataset' and what XDM class does it use?", opts: ["A dataset for joining profile data — uses XDM Individual Profile", "A dataset containing reference/mapping data (e.g., product catalog) that enriches event data — uses XDM Individual Profile OR a custom class", "A dataset that retrieves deleted records", "A dataset that stores web analytics hit data"], ans: 1, explain: ["Lookup datasets are reference/mapping tables — not always profile data.", "✅ Lookup Datasets in CJA hold reference tables (product catalog, campaign metadata, zip code → region mapping) that join to event data. They use a Record (non-time-series) schema class.", "Lookup datasets don't retrieve deleted records.", "Web analytics hits use ExperienceEvent class."] },
      { q: "Which field in the XDM ExperienceEvent schema is REQUIRED for CJA time-series analysis?", opts: ["The person email field", "The _id field (unique event ID) and the timestamp field", "The page name field", "The product SKU field"], ans: 1, explain: ["Email is an identity field — useful but not required for all events.", "✅ Every XDM ExperienceEvent MUST have: _id (unique event identifier) and timestamp (when the event occurred). These enable time-series analysis and event deduplication in CJA.", "Page name is optional — only for web events.", "Product SKU is optional — only for commerce events."] }
    ];


    QUIZZES["cja-arch-overview"] = [
      { q: "What are the 4 layers of the CJA architecture in order?", opts: ["Collection → Processing → Storage → Reporting", "Schema → Dataset → Connection → Data View", "AEP → CJA → Workspace → Export", "Identity → Stitching → Connection → Analysis"], ans: 1, explain: ["Collection/Processing are AEP ingestion concepts.", "✅ The 4-layer CJA architecture: Layer 1 Schema (XDM) → Layer 2 Dataset (AEP Data Lake) → Layer 3 Connection (which datasets CJA uses) → Layer 4 Data View (what analysts see).", "These are partial descriptions of some layers.", "Stitching happens as part of the connection — not a standalone layer."] },
      { q: "Which layer is the FIRST thing you configure when setting up CJA?", opts: ["Data View — to define what dimensions/metrics appear", "Connection — to link AEP datasets to CJA", "Schema — the XDM blueprint of data structure", "Analysis Workspace — to build the first report"], ans: 2, explain: ["Data View comes AFTER Connection — can't define metrics without a data source.", "Connection is the THIRD thing (after schema and dataset setup in AEP).", "✅ Schema (Layer 1) must be defined FIRST — before data can be ingested into datasets. Schema defines the structure that all downstream layers depend on.", "Workspace is the final analysis layer — last step."] },
      { q: "What is the relationship between a CJA Connection and a Data View?", opts: ["They are the same thing — different names for the same configuration", "A Connection specifies WHICH datasets to include; a Data View specifies WHAT dimensions/metrics to expose and HOW they behave", "A Data View pulls data directly from AEP bypassing the Connection", "A Connection is for streaming data; a Data View is for batch data"], ans: 1, explain: ["Connection and Data View are distinct, separate layers.", "✅ Connection = data sourcing (which AEP datasets feed CJA). Data View = presentation layer (which fields become dimensions/metrics, their names, attribution, format).", "Data Views depend on Connections — they read from Connection data.", "Both handle all data types — streaming and batch."] },
      { q: "What is the minimum number of CJA layers needed before an analyst can build a Workspace report?", opts: ["1 — just connect to AEP", "2 — Connection and Data View", "All 4 — Schema, Dataset, Connection, and Data View", "3 — Dataset, Connection, Data View"], ans: 2, explain: ["Just connecting to AEP is not sufficient — a Data View must be configured.", "A Connection without a Data View has no dimensions/metrics to report on.", "✅ All 4 layers must exist: Schema (so data is structured), Dataset (so data is stored), Connection (linking datasets to CJA), Data View (so Workspace has dimensions/metrics to use).", "Schema + Dataset are required AEP prerequisites — all 4 truly needed."] },
      { q: "How many Data Views can be created from a single CJA Connection?", opts: ["Only one", "As many as needed — multiple teams can create different Data Views from the same Connection", "Maximum 5", "Maximum 10, one per active user"], ans: 1, explain: ["Multiple Data Views from one Connection is a key flexibility feature.", "✅ Multiple Data Views can be created from one Connection — e.g., Marketing team sees campaign-focused metrics; Finance team sees revenue-focused metrics; Product team sees engagement metrics.", "No numeric limit exists.", "Data View access is based on permissions — not user count."] },
      { q: "In the CJA 4-layer architecture, at which layer do you configure eVar-like persistence (expiration/attribution) for dimensions?", opts: ["Layer 1 — Schema", "Layer 2 — Dataset", "Layer 3 — Connection", "Layer 4 — Data View"], ans: 3, explain: ["Schema defines field structure — not analytics behavior.", "Datasets store raw data — no analytics configuration at this level.", "Connection links datasets — no dimension behavior config here.", "✅ Data View (Layer 4) is where you configure dimension settings: component name, persistence/expiration, attribution model, formatting — equivalent to AA's eVar/prop settings."] },
      { q: "Which CJA layer is equivalent to a 'Report Suite' in Adobe Analytics?", opts: ["Schema", "Dataset", "Connection", "Data View"], ans: 3, explain: ["Schema is XDM — no AA equivalent.", "Dataset is the data container — equivalent to the raw data store.", "Connection groups datasets — no direct AA equivalent.", "✅ The Data View is most analogous to an AA Report Suite — it defines what dimensions/metrics are available, how variables behave, and can be curated per team — like customizing a report suite view."] },
      { q: "What happens if the SAME XDM schema field appears in TWO different AEP Datasets included in one CJA Connection?", opts: ["CJA shows an error — duplicate fields are not allowed", "CJA can merge them or treat them separately — controlled by how you configure the Data View and Connection field mapping", "Only the first dataset's values are used", "CJA automatically sums numeric values from both datasets"], ans: 1, explain: ["Duplicate fields across datasets are a normal, expected situation.", "✅ When two datasets share the same XDM field path, you can map them to the same dimension in the Data View — combining web + mobile page name into one 'Page Name' component. You control the behavior.", "Both datasets contribute data.", "Whether to sum, merge, or treat separately is your analytical choice."] }
    ];

    QUIZZES["cja-identity-stitching"] = [
      { q: "What is the primary PURPOSE of identity stitching in CJA?", opts: ["To encrypt personal data for GDPR compliance", "To link multiple identifiers to a single person — enabling cross-device/cross-channel analysis", "To deduplicate events within a single session", "To merge two separate CJA Connections"], ans: 1, explain: ["Privacy compliance uses Data Governance labels — not stitching.", "✅ Stitching links ECID (anonymous web), CRM ID (logged-in), email, phone — all to ONE Person record. This enables you to see the complete journey across devices and channels.", "Deduplication is a separate data quality concern.", "Connection merging is not what stitching does."] },
      { q: "In CJA, what is called the 'Persistent ID'?", opts: ["An ID that never changes, like a CRM customer ID that identifies real people", "A temporary anonymous ID like the ECID/cookie that persists in browser cookies but may not be known to CRM", "The ID used to join lookup datasets", "The primary key in the XDM schema"], ans: 1, explain: ["The non-changing known ID is actually the Transient ID.", "✅ The Persistent ID is the anonymous, device-based stable identifier (like ECID) that IS present on every hit — it persists across the dataset even before login.", "Lookup dataset joins use key fields — different from stitching IDs.", "XDM primary key is the _id field."] },
      { q: "What is the 'Transient ID' in CJA stitching?", opts: ["A temporary page session ID", "The authenticated or known identifier (e.g., login ID, CRM ID, email hash) — present only when user is identified", "The ECID cookie value", "The cookie set by AEP's Identity Service"], ans: 1, explain: ["A page session ID is unrelated to stitching mechanics.", "✅ The Transient ID is the known/authenticated identifier — e.g., the Customer ID visible after login. It's 'transient' because it isn't always present (only when the user logs in).", "ECID is the Persistent ID — always present.", "AEP Identity Service sets the ECID — which is the Persistent ID."] },
      { q: "What is 'Field-Based Stitching' in CJA?", opts: ["Stitching using the AEP Identity Graph to resolve cross-device identities", "Stitching based on a specific dataset field – using Persistent ID and Transient ID fields you define in the dataset", "Using machine learning to probabilistically match anonymous and known records", "Merging two datasets based on common timestamp"], ans: 1, explain: ["Graph-based stitching uses the AEP Identity Graph.", "✅ Field-Based Stitching uses specific XDM fields you designate as Persistent ID and Transient ID within your dataset — CJA's stitching engine then builds a stitched ID linking them.", "Probabilistic matching is part of advanced device co-op approaches.", "Timestamp joins are for event sequencing — not identity stitching."] },
      { q: "What is 'Graph-Based Stitching' in CJA?", opts: ["Using a flowchart to design the stitching logic", "Leveraging AEP's Identity Graph to resolve which Persistent IDs belong to the same person", "A visualization of identity overlaps between channels", "Using SQL graph queries to join datasets"], ans: 1, explain: ["Flowcharts are not a stitching mechanism.", "✅ Graph-Based Stitching uses the AEP Identity Graph — which already knows that ECID '123' and CRM ID 'cust_456' belong to the same person — to stitch CJA data without requiring a Transient ID field in the dataset.", "Identity overlap visualization is a separate reporting concept.", "CJA doesn't use SQL graph queries for stitching."] },
      { q: "What is the 'Replay' process in CJA stitching?", opts: ["Re-playing audio/video analytics data", "A batch process that retroactively re-stitches historical data with identity knowledge from recent authenticated sessions", "Replaying failed data ingestion attempts", "Re-sending raw data from AEP to CJA"], ans: 1, explain: ["Replay is a data processing concept — not media playback.", "✅ Replay (typically weekly) retroactively re-stitches past anonymous sessions — once a person authenticates and their ECID is linked to CRM ID, historical anonymous hits are re-attributed to that Person.", "Ingestion retry is a separate pipeline concern.", "Re-sending data is not what Replay does."] },
      { q: "After stitching, which container in CJA corresponds to the cross-channel unified individual?", opts: ["Event", "Session", "Person", "Hit"], ans: 2, explain: ["Event = individual interaction (like an AA Hit).", "Session = group of events (like AA Visit).", "✅ Person is the top-level container in CJA representing the stitched individual — equivalent to AA's Visitor but potentially unified across web + app + CRM + offline.", "Hit is AA terminology — in CJA it's 'Event'."] },
      { q: "A user visits the website anonymously (ECID: A) on Monday, creates an account (CRM ID: X) on Wednesday, and visits again anonymously Friday. After Replay, what happens?", opts: ["Only the Wednesday and Friday sessions are linked", "All three interactions are stitched under Person linked to CRM ID X", "Monday's data is deleted — only known sessions are kept", "Friday creates a separate new Person profile"], ans: 1, explain: ["Monday's anonymous session is also retroactively stitched.", "✅ After Replay, CJA links: Monday ECID-A session (retroactively stitched via Replay) + Wednesday login (where ECID-A was linked to CRM-X) + Friday ECID-A session — all under ONE Person (CRM ID X).", "Data is never deleted in stitching — it's re-attributed.", "Friday uses the same ECID-A which is already known to be CRM-X."] }
    ];

    QUIZZES["cja-what-cross-channel"] = [
      { q: "What is 'cross-channel analysis' in the context of CJA?", opts: ["Comparing performance across different brand websites", "Analyzing customer behavior across multiple data sources and interaction points (web, app, email, call center, in-store) in a unified view", "Reporting on social media performance only", "A/B testing across different marketing channels"], ans: 1, explain: ["Multi-brand analysis is possible but not the core definition.", "✅ Cross-channel analysis = one unified report combining behavioral data from web + mobile app + email + call center + CRM + in-store POS — seeing the complete customer journey in one Workspace.", "Social media is one channel — cross-channel combines all.", "A/B testing is Adobe Target's domain."] },
      { q: "Which combination of data sources is a CLASSIC example of CJA cross-channel analysis?", opts: ["Homepage visits + product page visits (both from web)", "Email campaign opens + website sessions + in-store purchases + call center contacts — all linked to the same person", "Paid search clicks + organic clicks (both from search engines)", "Mobile app opens on iOS + Android (two mobile platforms)"], ans: 1, explain: ["Homepage + product are both web — that's single-channel.", "✅ Email (email dataset) + Web (web dataset) + POS (store dataset) + Call Center (CRM dataset) — all linked to one Person — is the archetypal cross-channel CJA use case.", "Paid + organic search are two variants of the same channel.", "iOS + Android are multi-platform but still single-channel (mobile app)."] },
      { q: "Which unique insight can ONLY be obtained through CJA's cross-channel analysis?", opts: ["Website bounce rate", "What % of users who called support eventually made an online purchase within 7 days", "Number of mobile app sessions", "Email open rate"], ans: 1, explain: ["Bounce rate is a standard web analytics metric in AA too.", "✅ Connecting call center records (support call dataset) to web purchase events (web dataset) under the same Person — then measuring purchase rate within 7 days — is impossible without cross-channel stitching.", "Mobile sessions are in mobile analytics — no cross-channel join needed.", "Email opens are tracked in email platforms — CJA adds the downstream action connection."] },
      { q: "To perform cross-channel analysis in CJA, what is the REQUIRED technical foundation?", opts: ["A single data source with all channels merged before ingestion", "Multiple AEP Datasets included in one CJA Connection, stitched on a common Person ID", "Separate CJA projects for each channel combined via Excel", "An external BI tool to join the data"], ans: 1, explain: ["Pre-merging before AEP is an ETL approach — CJA enables joining within the platform.", "✅ Separate AEP Datasets (one per channel) are ingested independently into AEP, stitched on a common ID (email, CRM ID) via AEP Identity Graph, then included in ONE CJA Connection for unified analysis.", "Excel joining defeats the purpose of CJA.", "External BI loses the person-level stitching benefits."] },
      { q: "In a cross-channel Fallout in CJA, what makes it different from an Adobe Analytics Fallout?", opts: ["CJA Fallout has more color options", "CJA Fallout steps can span datasets from different channels — e.g., Step 1: email open; Step 2: web visit; Step 3: in-store purchase", "CJA Fallout is faster than AA Fallout", "CJA Fallout requires a paid add-on"], ans: 1, explain: ["UI color options are not the functional difference.", "✅ CJA cross-channel Fallout defines steps across MULTIPLE data sources — email events (email dataset) → web events (web dataset) → POS events (store dataset) — measuring the funnel across channels. Impossible in AA.", "Speed is not the key differentiator.", "Cross-channel Fallout is a standard CJA capability — not an add-on."] },
      { q: "What is 'ROPO' analysis in a cross-channel context?", opts: ["Real-time Optimization and Predictive Outcomes", "Research Online, Purchase Offline — measuring how online behavior drives offline conversions", "Return On Paid Operations", "Remarketing Optimization for Purchase Outcomes"], ans: 1, explain: ["Real-time Optimization is not what ROPO stands for.", "✅ ROPO = Research Online, Purchase Offline — a classic cross-channel analysis measuring how many people research on the website but buy in physical stores. CJA enables this by joining web data + POS data.", "Return On Paid is ROI/ROAS — not ROPO.", "Remarketing is a different marketing concept."] },
      { q: "How does CJA handle a person who interacts across multiple devices (phone + laptop)?", opts: ["CJA treats each device as a separate person", "With stitching (field-based or graph-based), CJA links device interactions to one Person — enabling cross-device journey analysis", "CJA uses IP matching to merge devices", "Each device creates a separate Data View"], ans: 1, explain: ["Without stitching, devices would be separate — but CJA stitching solves this.", "✅ Identity stitching links the same person's phone ECID and laptop ECID via an authenticated identifier (login/CRM ID) — creating ONE Person record across both devices in CJA.", "IP matching is imprecise and not CJA's approach.", "Data Views are analysis configurations — not per-device."] },
      { q: "A CJA report shows a Person visited 8 touchpoints: 3 web, 2 email, 2 app, 1 in-store. What must be true for this unified journey to appear?", opts: ["All 4 channels must be in the same AEP Dataset", "All 4 channel datasets must be included in the CJA Connection, and the person must be successfully stitched across them via a common Identity", "Each channel needs its own Workspace project", "The person must have a known email address at all touchpoints"], ans: 1, explain: ["Separate datasets per channel is normal — they don't need to be in one dataset.", "✅ For a unified 8-touchpoint journey: ALL channel datasets must be in the CJA Connection, AND the person must be stitched (via Identity Graph or field-based stitching) so all 8 events share one Person ID.", "One Workspace project can show all channels simultaneously.", "Some touchpoints may be anonymous — stitching handles the ID resolution."] }
    ];

    QUIZZES["cja-cja-filters"] = [
      { q: "What are 'Filters' in CJA and what AA feature do they replace?", opts: ["Filters replace Processing Rules", "Filters are CJA's equivalent of Adobe Analytics Segments — reusable conditions applied to analysis", "Filters replace eVar configurations", "Filters are equivalent to Marketing Channels"], ans: 1, explain: ["Processing Rules are a data ingestion feature — not replaced by Filters.", "✅ CJA Filters = AA Segments. They define conditions using CJA dimensions/metrics and are applied to Workspace panels or components to restrict the data analyzed.", "eVar configurations are Data View dimension settings — not Filters.", "Marketing Channels are an attribution feature — not Filters."] },
      { q: "Which containers are available in a CJA Filter?", opts: ["Hit, Visit, Visitor", "Event, Session, Person", "Click, View, Convert", "Page, Section, Site"], ans: 1, explain: ["Hit/Visit/Visitor are Adobe Analytics container names.", "✅ CJA uses Event (individual interaction), Session (group of events/visit), and Person (all Sessions for one stitched individual) — equivalent to AA's Hit/Visit/Visitor.", "Click/View/Convert are marketing funnel concepts.", "Page/Section/Site are content hierarchy — not filter containers."] },
      { q: "A CJA Filter uses a 'Person' container with condition: 'Event = Purchase'. What does this return?", opts: ["Only the specific purchase event hits", "Only the sessions that contained a purchase", "ALL events and sessions for ANY person who EVER made a purchase — including non-purchase sessions", "Only persons who purchased in the current date range"], ans: 2, explain: ["Event container returns specific hitting events.", "Session container returns sessions with purchase.", "✅ Person container broadens to ALL data for qualifying persons — every event from every session, including sessions where they didn't purchase, for anyone who made at least one purchase.", "Date range filtering is separate from the container scope."] },
      { q: "How do CJA Filters differ from AA Segments in terms of available data dimensions?", opts: ["CJA Filters are more limited — only web dimensions", "CJA Filters can use dimensions from ANY dataset in the Connection — web, CRM, call center, POS — enabling cross-channel filter logic", "They are identical in available dimensions", "AA Segments support more dimension types"], ans: 1, explain: ["CJA Filters are MORE powerful — not more limited.", "✅ Because CJA Connections include multiple channel datasets, Filters can reference dimensions from ALL of them — e.g., 'Persons who opened an email AND visited the website AND made a call within 30 days.'", "CJA has access to ALL connected data — far more than AA's web-only data.", "AA has fewer available dimensions — limited to AA implementation data."] },
      { q: "What is the THEN operator used for in CJA Filters?", opts: ["It is not available in CJA Filters", "Creating sequential filters — requires condition A to happen BEFORE condition B", "Combining multiple Filter pills in Workspace", "Defining date range boundaries"], ans: 1, explain: ["THEN IS available in CJA Filters — it enables sequential logic.", "✅ THEN creates sequential filters in CJA — e.g., Filter: [Session: Page Viewed 'Product'] THEN [Session: Event = Add to Cart] — requiring the product view to precede cart addition.", "Multiple Filter pills in Workspace use AND logic automatically.", "Date boundaries are set in the date range picker — not THEN."] },
      { q: "Where can a CJA Filter be applied?", opts: ["Only at the project level", "At the panel level, the visualization/table level, or as a component in calculated metrics", "Only to Freeform Tables", "Only by admins in the Data View"], ans: 1, explain: ["Filters can be applied at multiple levels — not just project.", "✅ CJA Filters can be applied: to a panel (scope all visualizations), dropped on a Freeform Table column (scope one table), used inside calculated metrics, or applied as dimension breakdowns.", "Filters work across all visualization types.", "Any Workspace user can apply Filters — not just admins."] },
      { q: "A stakeholder wants to compare behavior of 'Mobile Purchasers' vs 'Desktop Purchasers'. What is the BEST approach in CJA?", opts: ["Create two separate Workspace projects", "Create two Filters and drag them as panel segments or as columns in one Freeform Table", "Export data to Excel and filter manually", "Create two separate Data Views with device-type filters"], ans: 1, explain: ["Two projects makes comparison harder.", "✅ Create two Filters ([Device=Mobile & Purchase>0] and [Device=Desktop & Purchase>0]), then apply them as separate panels OR drag both onto the same Freeform Table as comparison columns.", "Excel defeats CJA's purpose.", "Separate Data Views is overkill — Filters handle this elegantly."] },
      { q: "In CJA, a Filter is built with: Person container EXCLUDE [Event = Purchase]. What does this return?", opts: ["Only purchase events", "Sessions that did not include a purchase", "ALL events from persons who NEVER made a purchase — all their data is excluded if they purchased", "All events excluding the exact purchase hit"], ans: 2, explain: ["This EXCLUDES purchasers — not includes purchase events.", "Session container exclusion removes sessions — Person container removes entire persons' data.", "✅ Person container EXCLUDE [Purchase] removes ALL data from any Person who made a purchase — their entire history disappears from the filter. This gives you 'never-purchaser' data.", "Hit-level exclusion would only remove the purchase event hit."] }
    ];

    QUIZZES["cja-derived-fields"] = [
      { q: "What are 'Derived Fields' in CJA?", opts: ["Fields automatically created by AEP during data ingestion", "Custom fields created in the CJA Data View by applying functions to existing schema fields — no code required", "Fields imported from external systems via Data Feeds", "Fields automatically derived by Adobe's AI"], ans: 1, explain: ["AEP auto-creates some fields but Derived Fields are an analyst-configured feature.", "✅ Derived Fields are configured in the CJA Data View using a no-code function builder — you apply functions (CASE WHEN, REGEX, URL PARSE, TRIM, etc.) to create new dimensions or metrics from existing data.", "Data Feeds are an AA export feature — not CJA Derived Fields.", "AI-derived fields are different from rule-based Derived Fields."] },
      { q: "Which function allows you to create an IF/THEN conditional logic in Derived Fields?", opts: ["TRIM", "REGEX EXTRACT", "CASE WHEN", "URL PARSE"], ans: 2, explain: ["TRIM removes whitespace — not conditional logic.", "REGEX EXTRACT pulls patterns — not if/then conditions.", "✅ CASE WHEN creates conditional logic: CASE WHEN [field] contains 'email' THEN 'Email' WHEN [field] contains 'social' THEN 'Social' ELSE 'Other' END — building a new dimension.", "URL PARSE extracts URL components — not conditional logic."] },
      { q: "What Adobe Analytics feature is MOST SIMILAR to CJA Derived Fields?", opts: ["eVar persistence settings", "Processing Rules", "SAINT Classifications", "Anomaly Detection"], ans: 1, explain: ["eVar persistence is about attribution — not field transformation.", "✅ Processing Rules are the closest AA equivalent — they transform/set variable values based on conditions. Derived Fields do the same in CJA's Data View but with a more powerful no-code UI.", "SAINT adds metadata via lookup tables — not conditional field creation.", "Anomaly Detection is a statistical reporting feature."] },
      { q: "A company's marketing channel is buried in the URL path (e.g., '/email/campaign-1'). They want a 'Marketing Channel' dimension in CJA without changing the implementation. How?", opts: ["Ask the developer to add a new XDM field", "Use Derived Fields: URL PARSE to extract the path, then CASE WHEN to map it to channel names", "Create a new Connection with a different dataset", "Use SAINT Classifications to map URLs to channels"], ans: 1, explain: ["Derived Fields enables this without developer code changes.", "✅ Derived Fields: 1) URL PARSE function extracts the path segment. 2) CASE WHEN maps '/email' → 'Email', '/social' → 'Social' — creating a Marketing Channel dimension with zero implementation change.", "A new Connection pulls different data — not needed here.", "SAINT maps specific values — not URL-derived transformations."] },
      { q: "Derived Fields are created at which CJA layer?", opts: ["Layer 2 — Dataset", "Layer 3 — Connection", "Layer 4 — Data View", "Layer 1 — Schema"], ans: 2, explain: ["Datasets store raw data — no analyst-defined transformations.", "Connection links datasets — no dimension logic here.", "✅ Derived Fields are configured in the Data View (Layer 4) — the presentation layer where analysts define what fields are available, how they're named, and how they behave.", "Schema defines structure — not analyst-created derived fields."] },
      { q: "What is the 'REGEX EXTRACT' Derived Field function used for?", opts: ["Removing special characters from a field value", "Extracting a substring that matches a regular expression pattern from a text field", "Joining two fields together", "Converting numeric field to string"], ans: 1, explain: ["Character removal uses TRIM or REPLACE functions.", "✅ REGEX EXTRACT applies a regex pattern to a text field and returns the matched portion — e.g., extract '12345' from URLs like '/product/12345/details' using pattern '/product/(\\d+)/'.", "Joining fields uses CONCATENATE.", "Type conversion is a formatting function."] },
      { q: "Which Derived Field function is useful for mapping short country codes to full country names?", opts: ["URL PARSE", "REGEX EXTRACT", "LOOKUP — using a lookup table to map values", "TRIM"], ans: 2, explain: ["URL PARSE handles URL structure — not value mapping.", "REGEX extracts patterns — not maps values.", "✅ LOOKUP function uses a lookup table (uploaded in Data View) to map values — e.g., 'US' → 'United States', 'DE' → 'Germany'. Similar to SAINT but in CJA's Data View.", "TRIM removes whitespace — not for value mapping."] },
      { q: "What is the maximum number of Derived Fields allowed per Data View in CJA?", opts: ["10", "50", "100", "Unlimited"], ans: 2, explain: ["10 is too few for enterprise use cases.", "50 is below the actual limit.", "✅ CJA supports up to 100 Derived Fields per Data View — giving analysts significant flexibility to create custom dimensions without implementation changes.", "An actual limit of 100 exists — not unlimited."] }
    ];

    QUIZZES["cja-cja-visualizations"] = [
      { q: "Which visualization is EXCLUSIVE to CJA and not available in Adobe Analytics?", opts: ["Fallout", "Flow", "Journey Canvas", "Cohort Table"], ans: 2, explain: ["Fallout is in both AA and CJA.", "Flow is in both AA and CJA.", "✅ Journey Canvas is CJA-exclusive — a free-form 2D visualization with nodes, branches, and loops for mapping complete cross-channel customer journeys.", "Cohort Table is available in both."] },
      { q: "What makes the CJA Fallout visualization more powerful than the AA version?", opts: ["CJA Fallout has more colors", "CJA Fallout steps can span MULTIPLE datasets across different channels", "CJA Fallout is faster to load", "CJA Fallout supports more than 10 steps"], ans: 1, explain: ["Color options are not the capability differentiator.", "✅ CJA Fallout touchpoints can reference events from DIFFERENT datasets — email opens (email dataset) → web visits (web dataset) → in-store purchases (POS dataset) — cross-channel funnel impossible in AA.", "Speed is not the key differentiator.", "Both support many steps."] },
      { q: "What is a Freeform Table's primary function in CJA Analysis Workspace?", opts: ["To create bar charts from raw data", "The core data table — drag dimensions as rows and metrics as columns for flexible cross-tabulation analysis", "To define segment/filter conditions", "To configure Data View components"], ans: 1, explain: ["Freeform Tables are the analysis foundation — bar charts are separate visualizations.", "✅ Freeform Tables are the primary data analysis surface — any dimension as rows, any metric as columns, add breakdowns, apply filters, and sort freely.", "Filters are created in the Filter component menu.", "Data View config is separate from Workspace."] },
      { q: "What visualization shows HOW MANY USERS completed each step of a predefined journey?", opts: ["Flow", "Line Chart", "Fallout", "Journey Canvas"], ans: 2, explain: ["Flow shows free-form paths — not predefined step completion rates.", "Line Chart shows trends over time.", "✅ Fallout shows the conversion percentage at each predefined step — how many users made it from Step 1 to Step 2 to Step 3, highlighting where they dropped off.", "Journey Canvas shows free-form journey mapping."] },
      { q: "Which of the following BEST describes when to use the 'Histogram' visualization?", opts: ["To show how a metric changes over time", "To see distribution of a metric across users — e.g., how many users had 1, 2, 3...10+ visits", "To compare two segments' performance", "To show navigation paths"], ans: 1, explain: ["Time trends = Line Chart.", "✅ Histogram = value distribution. 'How many users had exactly 1 session? 2 sessions? Etc.' — reveals whether most users are low-engagement or high-engagement.", "Segment comparison = Segment Comparison Panel.", "Navigation paths = Flow."] },
      { q: "A bar chart in CJA is used when:", opts: ["You need to show a funnel conversion", "You need to compare discrete category values across a metric — e.g., revenue by channel", "You need to show trends over time", "You need to show segment overlap"], ans: 1, explain: ["Funnel = Fallout.", "✅ Bar charts compare categorical values — e.g., Email vs Paid Search vs Organic vs Direct revenue side by side. Best for 'compare volumes by category.'", "Trends over time = Line Chart.", "Overlap = Venn diagram."] },
      { q: "What type of diagram visualizes what PERCENTAGE of total a dimension contributes?", opts: ["Bar Chart", "Scatter Plot", "Donut/Pie Chart", "Bullet Chart"], ans: 2, explain: ["Bar charts compare absolute values — not part-to-whole.", "Scatter plot shows correlation between two variables.", "✅ Donut/Pie charts show part-to-whole relationships — e.g., Revenue: Email 45%, Paid 30%, Organic 25%. Best when you need 'what % of total does each channel represent?'", "Bullet chart compares a metric against a target."] },
      { q: "When should you use a 'Cohort Table' visualization in CJA Analysis Workspace?", opts: ["To see navigation paths between pages", "To measure what % of an initial user group returns to perform an action over subsequent time periods", "To compare attribution models", "To visualize a checkout funnel"], ans: 1, explain: ["Navigation paths = Flow.", "✅ Cohort Table = retention analysis. Group users by an entry event (first purchase, app install) and track what % return to do another event (visit, purchase again) in Week 1, Week 2, Month 1, Month 2...", "Attribution comparison = Attribution Panel.", "Checkout funnel = Fallout."] }
    ];

    QUIZZES["cja-cja-attribution"] = [
      { q: "How does attribution in CJA differ from Adobe Analytics attribution?", opts: ["CJA only supports Last Touch", "CJA can apply attribution across cross-channel touchpoints — crediting email opens to later in-store purchases", "CJA has fewer attribution models than AA", "They are identical in capability"], ans: 1, explain: ["CJA supports all major attribution models.", "✅ CJA attribution can span MULTIPLE datasets — e.g., credit an email open (from the email dataset) that led to an in-store purchase (from the POS dataset). AA attribution is limited to digital channels only.", "CJA has the same models PLUS cross-channel capability.", "CJA attribution goes beyond what AA can do."] },
      { q: "Where is attribution configured in CJA for a dimension?", opts: ["In the AEP Schema", "In the CJA Connection settings", "In the Data View — component attribution and expiration settings for each dimension", "In Analysis Workspace panel settings only"], ans: 2, explain: ["Schema defines field structure — not analytics attribution.", "Connection links datasets — no attribution config.", "✅ Data View is where you configure attribution for each dimension component — equivalent to AA's eVar allocation setting. You choose the attribution model and lookback window per dimension.", "Workspace can apply override attribution, but default attribution lives in Data View."] },
      { q: "What is the 'Lookback Window' in CJA attribution?", opts: ["The date range of the report", "How far back in a person's history CJA looks for touchpoints to credit before a conversion", "How many dimensions can be included in an attribution report", "The delay before CJA processes data"], ans: 1, explain: ["Report date range is the panel date range — not the attribution lookback window.", "✅ The Lookback Window defines how far BACK from a conversion CJA searches for touchpoints to credit — e.g., 30-day lookback means only touchpoints within 30 days before conversion are eligible.", "Dimension count is not the lookback window.", "Data processing delay is a pipeline concept — not attributing."] },
      { q: "Which attribution model should be selected to find which channels INITIATE customer journeys?", opts: ["Last Touch", "Time Decay", "First Touch", "Linear"], ans: 2, explain: ["Last Touch identifies what CLOSES conversions — not what initiates.", "Time Decay rewards recent touchpoints — not the first.", "✅ First Touch gives 100% credit to the FIRST channel/touchpoint in the journey — ideal for understanding acquisition and which channels introduce people to the brand.", "Linear distributes equally — not specifically acquisition-focused."] },
      { q: "The Attribution Panel in CJA Analysis Workspace allows:", opts: ["Configuring Data View component settings", "Comparing up to 10 attribution models side by side for the same metric", "Creating new Derived Fields", "Uploading classification data"], ans: 1, explain: ["Data View config is outside Workspace.", "✅ The Attribution Panel takes a metric and lets you compare multiple attribution models simultaneously — seeing how credit changes under First Touch, Last Touch, Linear, Time Decay, Position Based, etc.", "Derived Fields are configured in Data View.", "Classification uploads are not a Workspace feature."] },
      { q: "What is 'Algorithmic Attribution' (Data-Driven Attribution) in CJA?", opts: ["A manual weighting of channels by the analyst", "A machine learning model that analyzes all conversion paths and determines the statistically optimal credit distribution", "A fixed 30/30/40 weighting for first/middle/last touch", "An attribution model using IP address data"], ans: 1, explain: ["Algorithmic attribution is ML-powered — not manual.", "✅ Algorithmic/Data-Driven Attribution uses machine learning to analyze ALL actual conversion paths and determine the empirically optimal credit amount for each touchpoint — based on real data patterns.", "30/30/40 weighting is a custom model — not algorithmic.", "IP data is not used for attribution modeling."] },
      { q: "A company wants to know which touchpoints COLLECTIVELY contributed to a conversion (not just the last or first). Which metric best captures this?", opts: ["Last Touch Revenue", "First Touch Orders", "Participation Metric — gives 100% credit to all contributing touchpoints", "Linear Revenue"], ans: 2, explain: ["Last Touch gives credit to only the final touchpoint.", "First Touch gives credit to only the first touchpoint.", "✅ Participation metric gives the FULL metric value to EVERY touchpoint that participated — so if 5 channels touched a $100 purchase, each shows $100 — helping identify which channels are always 'in the mix.'", "Linear divides — Participation gives full credit to all."] },
      { q: "A CJA Data View has 'Session' as the attribution lookback for a dimension. A person has touchpoint in Session 1 and converts in Session 3. Does the Session 1 touchpoint get credit?", opts: ["Yes — always, regardless of lookback", "No — Session lookback means only touchpoints within the CONVERTING session are eligible", "Yes — if using First Touch model", "Depends on whether both sessions share the same device"], ans: 1, explain: ["Session lookback limits eligibility to the session of conversion.", "✅ With 'Session' lookback, only touchpoints occurring WITHIN the same session as the conversion are considered. Session 1 touchpoints are outside the session of Session 3's conversion — no credit.", "Even First Touch only looks within the Session lookback window.", "Device is not a factor in Session lookback — time scope determines eligibility."] }
    ];

    QUIZZES["cja-cja-calc-metrics"] = [
      { q: "What can CJA Calculated Metrics reference that Adobe Analytics Calculated Metrics CANNOT?", opts: ["Success events from Adobe Analytics", "ANY XDM schema field from any connected dataset in the Data View — not limited to pre-defined event slots", "Previously created calculated metrics only", "External database field values"], ans: 1, explain: ["AA calculated metrics are limited to AA's own metrics.", "✅ CJA calculated metrics can use ANY numeric field from any dataset in the Connection — web revenue, CRM loyalty points, call center handle time — unlimited by AA's 250-event limitation.", "CJA calculated metrics CAN reference other calculated metrics — but that's not the key differentiator.", "External databases are ingested into AEP datasets — then accessible in CJA."] },
      { q: "What is a 'Filter-Based Calculated Metric' in CJA?", opts: ["A metric that applies only to Filtered Freeform Tables", "A calculated metric that uses a CJA Filter as a component — restricting which data the metric counts", "A metric that excludes all filtered rows", "A metric configured in the filter builder UI"], ans: 1, explain: ["Filter-based metrics work everywhere — not just filtered tables.", "✅ Adding a Filter as a component inside a calculated metric formula creates a scoped metric — e.g., [Mobile Users Filter] × Revenue = Revenue from mobile users only. Powerful for audience-specific metrics.", "The metric includes filtered data — it restricts to qualified data.", "Calculated metrics have their own builder separate from Filters."] },
      { q: "In CJA, where do you create a Calculated Metric?", opts: ["In the Data View component editor", "In Analysis Workspace — via the + icon in Components or via calculated metric builder", "In AEP Query Service", "In the Connection settings"], ans: 1, explain: ["Data View creates component mappings — Calculated Metrics are built separately in Workspace.", "✅ Calculated Metrics are created in Analysis Workspace via Components > Calculated Metrics (+ icon) or from within the Freeform Table header — the builder appears with a drag-and-drop formula interface.", "Query Service is SQL-based AEP exploration — not CJA calculated metrics.", "Connection settings define data sourcing — not metric formulas."] },
      { q: "What is unique about CJA's ability to embed attribution models inside Calculated Metrics?", opts: ["AA also supports this — it's not unique to CJA", "CJA lets you apply a specific attribution model INSIDE the metric formula — overriding the Data View default for that metric", "Attribution models can only be applied in the Attribution Panel — not in metric formulas", "Embedding attribution models makes the metric slower"], ans: 1, explain: ["AA does NOT support embedding attribution models inside calculated metric formulas.", "✅ CJA allows: Revenue with FirstTouch Attribution as a calculated metric — overriding the component's default attribution model IN the formula. E.g., compare [Last Touch Revenue] vs [First Touch Revenue] side by side.", "Attribution Panel compares models at report-time — CJA also supports model-in-formula.", "Embedded attribution does not meaningfully impact performance."] },
      { q: "Formula: (Cart Adds - Checkouts) / Cart Adds. What does this calculate?", opts: ["Checkout Rate", "Cart Abandonment Rate", "Revenue per Cart Add", "Cart Conversion Rate"], ans: 1, explain: ["Checkout Rate = Checkouts / Cart Adds.", "✅ Cart Abandonment Rate = (Cart Adds - Checkouts) / Cart Adds — the proportion of cart additions that were NOT followed by a checkout.", "Revenue per Cart Add = Revenue / Cart Adds.", "Cart Conversion Rate = Checkouts / Cart Adds (the inverse of abandonment)."] },
      { q: "A CJA Calculated Metric has type set to 'Percent'. The formula result is 0.27. What displays in Workspace?", opts: ["0.27", "0.27%", "27%", "270%"], ans: 2, explain: ["0.27 would display if type is 'Decimal'.", "0.27% would be shown if the value itself was 0.0027.", "✅ When metric type = 'Percent', CJA multiplies the decimal result by 100 — so 0.27 becomes 27%. This is purely a display formatting choice.", "270% would result from multiplying 0.27 by 1000 — not what Percent type does."] },
      { q: "Which container scope should 'Conversion Rate = Orders / Sessions' use in its calculated metric definition?", opts: ["Event (hit) level", "Person (visitor) level", "Session level", "No container needed"], ans: 2, explain: ["Event level would compute per-hit — orders and sessions are not hit-level metrics.", "Person level gives a lifetime conversion rate — not per-session.", "✅ Session-level scope: each session either contains an order or not — Orders/Sessions gives the session conversion rate naturally.", "Container scope matters — Session is most appropriate for session-based conversion rate."] },
      { q: "What is notable about Calculated Metrics in CJA compared to AA in terms of DATA ACCESS for the formula?", opts: ["CJA calculated metrics are less flexible", "CJA formulas can reference cross-channel metrics — e.g., (In-Store Orders + Online Orders) / Total Sessions from all channels", "AA calculated metrics support more statistical functions", "They are identical in data access"], ans: 1, explain: ["CJA is MORE flexible — not less.", "✅ Because CJA Connections include multiple channel datasets, a formula in CJA can combine [In-Store Revenue] (POS dataset) + [Online Revenue] (web dataset) / [Sessions] — cross-channel arithmetic impossible in AA.", "Both support similar statistical functions.", "CJA has broader data access for formulas."] }
    ];

    QUIZZES["cja-date-ranges"] = [
      { q: "Which type of date range AUTOMATICALLY updates when you open a report on different days?", opts: ["Fixed Date Range", "Rolling Date Range", "Custom Date Range", "Relative Date Range"], ans: 1, explain: ["Fixed ranges stay constant — same start/end always.", "✅ Rolling Date Ranges are dynamic — 'Last 30 days' always means the 30 days BEFORE today, automatically refreshing as time passes. Ideal for recurring dashboards.", "Custom ranges can combine fixed and rolling — not always auto-updating.", "'Relative' is another name for Rolling — B is the standard CJA terminology."] },
      { q: "What is a 'Fixed Date Range' best suited for?", opts: ["Live dashboards refreshed daily", "Historical reporting on a completed period — e.g., Q1 2024 campaign analysis", "Real-time traffic monitoring", "Rolling monthly comparison"], ans: 1, explain: ["Live dashboards need rolling ranges.", "✅ Fixed ranges lock to specific dates — ideal for analyzing a completed period like 'Q1 2024' or 'Black Friday weekend' that should never shift.", "Real-time monitoring needs very short rolling ranges.", "Rolling monthly comparisons need rolling ranges."] },
      { q: "What are the Panel types available in CJA Analysis Workspace?", opts: ["Only Blank Panel", "Blank, Quick Insights, Attribution, Experimentation, Media Concurrent Viewers, Media Playback Time Spent", "Blank and Attribution only", "Standard, Advanced, and Custom panels"], ans: 1, explain: ["Multiple panel types exist.", "✅ CJA panels include: Blank, Quick Insights, Attribution, Experimentation (A/B), Media Concurrent Viewers, and Media Playback Time Spent — each designed for specific analysis patterns.", "More than two panel types exist.", "Standard/Advanced/Custom are not the panel type names in CJA."] },
      { q: "What makes the Experimentation Panel in CJA unique?", opts: ["It lets you run A/B tests from within CJA", "It analyzes A/B test results from Adobe Target or other testing platforms — showing statistical significance and lift", "It creates random audience samples for testing", "It compares multiple attribution models for experiment validity"], ans: 1, explain: ["CJA doesn't run tests — Adobe Target does.", "✅ The Experimentation Panel takes results from an A/B test (from Target, Optimizely, etc.) that have been ingested into AEP and shows statistically validated lift, confidence intervals, and metric performance per variant.", "Audience sampling is a separate CJA/AEP feature.", "Attribution comparison is the Attribution Panel."] },
      { q: "What does the 'Quick Insights' panel do?", opts: ["Shows real-time data in the last 5 minutes", "Helps non-expert users build basic analyses by suggesting dimensions, metrics, and visualizations automatically", "Provides AI-generated executive summaries", "Runs automated anomaly detection scans"], ans: 1, explain: ["Quick Insights is not a real-time traffic tool.", "✅ Quick Insights provides a guided, auto-suggest experience where the panel recommends relevant dimensions and metrics — lowering the barrier for business users new to Analysis Workspace.", "Narrative summaries are separate (Workspace Intelligent Captions).", "Anomaly Detection is a separate panel feature."] },
      { q: "A panel in CJA shows data for 'Last 90 Days'. A visualization within the panel has its OWN date range set to 'Last 7 Days'. Which date range applies to that visualization?", opts: ["The panel's 90-day range always overrides", "The visualization's own 7-day range — it overrides the panel-level range", "The average of the two ranges", "Both ranges apply simultaneously"], ans: 1, explain: ["When a visualization sets its own range, it overrides the panel.", "✅ Visualization-level date ranges OVERRIDE the panel-level date range for that specific component. The rest of the panel stays at 90 days, but that visualization shows 7-day data.", "There is no range averaging.", "Only one date range applies per component."] },
      { q: "Where are custom Date Ranges created and saved in CJA?", opts: ["In the AEP Schema editor", "In the Data View component settings", "Via Components > Date Ranges in Analysis Workspace — built using the Date Range Builder", "In the CJA Connection configuration"], ans: 2, explain: ["AEP Schema editor handles field structure — not date ranges.", "Data View configures dimensions/metrics — not date ranges.", "✅ Custom Date Ranges are created via the Components > Date Ranges panel in Analysis Workspace — using the Date Range Builder with calendar UI, rolling offsets, and anchors.", "Connection configuration handles dataset linking — not date ranges."] },
      { q: "A CJA project has 3 panels: Panel 1 (Last 30 Days), Panel 2 (Last Quarter), Panel 3 (Custom: Jan 1-Mar 31). A filter is applied at the PROJECT level. What does the project-level filter affect?", opts: ["Only Panel 1", "Only panels without their own segments", "All 3 panels simultaneously", "Nothing — project-level filters don't exist in CJA"], ans: 2, explain: ["Project-level filter applies broadly.", "Panel-level segments override project — but project-level still applies to all unless overridden.", "✅ A project-level filter (segment) applies to ALL panels and ALL visualizations in the project — each panel still uses its own date range but the segment is universal.", "Project-level filters DO exist in CJA Workspace as a project property."] }
    ];

    QUIZZES["cja-cja-workspace"] = [
      { q: "What is the key structural difference between CJA Analysis Workspace and Adobe Analytics Workspace?", opts: ["CJA Workspace requires coding skills; AA Workspace is drag-and-drop", "They are identical — just branded differently", "CJA Workspace can include data from multiple datasets/channels; AA Workspace is limited to one report suite", "CJA Workspace has fewer visualization types"], ans: 2, explain: ["Both are drag-and-drop analytical interfaces.", "The interfaces look similar but the underlying data access is fundamentally different.", "✅ CJA Workspace connects to a Data View that draws from multiple channel datasets — web + app + CRM + POS. AA Workspace is limited to one report suite's digital data.", "CJA has MORE visualization types (e.g., Journey Canvas)."] },
      { q: "What is a 'Data View' in the context of CJA Analysis Workspace?", opts: ["A type of visualization in Workspace", "The configuration layer that defines which dimensions/metrics are available and how they behave — what analysts see in Workspace", "The raw AEP dataset", "A saved Workspace project view"], ans: 1, explain: ["Visualizations (bar chart, fallout, etc.) are different from Data Views.", "✅ A Data View is the Layer 4 configuration — it exposes XDM fields as dimensions/metrics with appropriate names, formats, attribution, and persistence for analysts to use in Workspace.", "Raw AEP datasets are Layer 2 — Data Views are Layer 4.", "Saved Workspace views/projects are separate from Data Views."] },
      { q: "In CJA Workspace, what does dragging a 'Filter' pill onto a panel header do?", opts: ["Creates a new visualization", "Applies that Filter to ALL components within that panel", "Saves the Filter to the project permanently", "Sends the Filter to AEP as an Audience"], ans: 1, explain: ["Dropping a Filter on a panel doesn't create a visualization.", "✅ Dropping a Filter on a panel header applies it to EVERY visualization and table within that panel — all components in the panel are filtered simultaneously.", "The filter is applied — not permanently locked, and can be removed.", "Publishing to AEP as an Audience requires a separate 'Publish Audience' action."] },
      { q: "What is 'Intelligent Captions' in CJA Analysis Workspace?", opts: ["User-written notes on visualizations", "AI-generated natural language summaries of key trends and anomalies in a visualization", "Marketing copy generated for campaign reports", "Captions for video visualizations"], ans: 1, explain: ["User notes are 'Annotations.'", "✅ Intelligent Captions uses generative AI to automatically write natural language descriptions of what's happening in a visualization — highlighting trends, anomalies, and key changes without analyst interpretation.", "Marketing copy is not an Analytics Workspace feature.", "Video content is tracked via Media Analytics — Intelligent Captions refer to data summaries."] },
      { q: "How does the CJA Connection's 'Backfill' setting work?", opts: ["It fills empty cells in a Freeform Table with 0", "It determines how much historical data from the AEP Dataset is available in CJA after the Connection is created", "It backfills missing attribution data using last known values", "It repopulates deleted Derived Fields"], ans: 1, explain: ["Empty cell handling is a Workspace table setting.", "✅ When creating a Connection, you specify how much historical AEP data to backfill — e.g., 'Include data from the last 13 months.' This determines how far back analysts can query.", "Attribution backfill is separate — Connection backfill is about data availability window.", "Derived Fields are always recalculated on available data."] },
      { q: "What is the 'Annotations' feature in CJA Analysis Workspace?", opts: ["Auto-generated captions from AI", "Manually added notes on specific dates or date ranges in line charts — marking events like launches or outages", "Footnotes at the bottom of Workspace projects", "Tags attached to saved segments"], ans: 1, explain: ["Intelligent Captions are AI-generated — Annotations are manual.", "✅ Annotations let analysts mark specific dates/date ranges in line chart visualizations with a note — e.g., 'New feature launched' or 'Site outage 2 hours' — providing context for data spikes.", "Annotations appear in-chart — not as footnotes.", "Tags are applied to components — Annotations go on time-series charts."] },
      { q: "Can CJA Analysis Workspace reports be SHARED with users who don't have a CJA license?", opts: ["No — CJA Workspace requires a full CJA license per user", "Yes — via the Report Builder add-in only", "Yes — via scheduled PDF/CSV email deliveries OR Workspace View-only sharing links", "Only via Adobe Experience Cloud sharing"], ans: 2, explain: ["View-only access and email delivery enable broader sharing.", "Report Builder is an Excel add-in — one of several options but not the only one.", "✅ CJA projects can be shared as: scheduled email deliveries (PDF/CSV), view-only shared links (recipients can interact but not edit), or full collaboration shares with licensed users.", "Adobe Experience Cloud is one channel — scheduled exports and view-only links are also valid."] },
      { q: "What is the PRIMARY difference between 'Person', 'Session', and 'Event' metrics in CJA Workspace?", opts: ["They are calculated differently in Data View only", "Person = unique stitched individuals, Session = groups of events (visits), Event = individual interactions — the three unit-of-analysis granularities", "They apply to different visualization types only", "Person and Visitor are synonyms; Session and Visit are synonyms; Event and Hit are synonyms"], ans: 1, explain: ["The metrics have distinct granularity — not just different data view configurations.", "✅ Event = most granular (individual hit/interaction like a page view). Session = a group of events in a time window (equivalent to AA Visit). Person = unique cross-channel individual (equivalent to AA Visitor but stitched cross-channel).", "Person/Visitor, Session/Visit, Event/Hit ARE equivalent pairs — but the key point is the distinct granularity each represents, which is captured in option B."] }
