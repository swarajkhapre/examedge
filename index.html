<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamEdge — AA & CJA Study Platform</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --surface3: #22222f;
      --border: #2a2a3a;
      --border-light: #3a3a4f;
      --text: #e8e6f0;
      --text-dim: #8a88a0;
      --text-muted: #5a5870;
      --accent: #ff6b35;
      --accent2: #ff8c5a;
      --accent-glow: rgba(255, 107, 53, 0.15);
      --blue: #4a90ff;
      --blue-dim: rgba(74, 144, 255, 0.12);
      --green: #3dd68c;
      --green-dim: rgba(61, 214, 140, 0.12);
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.12);
      --red: #ff6b6b;
      --red-dim: rgba(255, 107, 107, 0.12);
      --yellow: #fbbf24;
      --yellow-dim: rgba(251, 191, 36, 0.12);
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-light)
    }

    /* TOP HEADER */
    .top-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #ff3e00);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--text);
      letter-spacing: -0.5px
    }

    .logo-text span {
      color: var(--accent)
    }

    .exam-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border)
    }

    .exam-tab {
      padding: 8px 24px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      transition: all .25s ease;
      letter-spacing: 0.3px;
    }

    .exam-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(255, 107, 53, 0.3)
    }

    .exam-tab:hover:not(.active) {
      color: var(--text);
      background: var(--surface3)
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .progress-ring {
      position: relative;
      width: 38px;
      height: 38px
    }

    .progress-ring svg {
      transform: rotate(-90deg)
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round
    }

    .progress-ring .bg {
      stroke: var(--border)
    }

    .progress-ring .fg {
      stroke: var(--green);
      transition: stroke-dashoffset .6s ease
    }

    .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--green)
    }

    /* LAYOUT */
    .app-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 64px)
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 16px;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
    }

    .search-box {
      position: relative;
      margin-bottom: 20px
    }

    .search-box input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent)
    }

    .search-box input::placeholder {
      color: var(--text-muted)
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px
    }

    .nav-section {
      margin-bottom: 16px
    }

    .nav-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-section-title::before {
      content: '';
      width: 8px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px
    }

    .nav-item {
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .2s ease;
      margin-bottom: 2px;
      position: relative;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text)
    }

    .nav-item.active {
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 600
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 18px;
      background: var(--accent);
      border-radius: 0 2px 2px 0
    }

    .nav-item .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .nav-item .dot.done {
      background: var(--green)
    }

    .nav-item .dot.todo {
      background: var(--border)
    }

    /* MAIN CONTENT */
    .main-content {
      overflow-y: auto;
      padding: 40px 56px 80px;
      max-width: 960px
    }

    .content-header {
      margin-bottom: 36px
    }

    .content-header .breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .content-header .breadcrumb .sep {
      opacity: 0.4
    }

    .content-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .content-header .subtitle {
      font-size: 15px;
      color: var(--text-dim);
      max-width: 640px
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .tag.exam {
      background: var(--red-dim);
      color: var(--red)
    }

    .tag.key {
      background: var(--yellow-dim);
      color: var(--yellow)
    }

    .tag.tip {
      background: var(--blue-dim);
      color: var(--blue)
    }

    .tag.new {
      background: var(--green-dim);
      color: var(--green)
    }

    /* CONTENT TYPOGRAPHY */
    .content h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--text);
      margin: 40px 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.3px;
    }

    .content h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin: 28px 0 10px
    }

    .content p {
      margin-bottom: 14px;
      color: var(--text-dim);
      font-size: 14.5px;
      line-height: 1.75
    }

    .content strong {
      color: var(--text);
      font-weight: 600
    }

    .content ul,
    .content ol {
      margin: 12px 0 12px 20px
    }

    .content li {
      margin-bottom: 8px;
      color: var(--text-dim);
      font-size: 14.5px;
      line-height: 1.65
    }

    /* CARDS & BOXES */
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      margin: 20px 0;
      position: relative;
      overflow: hidden;
    }

    .info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px
    }

    .info-card.exam-info::before {
      background: linear-gradient(90deg, var(--accent), var(--red))
    }

    .info-card.success::before {
      background: linear-gradient(90deg, var(--green), #2dd4bf)
    }

    .info-card.warning::before {
      background: linear-gradient(90deg, var(--yellow), var(--accent))
    }

    .info-card.danger::before {
      background: linear-gradient(90deg, var(--red), #ff4757)
    }

    .info-card.concept::before {
      background: linear-gradient(90deg, var(--blue), var(--purple))
    }

    .info-card .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .info-card p {
      font-size: 13.5px
    }

    /* TABLES */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 20px 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border)
    }

    .data-table th {
      background: var(--surface2);
      color: var(--text);
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 12px 16px;
      font-size: 13.5px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .data-table tr:last-child td {
      border-bottom: none
    }

    .data-table tr:hover td {
      background: var(--surface2)
    }

    /* DIAGRAM BOX */
    .diagram {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin: 24px 0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    .diagram .flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0
    }

    .diagram .flow-box {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      border: 1px solid;
    }

    .diagram .flow-arrow {
      color: var(--text-muted);
      font-size: 18px
    }

    .diagram .layer1 {
      background: var(--blue-dim);
      color: var(--blue);
      border-color: rgba(74, 144, 255, 0.3)
    }

    .diagram .layer2 {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(61, 214, 140, 0.3)
    }

    .diagram .layer3 {
      background: var(--purple-dim);
      color: var(--purple);
      border-color: rgba(167, 139, 250, 0.3)
    }

    .diagram .layer4 {
      background: var(--yellow-dim);
      color: var(--yellow);
      border-color: rgba(251, 191, 36, 0.3)
    }

    .diagram .layer5 {
      background: var(--red-dim);
      color: var(--red);
      border-color: rgba(255, 107, 107, 0.3)
    }

    /* CODE / FORMULA */
    .code-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin: 16px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--green);
      line-height: 1.8;
      overflow-x: auto;
    }

    .formula {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent2);
    }

    /* QUIZ */
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin: 24px 0;
    }

    .quiz-card .q-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 8px
    }

    .quiz-card .q-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px
    }

    .quiz-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }

    .quiz-option:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    .quiz-option.correct {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green)
    }

    .quiz-option.wrong {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red)
    }

    .quiz-explain {
      display: none;
      margin-top: 12px;
      padding: 14px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
      border-left: 3px solid var(--accent);
    }

    /* COMPARISON */
    .vs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0
    }

    .vs-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .vs-card h4 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .vs-card p,
    .vs-card li {
      font-size: 13px
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      border: none;
      background: transparent;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 1px;
      transition: all .3s ease
    }

    .hamburger.open span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px)
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0)
    }

    .hamburger.open span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px)
    }

    /* SIDEBAR OVERLAY */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 88;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(2px);
    }

    .sidebar-overlay.visible {
      display: block
    }

    /* HIT TIMELINE DIAGRAM */
    .hit-timeline {
      margin: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .hit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      flex-wrap: wrap
    }

    .hit-row.set-row {
      background: var(--green-dim);
      border-color: rgba(61, 214, 140, 0.35)
    }

    .hit-row.persist-row {
      background: var(--blue-dim);
      border-color: rgba(74, 144, 255, 0.25)
    }

    .hit-row.empty-row {
      background: var(--surface);
      opacity: 0.7
    }

    .hit-row.convert-row {
      background: var(--accent-glow);
      border-color: rgba(255, 107, 53, 0.35)
    }

    .hr-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      min-width: 36px;
      font-family: 'JetBrains Mono', monospace
    }

    .hr-page {
      font-size: 12px;
      color: var(--text-dim);
      flex: 1;
      min-width: 80px
    }

    .hr-val {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      min-width: 130px;
      font-weight: 600
    }

    .hit-row.set-row .hr-val {
      color: var(--green)
    }

    .hit-row.persist-row .hr-val {
      color: var(--blue)
    }

    .hit-row.empty-row .hr-val {
      color: var(--text-muted)
    }

    .hit-row.convert-row .hr-val {
      color: var(--accent)
    }

    .hr-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap
    }

    .badge-set {
      background: var(--green-dim);
      color: var(--green)
    }

    .badge-persist {
      background: var(--blue-dim);
      color: var(--blue)
    }

    .badge-empty {
      background: var(--surface3);
      color: var(--text-muted)
    }

    .badge-convert {
      background: var(--accent-glow);
      color: var(--accent)
    }

    /* ATTRIBUTION BARS */
    .attr-visual {
      margin: 16px 0
    }

    .attr-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap
    }

    .attr-bar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      min-width: 90px;
      text-align: right;
      flex-shrink: 0
    }

    .attr-bar-track {
      flex: 1;
      min-width: 120px;
      background: var(--surface3);
      border-radius: 4px;
      height: 24px;
      overflow: hidden;
      display: flex
    }

    .attr-seg {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      transition: width .5s ease
    }

    .seg-google {
      background: #4a90ff
    }

    .seg-email {
      background: #a78bfa
    }

    .seg-direct {
      background: var(--accent)
    }

    /* SCOPE BARS */
    .scope-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0
    }

    .scope-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap
    }

    .scope-label {
      font-size: 12px;
      font-weight: 700;
      min-width: 60px;
      text-align: right;
      flex-shrink: 0
    }

    .scope-bar {
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      transition: width .5s
    }

    .scope-note {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 80px
    }

    /* RESPONSIVE */
    @media(max-width:900px) {
      .vs-grid {
        grid-template-columns: 1fr
      }
    }

    @media(max-width:768px) {
      .hamburger {
        display: flex
      }

      .exam-tabs {
        display: none
      }

      .sidebar {
        position: fixed;
        left: -300px;
        top: 0;
        height: 100vh;
        width: 280px;
        z-index: 92;
        padding-top: 80px;
        transition: left .3s cubic-bezier(.4, 0, .2, 1);
      }

      .sidebar.mobile-open {
        left: 0;
        box-shadow: 8px 0 32px rgba(0, 0, 0, 0.5)
      }

      .app-layout {
        display: block
      }

      .main-content {
        padding: 20px 16px 80px
      }

      .content-header h1 {
        font-size: 24px
      }

      .top-header {
        padding: 0 14px;
