    QUIZZES["aa-virtual-report-suites"] = [
      { q: "What is a Virtual Report Suite (VRS)?", opts: ["A separate report suite with its own tracking code", "A filtered, curated view of a parent report suite — no separate data collection", "A report suite specifically for mobile app data", "A merged view of two different report suites"], ans: 1, explain: ["VRS has no separate tracking code or data collection.", "✅ A VRS is a VIEW — it filters a parent report suite using a segment, giving stakeholders a tailored, restricted perspective without additional implementation.", "VRS can show any data from the parent — mobile, web, or both.", "VRS cannot merge two different report suites' data."] },
      { q: "What is the PRIMARY use case for creating a Virtual Report Suite?", opts: ["Storing data from a different country's website separately", "Providing a segmented, curated view to specific teams without exposing all parent data", "Improving data collection performance", "Creating A/B test report suites"], ans: 1, explain: ["Data separation for compliance requires separate report suites — not VRS.", "✅ VRS allows, e.g., the Email Marketing team to see ONLY email-traffic data, or the Mobile team to see ONLY mobile data — without seeing the entire global report suite.", "VRS is a reporting view — it doesn't affect data collection.", "A/B testing uses Adobe Target — not VRS."] },
      { q: "Can a Virtual Report Suite have its own eVar expiration settings different from the parent?", opts: ["Yes — all settings are independent of the parent", "No — VRS inherits all eVar settings from the parent and cannot change them", "Yes — but only for eVar1-eVar10", "Only if an Adobe consultant configures it"], ans: 1, explain: ["VRS doesn't have independent eVar configuration.", "✅ A VRS inherits ALL variable settings (eVar names, expiration, events) from the parent report suite. To change these settings, you must edit the parent.", "No partial inheritance exists.", "This is not a consultant-enablement feature."] },
      { q: "A company has a global report suite with 5 different regional websites. They want regional teams to see ONLY their own data. What is the BEST solution?", opts: ["Create 5 separate report suites with 5 separate implementations", "Create 5 Virtual Report Suites with region-specific segment filters", "Use 5 different Adobe Analytics contracts", "Export data to Excel and filter manually"], ans: 1, explain: ["Separate suites work but require 5× the implementation effort.", "✅ VRS with a segment (e.g., 'Country = Germany') gives the German team their own view with no extra implementation — the global tag handles all data collection.", "Separate contracts are unnecessary and expensive.", "Manual Excel filtering is not scalable."] },
      { q: "What happens to user permissions when using Virtual Report Suites?", opts: ["VRS has no connection to user permissions", "A VRS can be assigned to specific user groups — users only see the VRS data, not the full parent", "All users who can access the parent auto-access the VRS", "VRS requires a separate login credential"], ans: 1, explain: ["VRS is directly connected to permission management.", "✅ VRS can be assigned to specific user product profiles — restricting access so that team A sees only their VRS while team B sees a different one. No one sees the full parent unless explicitly granted.", "Access to parent doesn't automatically grant VRS access.", "Login is through Adobe Admin Console — VRS uses role-based profiles."] },
      { q: "A VRS is built with a 'Mobile Users' segment. A user visits from desktop and then from mobile in the same week. What data appears in the VRS?", opts: ["Only the mobile session hits", "All sessions from this user — including desktop — because it is Visitor-level", "No data — mixed-device visitors are excluded", "Only data from the mobile sessions but some desktop eVar values may carry over"], ans: 0, explain: ["✅ If the VRS segment is at the HIT or VISIT level (Mobile Users = Visit container), only the mobile VISITS/HITS are included. If Visitor container, all their data appears — the answer depends on segment scope. Most commonly, a mobile device-type filter uses visit/hit scope, showing only mobile sessions.", "Visitor container would include all visits — but most mobile filters use visit/hit scope.", "Inclusion is determined by the segment scope — not a blanket exclusion.", "eVar carryover within the VRS depends on the container and appears in the relevant sessions."] },
      { q: "Which feature distinguishes an INTERNAL VRS (with segment) from a simple segment applied in Workspace?", opts: ["VRS segments are more accurate than Workspace segments", "VRS creates a persistent, shareable reporting environment with its own components and branding; Workspace segments are ad hoc per report", "VRS can use eVar expiration; Workspace segments can't", "VRS processes data faster than Workspace-level segments"], ans: 1, explain: ["Both use the same underlying segment engine.", "✅ VRS creates a persistent, named environment with its own component list, curation, and access controls that can be shared across all projects for a team — Workspace segments are applied per-project, ad hoc.", "Both VRS and Workspace can use any variables.", "Processing speed is the same."] },
      { q: "What is 'Component Curation' in a Virtual Report Suite?", opts: ["Automatically removing unused components from the parent", "Limiting which dimensions, metrics, and segments appear in the VRS — simplifying the UI for end users", "Encrypting sensitive component names", "Scheduling automatic component cleanup reports"], ans: 1, explain: ["Curation limits visibility — it doesn't remove from parent.", "✅ Component Curation lets the VRS admin choose which components (dimensions, metrics, segments, date ranges) are visible to VRS users — reducing cognitive load and preventing misuse of irrelevant variables.", "No encryption is applied to component names.", "No scheduling is involved in curation."] }
    ];

    QUIZZES["aa-anomaly-detection"] = [
      { q: "What is Anomaly Detection in Adobe Analytics?", opts: ["A feature that detects implementation errors in the tracking code", "A statistical model that identifies data points that deviate significantly from historical patterns", "A bot-filtering algorithm that removes invalid traffic", "A segment that automatically finds unusual visitor behavior"], ans: 1, explain: ["Implementation errors are found via debugging tools (Adobe Debugger, Charles).", "✅ Anomaly Detection uses statistical modeling (including seasonality and trend analysis) to automatically highlight data points that fall outside expected ranges.", "Bot filtering is a separate report suite admin feature.", "Segments are applied manually — Anomaly Detection is automated."] },
      { q: "In a line chart in Analysis Workspace, how is an anomaly visually indicated?", opts: ["A red dashed line replaces the metric line", "A shaded confidence band appears around the expected range, with data points outside shown as dots", "The anomalous data point is colored differently (red dot above/below the line)", "A popup notification appears"], ans: 1, explain: ["Line style doesn't change for anomalies.", "✅ Anomaly Detection shows a shaded expected range (confidence interval) around the trend. Data points breaching the boundary appear as highlighted dots — immediately visible deviations.", "Both B and C describe elements, but B is the more complete description.", "Notifications are for Intelligent Alerts — not inline Anomaly Detection."] },
      { q: "What statistical model does Adobe Analytics Anomaly Detection primarily use?", opts: ["Linear regression with 95% confidence intervals", "Holt-Winters seasonal decomposition — accounting for trend and seasonality", "K-nearest neighbors clustering", "Monte Carlo simulation"], ans: 1, explain: ["Linear regression alone would miss seasonal patterns.", "✅ Adobe uses Holt-Winters exponential smoothing — a time series method that accounts for TREND and SEASONALITY — making it robust for typical retail/seasonal data patterns.", "K-nearest neighbors is a classification algorithm — not used here.", "Monte Carlo does probabilistic simulation — not used for this anomaly detection."] },
      { q: "What is an 'Intelligent Alert' (formerly 'Alerts') in Adobe Analytics?", opts: ["A real-time dashboard notification when a KPI changes", "An automated notification (email/SMS) triggered when a metric breaches a defined threshold or an anomaly is detected", "An admin alert when a user exports too much data", "A Workspace annotation added manually by an analyst"], ans: 1, explain: ["Real-time dashboard changes require a separate real-time report setup.", "✅ Intelligent Alerts send automated email/mobile notifications when: a metric exceeds/falls below a threshold, OR when anomaly detection fires on your data.", "Data export alerts are not a standard feature.", "Workspace annotations are manually placed notes — not automated alerts."] },
      { q: "When is Contribution Analysis (now AI-powered) typically triggered?", opts: ["When a segment is applied to the Fallout report", "When Anomaly Detection identifies a significant anomaly — to find WHICH dimension drives the unusual change", "When a new Classification file is uploaded", "When Data Feed processing completes"], ans: 1, explain: ["Fallout and Contribution Analysis are separate features.", "✅ Contribution Analysis is triggered from an anomaly point in a line chart — it uses machine learning to scan dimensions and find which dimension value most contributed to the anomaly.", "Classification uploads don't trigger Contribution Analysis.", "Data Feed completion is a backend process — not connected to Contribution Analysis."] },
      { q: "What granularity should you use when configuring an Intelligent Alert for a sudden traffic drop?", opts: ["Annual — to avoid daily noise", "Monthly — for smoother trend alerts", "Daily or Hourly — to catch drops quickly before they become major issues", "Weekly — the standard alerting frequency"], ans: 2, explain: ["Annual alerting is far too slow for operational response.", "Monthly alerts miss sudden drops that could last days.", "✅ Hourly or Daily granularity is best for operational alerts — catching sudden traffic drops, spike in errors, or KPI deviations while there's still time to react.", "Weekly alerts are fine for trend monitoring — not sudden drop detection."] },
      { q: "An analyst notices that on weekends, orders are always 40% lower than weekdays. Would Anomaly Detection flag a normal weekend with 40% lower orders as an anomaly?", opts: ["Yes — any 40% drop is always flagged", "No — Anomaly Detection accounts for weekly seasonality patterns and the normal weekend dip is part of the expected range", "Only if the analyst manually sets the 40% threshold", "Yes — but only if the alert is set to Daily, not Weekly"], ans: 1, explain: ["Anomaly Detection doesn't flag normal patterns.", "✅ Holt-Winters seasonality decomposition learns weekly patterns — the expected range for weekends already incorporates the lower baseline. Only DEVIATIONS from the normal weekend level are flagged.", "Seasonality adjustment is automatic — no manual threshold needed for this.", "The same applies to any granularity — the model learns the seasonal baseline."] },
      { q: "What is the minimum lookback period Adobe Analytics requires to build an accurate statistical model for Anomaly Detection?", opts: ["7 days", "30 days", "At least 90 days of historical data for reliable trend/seasonality modeling", "365 days — a full year is always required"], ans: 2, explain: ["7 days is too short to detect seasonality.", "30 days misses most seasonal patterns beyond monthly.", "✅ Adobe recommends at least 90 days of data for reliable Anomaly Detection — this captures enough seasonality and trend to create meaningful expected ranges.", "A full year is ideal but not the minimum requirement."] }
    ];


    QUIZZES["aa-processing-rules"] = [
      { q: "What is the primary function of Processing Rules in Adobe Analytics?", opts: ["Collect data from the browser", "Transform/copy/delete variable values on Adobe's servers before data is stored", "Create new report suites", "Configure eVar expiration"], ans: 1, explain: ["Data collection happens via AppMeasurement — not Processing Rules.", "✅ Processing Rules run server-side AFTER a hit arrives but BEFORE data is stored — they can copy context data into props/eVars, set values based on conditions, and delete values.", "Report suites are created in Admin UI.", "eVar expiration is a separate admin setting."] },
      { q: "When do Processing Rules execute in the data pipeline?", opts: ["Before the hit reaches Adobe's servers", "After the hit arrives at Adobe's servers but before it is stored in the report suite", "After data is stored — they update historical records", "Only when a report is run in Workspace"], ans: 1, explain: ["Processing Rules are server-side — they can't run before the hit arrives.", "✅ Processing Rules are applied server-side in the processing pipeline — after collection, before storage.", "They do NOT retroactively update historical data.", "Report-time processing is Workspace attribution — Processing Rules are ingestion-time."] },
      { q: "What must be true before you can use a context data variable in a Processing Rule?", opts: ["The context data variable must be defined in Admin > Report Suite Manager", "The context data variable can be created on-the-fly — no pre-definition needed", "Context data variables must be prefixed with 's.' in the code", "Only Adobe Consulting can create context data variables"], ans: 1, explain: ["Context data variables don't need pre-definition in Admin.", "✅ Context data variables (s.contextData['key']) can be created freely in the tracking code — any key-value pair. Processing Rules then map them to props/eVars/events for reporting.", "'s.' prefix is for AppMeasurement variables (s.prop1, s.eVar1) — not context data.", "Context data can be implemented by any developer."] },
      { q: "Which of the following is a valid Processing Rule action?", opts: ["Delete a report suite", "Copy the value of context data variable 'search.term' into eVar5", "Change eVar expiration from Visit to 30 days", "Create a new classification for an eVar"], ans: 1, explain: ["Report suites cannot be deleted via Processing Rules.", "✅ 'Set value of [eVar5] to [context data search.term]' is a standard Processing Rule action — copying context data into an eVar.", "eVar expiration requires Admin settings — not Processing Rules.", "Classifications are uploaded via SAINT — not Processing Rules."] },
      { q: "Processing Rule conditions can evaluate which of the following?", opts: ["Visitor's full IP address in text form", "Referring domain, query string parameters, page URL, user agent, custom context data values", "Visitor's email address captured in a form", "The visitor's device physical screen resolution"], ans: 1, explain: ["IP addresses are not available as text in Processing Rule conditions.", "✅ Processing Rule conditions can check: page URL, referrer, query parameters, user agent, eVar/prop values, and custom context data keys.", "Email is PII — not available in standard Processing Rule conditions.", "Screen resolution data isn't a standard Processing Rule condition field."] },
      { q: "What is the order of execution when BOTH Processing Rules AND Marketing Channel rules are present?", opts: ["Processing Rules first, then Marketing Channel rules", "Marketing Channel rules first, then Processing Rules", "They execute simultaneously", "Order depends on the report requested"], ans: 1, explain: ["Marketing Channel rules run before Processing Rules in the pipeline.", "✅ Marketing Channel rules execute BEFORE Processing Rules — this means you cannot use Processing Rules to manipulate data that will affect Marketing Channel attribution.", "They run sequentially, not simultaneously.", "Order is fixed in the pipeline — not report-dependent."] },
      { q: "An analyst wants to set eVar10 = 'Homepage' only when the page URL contains '/home'. Which feature should they use?", opts: ["Create a segment", "Write a VISTA rule", "Create a Processing Rule: IF Page URL contains /home THEN set eVar10 to 'Homepage'", "Use s.contextData in the tag"], ans: 2, explain: ["Segments filter reports — they don't set variable values.", "VISTA rules are custom-engineered solutions for complex use cases — Processing Rules handle this easily.", "✅ Processing Rule: Condition: Page URL contains '/home' → Action: Set [eVar10] = 'Homepage'. Standard, no-code configuration.", "Context data would require developer code change — Processing Rule is the no-code solution."] },
      { q: "Can Processing Rules be used to set success events (s.events) based on conditions?", opts: ["No — events can only be set in JavaScript tracking code", "Yes — you can add events conditionally using Processing Rules", "Only if the event is a Counter type", "Only Adobe Consulting can configure event-setting Processing Rules"], ans: 1, explain: ["Processing Rules CAN set events — this is a key use case.", "✅ Processing Rules can add success events based on conditions — e.g., IF Page URL contains '/thank-you' THEN add event1 (Purchase). This is a valid no-code implementation approach.", "Any event type can be set via Processing Rules.", "Any admin with Processing Rule permissions can configure this."] }
    ];

    QUIZZES["cja-cja-vs-aa"] = [
      { q: "What is the FUNDAMENTAL architectural difference between Adobe Analytics and CJA?", opts: ["AA uses real-time streaming; CJA uses batch processing", "AA processes data in proprietary report suites; CJA layers on Adobe Experience Platform and analyzes XDM-schema data from AEP datasets", "AA is for mobile; CJA is for web", "AA requires JavaScript; CJA uses server-side tracking only"], ans: 1, explain: ["Both AA and CJA have near-real-time capabilities.", "✅ AA stores data in proprietary Adobe report suites. CJA sits on top of AEP — reading data from AEP Datasets that use XDM schema. This enables cross-channel unification.", "Both analyze all channel types.", "Both support JavaScript and server-side implementations."] },
      { q: "In Adobe Analytics, 'eVars' store conversion data. What is the CJA equivalent?", opts: ["Dimensions in Data View with persistence settings", "XDM fields", "Connection schemas", "AEP datasets"], ans: 0, explain: ["✅ In CJA's Data View, you take XDM schema fields and configure them as Dimensions with persistence settings (expiration, attribution) — functionally equivalent to eVar configuration.", "XDM fields are the raw schema — they need to be mapped in Data View to become dimensions.", "Connection schemas define data structure — not individual variable behavior.", "Datasets are the data containers — not dimension definitions."] },
      { q: "Which statement about CJA 'Filters' vs AA 'Segments' is TRUE?", opts: ["CJA Filters can only use web data fields", "CJA Filters use Event/Session/Person containers — equivalent to Hit/Visit/Visitor in AA", "CJA Filters don't support sequential logic", "CJA Filters are applied at the Data View level, not in Workspace"], ans: 1, explain: ["CJA Filters use ANY schema field from any connected dataset — not just web.", "✅ CJA: Event = Hit, Session = Visit, Person = Visitor. The container names differ but the logic is equivalent — and CJA Filters can also use cross-channel data in conditions.", "CJA Filters DO support sequential logic via the THEN operator.", "Filters are applied in Analysis Workspace — not at the Data View level."] },
      { q: "CJA supports 'Person-level' cross-channel stitching. What makes this DIFFERENT from AA?", opts: ["AA also stitches persons across channels using the ECID", "CJA can stitch a single person's web, mobile, CRM, call center, and offline data into one unified Person record", "AA stitches devices using same-session logic", "CJA stitching is worse than AA — it loses data"], ans: 1, explain: ["ECID stitches within Adobe properties — not across offline channels.", "✅ CJA stitching unifies a PERSON across ALL data types in AEP — web + app + call center + CRM + POS into one Person journey. This is impossible in AA alone.", "AA uses fingerprinting/device-graph — limited to digital channels.", "CJA stitching expands analytical capability significantly."] },
      { q: "What feature does CJA have for schema field transformation that HAS NO equivalent in Adobe Analytics?", opts: ["Processing Rules", "Derived Fields — field-level transformations using functions like CASE WHEN, TRIM, REGEX in the Data View", "VISTA Rules", "Classifications"], ans: 1, explain: ["Processing Rules are the AA equivalent — but Derived Fields are more powerful.", "✅ Derived Fields in CJA Data Views let analysts create new dimensions/metrics by applying functions (regex, case-when, URL parsing) to existing schema fields — all no-code in the UI.", "VISTA rules are AA-only, expensive custom solutions.", "SAINT Classifications map existing values — Derived Fields create entirely new fields."] },
      { q: "In Adobe Analytics, you can have maximum 250 eVars. What is the CJA equivalent limit?", opts: ["250 dimensions", "No practical limit — any XDM schema field can become a dimension in CJA Data View", "100 dimensions", "50 custom dimensions + unlimited standard fields"], ans: 1, explain: ["eVar count limits are an AA concept that doesn't apply to CJA.", "✅ CJA has no arbitrary 250-eVar limit — every field in your XDM schema can be surfaced as a dimension in the Data View. If your schema has 5,000 fields, you can have 5,000 dimensions.", "No 100 or 50 dimension limit exists in CJA.", "Standard vs custom distinction is an AA concept."] },
      { q: "'Attribution IQ' applies attribution models at report time in BOTH AA and CJA. What can CJA do that AA CANNOT with attribution?", opts: ["Apply First Touch model", "Apply Time Decay model", "Apply attribution across cross-channel touchpoints — e.g., credit an email open to a later in-store purchase", "Apply the U-Shaped model"], ans: 2, explain: ["Both support First Touch attribution.", "Both support Time Decay.", "✅ CJA's cross-channel data means attribution can connect an email touchpoint (email dataset) to an in-store purchase (POS dataset) — multi-source attribution impossible in AA.", "Both support U-Shaped."] },
      { q: "Which CJA Component has NO direct equivalent in Adobe Analytics?", opts: ["Calculated Metrics", "Date Ranges", "Journey Canvas visualization", "Cohort Table"], ans: 2, explain: ["Calculated Metrics exist in both AA and CJA.", "Date Ranges / date pickers exist in both.", "✅ Journey Canvas is CJA-exclusive — a free-form 2D journey visualization with nodes, branches, and loops that works across channels. Adobe Analytics has no equivalent.", "Cohort Table exists in both AA and CJA."] }
